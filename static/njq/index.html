<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>牛角棋</title>

    <style>
        :root {
            --primary: #FF5600;
            --cow-color: #E67E22;
            --farmer-color: #27AE60;
            --bg-color: #FDF5E6;
            --board-line: #5D4037;
            --highlight: #F1C40F;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            /* 禁用默认触摸行为以支持拖拽 */
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
        }

        #main-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 顶部状态栏 */
        #top-bar {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid #EEDDCC;
            z-index: 50;
        }

        .game-info-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .game-title {
            font-size: 18px;
            font-weight: 900;
            color: #5D4037;
        }

        .stats-display {
            font-size: 12px;
            color: #8D6E63;
            font-weight: bold;
        }

        #turn-display {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            border: 1px solid #EEDDCC;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
        }

        .icon-btn:active {
            transform: scale(0.9);
        }

        /* 欢迎界面 */
        #welcome-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s;
        }

        .logo-area {
            font-size: 80px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .menu-btns {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 280px;
        }

        .menu-btn {
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(255, 86, 0, 0.1);
            text-align: center;
        }

        .btn-start {
            background: var(--primary);
            color: white;
        }

        .btn-rules {
            background: white;
            color: #5D4037;
            border: 2px solid #EEDDCC;
        }

        /* 规则弹窗 */
        #rules-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 110;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            padding: 30px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #A1887F;
        }

        .rule-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 15px;
            background: #FDF5E6;
            padding: 12px;
            border-radius: 12px;
        }

        .rule-icon {
            font-size: 24px;
        }

        .rule-text {
            flex: 1;
            font-size: 15px;
            color: #5D4037;
            line-height: 1.5;
        }

        /* 游戏区域 */
        #game-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            position: relative;
            background-image: radial-gradient(#EEDDCC 1px, transparent 1px);
            background-size: 30px 30px;
            overflow: hidden;
        }

        .board-container {
            position: relative;
            width: 95vw;
            height: calc(100vh - 90px);
            max-width: 600px;
            max-height: 750px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(93, 64, 55, 0.15);
            padding: 15px;
            border: 6px solid #FFF;
            outline: 1px solid #EEDDCC;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        /* SVG 元素样式 */
        .board-line {
            stroke: var(--board-line);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .node-point {
            fill: #FFF;
            stroke: var(--board-line);
            stroke-width: 4;
        }

        .highlight-node {
            fill: rgba(255, 86, 0, 0.2);
            stroke: var(--primary);
            stroke-width: 3;
            stroke-dasharray: 4;
            cursor: pointer;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                r: 35;
                opacity: 0.5;
            }

            50% {
                r: 45;
                opacity: 0.8;
            }

            100% {
                r: 35;
                opacity: 0.5;
            }
        }

        .piece {
            cursor: grab;
            transition: filter 0.2s;
        }

        .piece:active {
            cursor: grabbing;
        }

        .piece circle {
            fill: white;
            stroke-width: 6;
            filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.2));
            transition: stroke 0.3s;
        }

        .piece text {
            font-size: 40px;
            text-anchor: middle;
            pointer-events: none;
        }

        .piece.cow circle {
            stroke: var(--cow-color);
        }

        .piece.farmer circle {
            stroke: var(--farmer-color);
        }

        .piece.selected circle {
            stroke: var(--highlight);
            stroke-width: 10;
            filter: drop-shadow(0 0 20px rgba(241, 196, 15, 0.6));
        }

        .deco-label {
            font-size: 24px;
            font-weight: 900;
            fill: #A1887F;
            pointer-events: none;
        }

        /* 胜利浮层 */
        #win-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 60;
            border-radius: 40px;
            text-align: center;
            padding: 20px;
        }

        #win-overlay.active {
            display: flex;
        }

        #win-message {
            font-size: 40px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        #win-stats {
            font-size: 18px;
            color: #5D4037;
            margin-bottom: 30px;
        }

        .win-actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 220px;
        }
    </style>
</head>
<body>
    <div id="welcome-screen">
        <div class="logo-area">🐮</div>
        <h1 style="color:#5D4037; margin-bottom:30px; font-size:48px;">牛角棋</h1>
        <div class="menu-btns">
            <button class="menu-btn btn-start" onclick="startGame('PVP')">⚔️ 双人对战</button>
            <button class="menu-btn btn-start" style="background:#E67E22" onclick="startGame('COW_AI')">🚀 牛气冲天
                (控牛)</button>
            <button class="menu-btn btn-start" style="background:#27AE60" onclick="startGame('FARMER_AI')">🛡️ 拦住牛宝
                (控农)</button>
            <button class="menu-btn btn-rules" onclick="showRules()">📖 游戏规则</button>
        </div>
    </div>
    <div id="rules-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="hideRules()">✕</span>
            <h2 style="color:var(--primary); margin-top:0; text-align: center; font-size: 28px;">📖 游戏规则</h2>
            <div class="rule-item">
                <div class="rule-icon">🐮</div>
                <div class="rule-text"><strong>牛</strong>：先走，可沿线向相邻点移动。到达底部出口获胜。</div>
            </div>
            <div class="rule-item">
                <div class="rule-icon">🧑‍🌾</div>
                <div class="rule-text"><strong>农夫</strong>：只能前进或平移，<strong>不能后退</strong>。将牛围困获胜。</div>
            </div>
            <div class="rule-item">
                <div class="rule-icon">👆</div>
                <div class="rule-text"><strong>操作</strong>：点击棋子选中，或直接<strong>拖拽</strong>棋子到发光的目标点。</div>
            </div>
            <button class="menu-btn btn-start" style="width:100%; margin-top:10px;" onclick="hideRules()">开始挑战</button>
        </div>
    </div>
    <div id="main-container">
        <div id="top-bar">
            <div class="game-info-group">
                <div id="turn-display">
                    <span id="turn-icon">🐮</span> <span id="turn-label">牛回合</span>
                </div>
                <div class="stats-display" id="stats-bar">对战: 0 | 胜: 0 | 难度: LV1</div>
            </div>
            <div class="action-btns">
                <div class="icon-btn" id="restart-btn" title="重置">🔄</div>
            </div>
        </div>
        <div id="game-area">
            <div class="board-container">
                <div id="win-overlay">
                    <div id="win-message">牛获胜！</div>
                    <div id="win-stats">胜率: 0%</div>
                    <div class="win-actions">
                        <button class="menu-btn btn-start" onclick="resetGame()">继续对战</button>
                        <button class="menu-btn btn-rules" onclick="backToHome()">返回主页</button>
                    </div>
                </div>
                <svg id="board" viewBox="70 0 630 850">
                    <text x="150" y="50" class="deco-label" text-anchor="middle">🏠 起点</text>
                    <text x="240" y="820" class="deco-label" text-anchor="middle">🚩 出口</text>
                    <text x="620" y="820" class="deco-label" text-anchor="middle">🚩 出口</text>
                    <g id="edges-layer"></g>
                    <g id="nodes-layer"></g>
                    <g id="highlights-layer"></g>
                    <g id="pieces-layer">
                        <g class="piece cow" id="piece-cow" data-id="cow">
                            <circle cx="0" cy="0" r="42"></circle>
                            <text x="0" y="0" dy=".35em">🐮</text>
                        </g>
                        <g class="piece farmer" id="piece-f1" data-id="f1">
                            <circle cx="0" cy="0" r="42"></circle>
                            <text x="0" y="0" dy=".35em">🧑‍🌾</text>
                        </g>
                        <g class="piece farmer" id="piece-f2" data-id="f2">
                            <circle cx="0" cy="0" r="42"></circle>
                            <text x="0" y="0" dy=".35em">🧑‍🌾</text>
                        </g>
                    </g>
                </svg>
            </div>
        </div>
    </div>
