<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3的倍数特征探究</title>
    <script src="p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #F4F3EC;
            font-family: sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px 30px;
        }

        .top-bar input {
            font-size: 24px;
            width: 100px;
            text-align: center;
            border: 2px solid #FF5600;
            border-radius: 10px;
            padding: 5px;
            outline: none;
            transition: all 0.3s;
        }

        .top-bar input:focus {
            box-shadow: 0 0 10px rgba(255, 86, 0, 0.3);
        }

        .top-bar label {
            font-size: 20px;
            color: #333;
            font-weight: bold;
        }

        .info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 22px;
            color: #FF5600;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            pointer-events: none;
            line-height: 1.5;
            min-width: 400px;
        }

        .btn {
            background: #FF5600;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 18px;
            margin-left: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 86, 0, 0.3);
        }

        .btn:hover {
            background: #e04a00;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .numpad {
            position: absolute;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            z-index: 20;
        }

        .numpad.active {
            display: grid;
        }

        .numpad button {
            width: 60px;
            height: 60px;
            font-size: 24px;
            border: none;
            border-radius: 10px;
            background: #f4f3ec;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .numpad button:active {
            background: #e0e0e0;
            transform: scale(0.95);
        }

        .numpad button.confirm {
            background: #FF5600;
            color: white;
            font-size: 20px;
        }

        .numpad button.confirm:active {
            background: #e04a00;
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <input type="text" id="numInput" value="234" readonly style="cursor: pointer;">
        <button id="splitBtn" class="btn">拆分</button>
    </div>
    <div class="numpad" id="numpad">
        <button onpointerdown="inputDigit(1); event.preventDefault();">1</button>
        <button onpointerdown="inputDigit(2); event.preventDefault();">2</button>
        <button onpointerdown="inputDigit(3); event.preventDefault();">3</button>
        <button onpointerdown="inputDigit(4); event.preventDefault();">4</button>
        <button onpointerdown="inputDigit(5); event.preventDefault();">5</button>
        <button onpointerdown="inputDigit(6); event.preventDefault();">6</button>
        <button onpointerdown="inputDigit(7); event.preventDefault();">7</button>
        <button onpointerdown="inputDigit(8); event.preventDefault();">8</button>
        <button onpointerdown="inputDigit(9); event.preventDefault();">9</button>
        <button onpointerdown="clearInput(); event.preventDefault();">C</button>
        <button onpointerdown="inputDigit(0); event.preventDefault();">0</button>
        <button class="confirm" onpointerdown="confirmInput(); event.preventDefault();">确定</button>
        <div style="grid-column: span 3; color: #999; font-size: 14px; text-align: center; margin-top: 5px;">
            限于页面显示仅限300以内。</div>
    </div>
    <div class="info" id="infoText">
        234 = 2个百 + 3个十 + 4个一
    </div>
    <div id="canvas-container"></div>
