<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>补墙游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e0f2f1 0%, #c8e6c9 100%);
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }
        .container {
            position: relative;
            height: 100vh;
            width: 100vw;
            display: flex;
        }
        
        .toolbar {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 25px;
            width: 170px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
        }
        .toolbar h3 {
            font-size: 16px;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 1px 2px rgba(255,255,255,0.8);
        }
        button {
            padding: 12px 8px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #34495e;
            transition: all 0.2s;
            touch-action: manipulation;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        button:hover { 
            background: rgba(255, 255, 255, 0.9); 
            transform: translateY(-1px);
        }
        button.active {
            background: rgba(76, 175, 80, 0.9);
            color: white;
            border-color: #4CAF50;
        }
        button.delete-active {
            background: rgba(244, 67, 54, 0.9);
            color: white;
            border-color: #f44336;
        }
        button.move-active {
            background: rgba(33, 150, 243, 0.9);
            color: white;
            border-color: #2196F3;
        }
        button.odd-active {
            background: rgba(33, 150, 243, 0.9);
            color: white;
            border-color: #2196F3;
        }
        button.even-active {
            background: rgba(76, 175, 80, 0.9);
            color: white;
            border-color: #4CAF50;
        }
        .row-control {
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            padding-top: 12px;
            margin-top: 5px;
        }
        .row-control label {
            display: block;
            font-size: 13px;
            color: #444;
            text-align: center;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .row-buttons-inline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            padding: 4px;
        }
        .row-buttons-inline button {
            width: 32px;
            height: 32px;
            padding: 0;
            font-size: 18px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: none;
        }
        #rowCount {
            font-size: 15px;
            font-weight: bold;
            color: #2c3e50;
            margin: 0;
            flex: 1;
            text-align: center;
        }

        .main-area {
            flex: 1;
            padding: 20px 20px 20px 210px; 
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .content-wrapper {
            width: 100%;
            height: 100%;
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .wall-container {
            box-sizing: content-box; 
            background: #f5f5f5;
            border: 3px solid #333;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            position: relative;
        }
        #wallSvg {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .brick-selector {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5px;
            z-index: 10;
        }
        .brick-option {
            cursor: grab;
            transition: transform 0.2s;
            touch-action: none;
        }
        .brick-option:active {
            cursor: grabbing;
        }
        .brick-option svg {
            display: block;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        #paintLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
        }
        
        #dragGhost {
            display: none;
            position: absolute;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }
        .breathing {
            animation: breathe 1.2s infinite ease-in-out;
        }
        @keyframes breathe {
            0% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
            100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
        }

        .watermark {
            position: absolute;
            bottom: 15px;
            left: 25px;
            font-size: 12px;
            color: #7f8c8d;
            text-decoration: none;
            z-index: 100;
        }
        .watermark:hover {
            color: #34495e;
        }
        
        @media (max-width: 768px) {
            .main-area {
                padding: 150px 10px 10px 10px;
            }
            .toolbar {
                width: calc(100% - 40px);
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                padding: 10px;
                top: 10px; 
                left: 20px; 
                right: 20px;
                transform: none;
            }
            .row-control { margin-top: 0; padding-top: 0; border: none; display: flex; align-items: center; gap: 10px; }
            .watermark { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <h3>🧱 补墙游戏</h3>
            
            <button id="moveBtn" class="move-active" onclick="setMode('normal')">↔️ 拖拽补砖</button>
            <button id="deleteBtn" onclick="setMode('delete')">🗑️ 消除模式</button>
            <button id="penBtn" onclick="setMode('pen')">✏️ 画笔批注</button>
            <button id="eraserBtn" onclick="setMode('eraser')">🧽 橡皮擦</button>
            <button onclick="resetWall()">🔄 重置墙面</button>
            <button id="oddRowBtn" onclick="toggleOddRowColor()">🟦 单数行变色</button>
            <button id="evenRowBtn" onclick="toggleEvenRowColor()">🟩 双数行变色</button>
            
            <button id="modeToggleBtn" onclick="toggleBrickMode()" style="background: rgba(224, 247, 250, 0.8); border-color: #00bcd4; color: #00838f;">🧩 整块模式</button>
            
            <div class="row-control">
                <label>墙面行数</label>
                <div class="row-buttons-inline">
                    <button onclick="changeRows(-1)">−</button>
                    <div id="rowCount">5行</div>
                    <button onclick="changeRows(1)">+</button>
                </div>
            </div>
        </div>
        
        <div class="main-area">
            <div class="content-wrapper">
                <div class="wall-container">
                    <svg id="wallSvg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"></svg>
                </div>
                
                <div class="brick-selector">
                    <div class="brick-option" id="brickSource">
                        <svg id="sourceSvg" viewBox="0 0 80 40">
                            <rect x="1" y="1" width="78" height="38" fill="#d4a574" stroke="#ff9800" stroke-width="3"></rect>
                            <line x1="5" y1="20" x2="75" y2="20" stroke="rgba(0,0,0,0.2)" stroke-width="1"></line>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <svg id="paintLayer" xmlns="http://www.w3.org/2000/svg"></svg>
    
    <div id="dragGhost">
        <svg id="ghostSvg" viewBox="0 0 80 40">
            <rect id="ghostRect" x="1" y="1" width="78" height="38" fill="#d4a574" stroke="#ff9800" stroke-width="3"></rect>
            <line id="ghostLine" x1="5" y1="20" x2="75" y2="20" stroke="rgba(0,0,0,0.2)" stroke-width="1"></line>
        </svg>
    </div>
