<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小数与分数乘法的意义</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #F4F3EC;
            --panel-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --grid-line: #cbd5e1;
            --grid-border: #475569;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .formula-card {
            padding: 10px 20px;
            background: transparent;
            z-index: 10;
        }

        .formula-main {
            font-size: 3rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .clickable-term {
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 10px;
            transition: all 0.2s ease;
            user-select: none;
        }

        .clickable-term:hover {
            background: #e2e8f0;
        }

        .clickable-term.active {
            background: #dbeafe;
            color: #1d4ed8;
            box-shadow: 0 0 0 2px #3b82f6;
        }

        .frac {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            margin: 0 4px;
            font-size: 30px;
        }

        .frac span:first-child {
            border-bottom: 3px solid currentColor;
            padding: 0 6px;
            line-height: 1.1;
        }

        .frac span:last-child {
            padding: 0 6px;
            line-height: 1.1;
        }

        .main-content {
            flex: 1;
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
            z-index: 1;
            min-height: 0;
            overflow: hidden;
        }

        .floating-controls {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: transparent;
            padding: 0;
            z-index: 20;
            width: 180px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .floating-controls label {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            font-size: 14px;
            font-weight: 500;
            background: transparent;
            padding: 0;
            border: none;
            margin: 0;
            cursor: pointer;
            color: var(--text-muted);
        }

        .floating-controls input[type="range"] {
            flex: 1;
            margin: 0 12px;
            accent-color: var(--primary);
            height: 6px;
        }

        .val-display {
            width: 28px;
            text-align: right;
            font-weight: bold;
            color: var(--primary);
            font-size: 16px;
        }

        .checkbox-label input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        svg {
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 800px;
            filter: drop-shadow(0 15px 35px rgba(0, 0, 0, 0.05));
        }

        /* SVG Element Styles */
        .grid-bg {
            fill: #ffffff;
            stroke: var(--grid-border);
            stroke-width: 2px;
        }

        .grid-line {
            stroke: var(--grid-line);
            stroke-width: 1.5px;
        }

        .area-v {
            fill: rgba(250, 204, 21, 0.25);
            transition: all 0.3s ease;
        }

        /* Yellow */
        .area-h {
            fill: rgba(96, 165, 250, 0.25);
            transition: all 0.3s ease;
        }

        /* Blue */
        .area-intersect {
            fill: rgba(74, 222, 128, 0.55);
            transition: all 0.3s ease;
        }

        /* Green */

        /* Highlight Classes */
        .highlight-h {
            fill: rgba(96, 165, 250, 0.7) !important;
            stroke: #2563eb;
            stroke-width: 3px;
        }

        .highlight-v {
            fill: rgba(250, 204, 21, 0.7) !important;
            stroke: #ca8a04;
            stroke-width: 3px;
        }

        .highlight-i {
            fill: rgba(74, 222, 128, 0.8) !important;
            stroke: #16a34a;
            stroke-width: 3px;
        }

        .dimmed {
            opacity: 0.1 !important;
        }

        .handle {
            fill: white;
            stroke: var(--primary);
            stroke-width: 3px;
            cursor: nwse-resize;
        }

        .handle:hover {
            fill: #eff6ff;
            stroke-width: 4px;
        }

        .handle-hitbox {
            fill: transparent;
            cursor: nwse-resize;
        }

        .interactive-layer {
            fill: transparent;
            cursor: pointer;
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }

            70% {
                transform: scale(1.05);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .demo-block {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform-origin: center;
            transform-box: fill-box;
        }

        #rect-unit:hover {
            fill: rgba(234, 88, 12, 0.3);
            stroke-width: 3px;
        }

        @media (max-width: 768px) {
            .formula-card {
                margin-top: 20px;
                padding: 10px;
            }

            .formula-main {
                font-size: 24px;
                gap: 6px;
            }

            .frac {
                font-size: 22px;
            }

            .floating-controls {
                bottom: 20px;
                right: 50%;
                transform: translateX(50%);
                width: 90%;
                padding: 16px;
            }

            .main-content {
                padding-bottom: 150px;
                /* Space for controls */
            }
        }
    </style>
</head>

<body>

    <div class="app-container">
        <div class="formula-card">
            <div class="formula-main" id="formula-expr">
                <!-- Dynamically populated -->
            </div>
        </div>

        <div class="main-content">
            <svg id="svg-canvas" viewBox="0 0 740 740" preserveAspectRatio="xMidYMid meet">
                <defs>
                    <pattern id="hatch" width="8" height="8" patternTransform="rotate(45 0 0)"
                        patternUnits="userSpaceOnUse">
                        <line x1="0" y1="0" x2="0" y2="8" stroke="#64748b" stroke-width="2" opacity="0.5" />
                    </pattern>
                    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
                    </marker>
                </defs>

                <g transform="translate(130, 130)" id="main-group">
                    <rect class="grid-bg" width="500" height="500" />
                    <g id="grid-lines"></g>

                    <rect id="rect-h" class="area-h" x="0" y="0" />
                    <rect id="rect-v" class="area-v" x="0" y="0" />
                    <rect id="rect-intersect" class="area-intersect" x="0" y="0" />

                    <rect id="interactive-layer" class="interactive-layer" width="500" height="500" />

                    <g id="demo-layer" pointer-events="none"></g>
                    <text id="demo-counter-text" x="250" y="250" font-size="64" font-weight="bold" fill="#ea580c"
                        text-anchor="middle" dominant-baseline="central" pointer-events="none" opacity="0"></text>

                    <rect id="rect-unit" x="0" y="0" fill="url(#hatch)" stroke="#ea580c" stroke-width="2"
                        cursor="pointer" />

                    <g id="brackets-group" pointer-events="none">
                        <path id="bracket-top" stroke="#475569" stroke-width="2" fill="none" stroke-linejoin="round" />
                        <g id="label-top-group"></g>

                        <path id="bracket-left" stroke="#475569" stroke-width="2" fill="none" stroke-linejoin="round" />
                        <g id="label-left-group"></g>

                        <text x="250" y="-95" font-size="40" text-anchor="middle" fill="#475569"
                            font-weight="bold">1</text>
                        <text x="560" y="250" font-size="40" alignment-baseline="middle" dominant-baseline="central"
                            fill="#475569" font-weight="bold">1</text>

                        <path id="arrow-unit" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"
                            fill="none" />
                        <g id="label-unit-group"></g>
                    </g>

                    <g id="handle-xy-group">
                        <circle id="handle-xy" class="handle" r="12" />
                        <circle id="handle-xy-hitbox" class="handle-hitbox" r="35" />
                    </g>
                </g>
            </svg>
        </div>

        <div class="floating-controls">
            <label>
                水平列数:
                <div class="row-flex" style="display:flex; width:100%; align-items:center; margin-top:4px;">
                    <input type="range" id="cols-slider" min="1" max="10" value="10">
                    <span class="val-display" id="cols-val">10</span>
                </div>
            </label>
            <label>
                垂直行数:
                <div class="row-flex" style="display:flex; width:100%; align-items:center; margin-top:4px;">
                    <input type="range" id="rows-slider" min="1" max="10" value="10">
                    <span class="val-display" id="rows-val">10</span>
                </div>
            </label>
            <label class="checkbox-label" style="flex-direction:row; align-items:center; margin-top:8px;">
                <input type="checkbox" id="force-fraction">
                始终显示为分数形式
            </label>
        </div>
    </div>
