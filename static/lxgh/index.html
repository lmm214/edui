<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>路线规划大挑战</title>
    <style>
        @import url('https://fonts.googleapis.cn/css2?family=Architects+Daughter&family=ZCOOL+KuaiLe&display=swap');

        :root {
            --bg-eye-care: #F4F3EC;
            --brand-primary: #3B82F6;
            --status-success: #10B981;
            --status-error: #FB7185;
            --status-focus: #F59E0B;
            --text-primary: #1F2937;
            --text-secondary: #4B5563;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'ZCOOL KuaiLe', 'Architects Daughter', cursive, system-ui, -apple-system, sans-serif;
            background: var(--bg-eye-care);
            color: var(--text-primary);
            touch-action: none;
            overflow: hidden;
            user-select: none;
            width: 100vw;
            height: 100vh;
        }

        /* Screen Overlays */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-eye-care);
            z-index: 50;
            transition: opacity 0.3s;
        }

        #intro-screen {
            background: rgba(244, 243, 236, 0.85);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .screen.hidden {
            display: none;
        }

        .screen-content {
            background: #fff;
            padding: 2rem 4rem;
            border: 4px solid var(--text-primary);
            box-shadow: 8px 8px 0 var(--text-primary);
            text-align: center;
            border-radius: 8px;
            max-width: 90%;
        }

        .screen h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .screen h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--status-success);
        }

        .screen p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: var(--text-secondary);
        }

        .btn {
            font-family: inherit;
            background: #fff;
            border: 3px solid var(--text-primary);
            padding: 0.8rem 2.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0 var(--text-primary);
            transition: all 0.1s;
            border-radius: 4px;
            color: var(--text-primary);
        }

        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0 var(--text-primary);
        }

        @keyframes colorBreathing {
            0% {
                color: #3B82F6;
                border-color: #3B82F6;
                transform: scale(1);
                box-shadow: 2px 2px 0 #3B82F6;
            }

            25% {
                color: #10B981;
                border-color: #10B981;
                transform: scale(1.1);
                box-shadow: 4px 4px 0 #10B981;
            }

            50% {
                color: #F59E0B;
                border-color: #F59E0B;
                transform: scale(1);
                box-shadow: 2px 2px 0 #F59E0B;
            }

            75% {
                color: #8B5CF6;
                border-color: #8B5CF6;
                transform: scale(1.1);
                box-shadow: 4px 4px 0 #8B5CF6;
            }

            100% {
                color: #3B82F6;
                border-color: #3B82F6;
                transform: scale(1);
                box-shadow: 2px 2px 0 #3B82F6;
            }
        }

        .success-anim {
            animation: colorBreathing 2s infinite ease-in-out !important;
        }

        /* Top Bar */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 70px;
            z-index: 40;
        }

        @media (max-width: 600px) {
            .top-bar {
                height: 70px;
                padding: 0 25px;
            }

            .game-title {
                font-size: 1.2rem;
            }

            .top-btn {
                font-size: 1rem;
                padding: 3px 10px;
            }
        }

        .top-bar.hidden {
            display: none;
        }

        .top-btn {
            background: #fff;
            border: 3px solid var(--text-primary);
            padding: 5px 15px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 var(--text-primary);
            border-radius: 4px;
            font-family: inherit;
            color: var(--text-primary);
            transition: all 0.1s;
            display: inline-block;
            text-align: center;
        }

        .top-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 var(--text-primary);
        }

        .game-title {
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 1px 1px 0 #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* SVG Canvas Container */
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        #game-svg {
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* SVG Elements */
        .hand-drawn-line {
            fill: none;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: url(#rough-filter);
            transition: stroke 0.3s;
        }

        .card-rect {
            fill: #ffffff;
            filter: url(#rough-filter);
            rx: 8;
            transition: all 0.2s;
        }

        .node-group {
            cursor: pointer;
            transform-box: fill-box;
            transform-origin: center;
        }

        @keyframes jellyPop {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            40% {
                transform: scale(1.2);
                opacity: 1;
            }

            60% {
                transform: scale(0.9);
                opacity: 1;
            }

            80% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .node-text {
            font-family: 'Architects Daughter', 'ZCOOL KuaiLe', cursive, sans-serif;
            font-size: 48px;
            font-weight: bold;
            fill: var(--text-primary);
            pointer-events: none;
            filter: url(#rough-filter);
            text-shadow: 1px 1px 0 #cbd5e1, 2px 2px 0 #cbd5e1, 3px 3px 0 #cbd5e1, 4px 4px 0 #cbd5e1;
        }

        /* Feedback Popups */
        #feedback-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 45;
        }

        .feedback-pop {
            position: absolute;
            animation: popUp 0.8s ease-out forwards;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff;
        }

        .pop-undo {
            color: var(--status-focus);
        }

        .pop-success {
            color: var(--status-success);
        }

        @keyframes popUp {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }

            20% {
                opacity: 1;
                transform: translateY(-10px) scale(1.1);
            }

            80% {
                opacity: 1;
                transform: translateY(-30px) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateY(-40px);
            }
        }

        @keyframes drawLine {
            to {
                stroke-dashoffset: 0;
            }
        }

        .title-part {
            display: inline;
        }

        @media (max-width: 480px) {
            .screen h1 {
                font-size: 2.2rem;
            }

            .title-part {
                display: block;
            }

            .game-title {
                font-size: 1.2rem;
            }

            .top-btn {
                font-size: 1rem;
                padding: 4px 10px;
            }
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .level-btn {
            background: #fff;
            border: 3px solid var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 4px 4px 0 var(--text-primary);
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            width: auto;
            height: auto;
        }

        .level-btn:not(:disabled):active {
            transform: translate(4px, 4px);
            box-shadow: 0 0 0 var(--text-primary);
        }

        .level-btn:disabled {
            background: #e5e7eb;
            color: #9ca3af;
            border-color: #9ca3af;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
            opacity: 0.6;
        }

        .level-thumb-title {
            margin-top: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--text-primary);
            font-family: inherit;
        }

        #level-selector-screen {
            background: transparent;
        }

        #level-selector-screen .screen-content {
            width: 95vw;
            height: 95vh;
            max-width: none;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            position: relative;
        }

        #level-selector-screen .level-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 1fr;
            gap: 5px 50px;
            min-height: 0;
            overflow-y: auto;
        }

        #level-selector-screen .level-btn {
            width: 100%;
            height: 100%;
            padding: 5px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            box-shadow: none;
        }

        #level-selector-screen .level-btn svg {
            width: 100%;
            height: 100%;
            max-height: calc(100% - 30px);
            max-width: 100%;
        }

        #level-selector-screen h2 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        #level-selector-screen .btn {
            margin-top: 0;
            padding: 8px 30px;
            align-self: center;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-primary);
            cursor: pointer;
            padding: 10px;
            z-index: 10;
        }

        @media (max-width: 600px) {
            #level-selector-screen .level-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 400px) {
            #level-selector-screen .level-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- Intro Screen -->
    <div id="intro-screen" class="screen">
        <div class="screen-content">
            <h1>
                <span class="title-part">
                    <span style="color: #3B82F6">路</span><span style="color: #10B981">线</span><span
                        style="color: #F59E0B">规</span><span style="color: #8B5CF6">划</span>
                </span>
                <span class="title-part">
                    <span style="color: #EC4899">大</span><span style="color: #14B8A6">挑</span><span
                        style="color: #3B82F6">战</span>
                </span>
            </h1>
            <p>相同数字连线，禁止交叉</p>
            <button class="btn" onclick="startGame()">
                <span style="color: #3B82F6">进</span><span style="color: #10B981">入</span><span
                    style="color: #F59E0B">游</span><span style="color: #8B5CF6">戏</span>
            </button>
        </div>
    </div>

    <!-- Level Selector Screen -->
    <div id="level-selector-screen" class="screen hidden">
        <div class="screen-content">
            <button class="close-btn" onclick="closeLevelSelector()">返回</button>
            <h2 style="color: var(--text-primary); margin-bottom: 20px;">选择关卡</h2>
            <div id="level-grid" class="level-grid"></div>
        </div>
    </div>

    <!-- Top Bar -->
    <div id="top-bar" class="top-bar hidden">
        <div class="game-title">
            <span style="color: #3B82F6">路</span><span style="color: #10B981">线</span><span
                style="color: #F59E0B">规</span><span style="color: #8B5CF6">划</span><span
                style="color: #EC4899">大</span><span style="color: #14B8A6">挑</span><span
                style="color: #3B82F6">战</span>
        </div>
        <div style="position: absolute; left: 50%; transform: translateX(-50%);">
            <button id="level-indicator" class="top-btn" onclick="handleIndicatorClick()">第 1 关</button>
        </div>
        <button id="btn-restart" class="top-btn" onclick="resetCurrentPuzzle()">再试一次</button>
    </div>

    <!-- Interactive Canvas -->
    <div id="canvas-container">
        <svg id="game-svg">
            <defs>
                <filter id="rough-filter" x="-20%" y="-20%" width="140%" height="140%">
                    <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="noise"></feTurbulence>
                    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3"></feDisplacementMap>
                </filter>
            </defs>
            <!-- Hand-drawn Fullscreen Border -->
            <rect id="border-rect" x="70" y="90" width="100" height="100" fill="none" stroke="var(--text-primary)"
                stroke-width="4" filter="url(#rough-filter)" pointer-events="none"></rect>

            <g id="lines-group"></g>
            <g id="current-path-group"></g>
            <g id="nodes-group"></g>
        </svg>
        <div id="feedback-layer"></div>
    </div>
