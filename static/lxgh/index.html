<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>路线规划大挑战</title>
    <style>
        @import url('https://fonts.googleapis.cn/css2?family=Architects+Daughter&family=ZCOOL+KuaiLe&display=swap');

        :root {
            --bg-eye-care: #F4F3EC;
            --brand-primary: #3B82F6;
            --status-success: #10B981;
            --status-error: #FB7185;
            --status-focus: #F59E0B;
            --text-primary: #1F2937;
            --text-secondary: #4B5563;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'ZCOOL KuaiLe', 'Architects Daughter', cursive, system-ui, -apple-system, sans-serif;
            background: var(--bg-eye-care);
            color: var(--text-primary);
            touch-action: none;
            overflow: hidden;
            user-select: none;
            width: 100vw;
            height: 100vh;
        }

        /* Screen Overlays */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-eye-care);
            z-index: 50;
            transition: opacity 0.3s;
        }

        #intro-screen {
            background: rgba(244, 243, 236, 0.85);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .screen.hidden {
            display: none;
        }

        .screen-content {
            background: #fff;
            padding: 2rem 4rem;
            border: 4px solid var(--text-primary);
            box-shadow: 8px 8px 0 var(--text-primary);
            text-align: center;
            border-radius: 8px;
            max-width: 90%;
        }

        .screen h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .screen h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--status-success);
        }

        .screen p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: var(--text-secondary);
        }

        .btn {
            font-family: inherit;
            background: #fff;
            border: 3px solid var(--text-primary);
            padding: 0.8rem 2.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0 var(--text-primary);
            transition: all 0.1s;
            border-radius: 4px;
            color: var(--text-primary);
        }

        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0 var(--text-primary);
        }

        @keyframes colorBreathing {
            0% {
                color: #3B82F6;
                border-color: #3B82F6;
                transform: scale(1);
                box-shadow: 2px 2px 0 #3B82F6;
            }

            25% {
                color: #10B981;
                border-color: #10B981;
                transform: scale(1.1);
                box-shadow: 4px 4px 0 #10B981;
            }

            50% {
                color: #F59E0B;
                border-color: #F59E0B;
                transform: scale(1);
                box-shadow: 2px 2px 0 #F59E0B;
            }

            75% {
                color: #8B5CF6;
                border-color: #8B5CF6;
                transform: scale(1.1);
                box-shadow: 4px 4px 0 #8B5CF6;
            }

            100% {
                color: #3B82F6;
                border-color: #3B82F6;
                transform: scale(1);
                box-shadow: 2px 2px 0 #3B82F6;
            }
        }

        .success-anim {
            animation: colorBreathing 2s infinite ease-in-out !important;
        }

        /* Top Bar */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 70px;
            z-index: 40;
        }

        @media (max-width: 600px) {
            .top-bar {
                height: 70px;
                padding: 0 25px;
            }

            .game-title {
                font-size: 1.2rem;
            }

            .top-btn {
                font-size: 1rem;
                padding: 3px 10px;
            }
        }

        .top-bar.hidden {
            display: none;
        }

        .top-btn {
            background: #fff;
            border: 3px solid var(--text-primary);
            padding: 5px 15px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 var(--text-primary);
            border-radius: 4px;
            font-family: inherit;
            color: var(--text-primary);
            transition: all 0.1s;
            display: inline-block;
            text-align: center;
        }

        .top-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 var(--text-primary);
        }

        .game-title {
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 1px 1px 0 #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* SVG Canvas Container */
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        #game-svg {
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* SVG Elements */
        .hand-drawn-line {
            fill: none;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: url(#rough-filter);
            transition: stroke 0.3s;
        }

        .card-rect {
            fill: #ffffff;
            filter: url(#rough-filter);
            rx: 8;
            transition: all 0.2s;
        }

        .node-group {
            cursor: pointer;
            transform-box: fill-box;
            transform-origin: center;
        }

        @keyframes jellyPop {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            40% {
                transform: scale(1.2);
                opacity: 1;
            }

            60% {
                transform: scale(0.9);
                opacity: 1;
            }

            80% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .node-text {
            font-family: 'Architects Daughter', 'ZCOOL KuaiLe', cursive, sans-serif;
            font-size: 48px;
            font-weight: bold;
            fill: var(--text-primary);
            pointer-events: none;
            filter: url(#rough-filter);
            text-shadow: 1px 1px 0 #cbd5e1, 2px 2px 0 #cbd5e1, 3px 3px 0 #cbd5e1, 4px 4px 0 #cbd5e1;
        }

        /* Feedback Popups */
        #feedback-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 45;
        }

        .feedback-pop {
            position: absolute;
            animation: popUp 0.8s ease-out forwards;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff;
        }

        .pop-undo {
            color: var(--status-focus);
        }

        .pop-success {
            color: var(--status-success);
        }

        @keyframes popUp {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }

            20% {
                opacity: 1;
                transform: translateY(-10px) scale(1.1);
            }

            80% {
                opacity: 1;
                transform: translateY(-30px) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateY(-40px);
            }
        }

        @keyframes drawLine {
            to {
                stroke-dashoffset: 0;
            }
        }

        .title-part {
            display: inline;
        }

        @media (max-width: 480px) {
            .screen h1 {
                font-size: 2.2rem;
            }

            .title-part {
                display: block;
            }

            .game-title {
                font-size: 1.2rem;
            }

            .top-btn {
                font-size: 1rem;
                padding: 4px 10px;
            }
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .level-btn {
            background: #fff;
            border: 3px solid var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 4px 4px 0 var(--text-primary);
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            width: auto;
            height: auto;
        }

        .level-btn:not(:disabled):active {
            transform: translate(4px, 4px);
            box-shadow: 0 0 0 var(--text-primary);
        }

        .level-btn:disabled {
            background: #e5e7eb;
            color: #9ca3af;
            border-color: #9ca3af;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
            opacity: 0.6;
        }

        .level-thumb-title {
            margin-top: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--text-primary);
            font-family: inherit;
        }

        #level-selector-screen {
            background: transparent;
        }

        #level-selector-screen .screen-content {
            width: 95vw;
            height: 95vh;
            max-width: none;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            position: relative;
        }

        #level-selector-screen .level-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 1fr;
            gap: 5px 50px;
            min-height: 0;
            overflow-y: auto;
        }

        #level-selector-screen .level-btn {
            width: 100%;
            height: 100%;
            padding: 5px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            box-shadow: none;
        }

        #level-selector-screen .level-btn svg {
            width: 100%;
            height: 100%;
            max-height: calc(100% - 30px);
            max-width: 100%;
        }

        #level-selector-screen h2 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        #level-selector-screen .btn {
            margin-top: 0;
            padding: 8px 30px;
            align-self: center;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-primary);
            cursor: pointer;
            padding: 10px;
            z-index: 10;
        }

        @media (max-width: 600px) {
            #level-selector-screen .level-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 400px) {
            #level-selector-screen .level-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- Intro Screen -->
    <div id="intro-screen" class="screen">
        <div class="screen-content">
            <h1>
                <span class="title-part">
                    <span style="color: #3B82F6">路</span><span style="color: #10B981">线</span><span
                        style="color: #F59E0B">规</span><span style="color: #8B5CF6">划</span>
                </span>
                <span class="title-part">
                    <span style="color: #EC4899">大</span><span style="color: #14B8A6">挑</span><span
                        style="color: #3B82F6">战</span>
                </span>
            </h1>
            <p>相同数字连线，禁止交叉</p>
            <button class="btn" onclick="startGame()">
                <span style="color: #3B82F6">进</span><span style="color: #10B981">入</span><span
                    style="color: #F59E0B">游</span><span style="color: #8B5CF6">戏</span>
            </button>
        </div>
    </div>

    <!-- Level Selector Screen -->
    <div id="level-selector-screen" class="screen hidden">
        <div class="screen-content">
            <button class="close-btn" onclick="closeLevelSelector()">返回</button>
            <h2 style="color: var(--text-primary); margin-bottom: 20px;">选择关卡</h2>
            <div id="level-grid" class="level-grid"></div>
        </div>
    </div>

    <!-- Top Bar -->
    <div id="top-bar" class="top-bar hidden">
        <div class="game-title">
            <span style="color: #3B82F6">路</span><span style="color: #10B981">线</span><span
                style="color: #F59E0B">规</span><span style="color: #8B5CF6">划</span><span
                style="color: #EC4899">大</span><span style="color: #14B8A6">挑</span><span
                style="color: #3B82F6">战</span>
        </div>
        <div style="position: absolute; left: 50%; transform: translateX(-50%);">
            <button id="level-indicator" class="top-btn" onclick="handleIndicatorClick()">第 1 关</button>
        </div>
        <button id="btn-restart" class="top-btn" onclick="resetCurrentPuzzle()">再试一次</button>
    </div>

    <!-- Interactive Canvas -->
    <div id="canvas-container">
        <svg id="game-svg">
            <defs>
                <filter id="rough-filter" x="-20%" y="-20%" width="140%" height="140%">
                    <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="noise"></feTurbulence>
                    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3"></feDisplacementMap>
                </filter>
            </defs>
            <!-- Hand-drawn Fullscreen Border -->
            <rect id="border-rect" x="70" y="90" width="100" height="100" fill="none" stroke="var(--text-primary)"
                stroke-width="4" filter="url(#rough-filter)" pointer-events="none"></rect>

            <g id="lines-group"></g>
            <g id="current-path-group"></g>
            <g id="nodes-group"></g>
        </svg>
        <div id="feedback-layer"></div>
    </div>

    <script>
        const GamePhase = { INTRO: 'intro', PLAYING: 'playing', COMPLETED: 'completed' };
        const STORAGE_KEY = 'szllk_state';
        const lineColors = ['#3B82F6', '#10B981', '#F59E0B', '#8B5CF6', '#EC4899', '#14B8A6'];

        let state = {
            phase: GamePhase.INTRO,
            activeNode: null,
            currentPath: [],
            completedLines: [],
            nodes: [],
            cw: 100,
            ch: 60,
            currentColor: '#3B82F6',
            pairCount: 3,
            currentLevel: 1,
            maxUnlockedLevel: 1,
            solutionPaths: [],
            isFirstLevel: true,
            isRandomMode: false
        };

        let winW = window.innerWidth;
        let winH = window.innerHeight;
        let edgePadX = winW < 600 ? 25 : 70;
        let edgePadYTop = winW < 600 ? 70 : 90;
        let edgePadYBot = winW < 600 ? 30 : 70;

        const svg = document.getElementById('game-svg');
        const linesGroup = document.getElementById('lines-group');
        const currentPathGroup = document.getElementById('current-path-group');
        const nodesGroup = document.getElementById('nodes-group');

        function getCatmullRomPoints(points, pointsPerSegment = 15) {
            if (points.length < 2) return points;
            let p = [points[0], ...points, points[points.length - 1]];
            let result = [];
            for (let i = 1; i < p.length - 2; i++) {
                let p0 = p[i - 1], p1 = p[i], p2 = p[i + 1], p3 = p[i + 2];
                for (let j = 0; j <= pointsPerSegment; j++) {
                    if (i > 1 && j === 0) continue;
                    let t = j / pointsPerSegment;
                    let t2 = t * t;
                    let t3 = t2 * t;
                    let x = 0.5 * (
                        (2 * p1.x) +
                        (-p0.x + p2.x) * t +
                        (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 +
                        (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3
                    );
                    let y = 0.5 * (
                        (2 * p1.y) +
                        (-p0.y + p2.y) * t +
                        (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 +
                        (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3
                    );
                    result.push({ x, y });
                }
            }
            return result;
        }

        function simplifyPath(path) {
            if (path.length <= 4) return path;
            const result = [path[0]];
            for (let i = 1; i < path.length - 1; i++) {
                const pPrev = path[i - 1];
                const pCurr = path[i];
                const pNext = path[i + 1];
                const dx1 = pCurr.x - pPrev.x;
                const dy1 = pCurr.y - pPrev.y;
                const dx2 = pNext.x - pCurr.x;
                const dy2 = pNext.y - pCurr.y;
                const cross = dx1 * dy2 - dy1 * dx2;
                if (Math.abs(cross) > 0.01) {
                    result.push(pCurr);
                } else if (i % 3 === 0) {
                    result.push(pCurr);
                }
            }
            result.push(path[path.length - 1]);
            return result;
        }

        function markOccupied(path, occupiedCells, padding) {
            const cols = 80;
            const gridMarginX = 25;
            const gridMarginY = 25;
            const rpx = winW - gridMarginX * 2;
            const rpy = winH - gridMarginY * 2;
            const cellW = rpx / (cols - 1);
            const rows = Math.round(rpy / cellW);

            function toGrid(x, y) {
                return {
                    c: Math.min(cols - 1, Math.max(0, Math.round((x - gridMarginX) / rpx * (cols - 1)))),
                    r: Math.min(rows - 1, Math.max(0, Math.round((y - gridMarginY) / rpy * (rows - 1))))
                };
            }

            path.forEach(pt => {
                const g = toGrid(pt.x, pt.y);
                for (let dr = -padding; dr <= padding; dr++) {
                    for (let dc = -padding; dc <= padding; dc++) {
                        const nr = g.r + dr;
                        const nc = g.c + dc;
                        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
                            occupiedCells.add(nr * cols + nc);
                        }
                    }
                }
            });
        }

        function findGridPath(startPt, endPt, startNode, endNode, otherNodes, occupiedCells, padding) {
            const cols = 80;
            const gridMarginX = 25;
            const gridMarginY = 25;
            const rpx = winW - gridMarginX * 2;
            const rpy = winH - gridMarginY * 2;
            const cellW = rpx / (cols - 1);
            const rows = Math.round(rpy / cellW);
            const cellH = rpy / (rows - 1);

            function toGrid(x, y) {
                return {
                    c: Math.min(cols - 1, Math.max(0, Math.round((x - gridMarginX) / rpx * (cols - 1)))),
                    r: Math.min(rows - 1, Math.max(0, Math.round((y - gridMarginY) / rpy * (rows - 1))))
                };
            }

            function toPixel(c, r) {
                return {
                    x: gridMarginX + c * cellW,
                    y: gridMarginY + r * cellH
                };
            }

            const start = toGrid(startPt.x, startPt.y);
            const end = toGrid(endPt.x, endPt.y);

            const grid = new Uint8Array(cols * rows);

            const cw = state.cw;
            const ch = state.ch;
            const padX = 14;
            const padY = 14;

            otherNodes.forEach(node => {
                const xMin = node.x - cw / 2 - padX;
                const xMax = node.x + cw / 2 + padX;
                const yMin = node.y - ch / 2 - padY;
                const yMax = node.y + ch / 2 + padY;

                const gMin = toGrid(xMin, yMin);
                const gMax = toGrid(xMax, yMax);

                for (let r = gMin.r; r <= gMax.r; r++) {
                    for (let c = gMin.c; c <= gMax.c; c++) {
                        grid[r * cols + c] = 1;
                    }
                }
            });

            occupiedCells.forEach(idx => {
                if (idx >= 0 && idx < grid.length) {
                    grid[idx] = 1;
                }
            });

            const startIdx = start.r * cols + start.c;
            const endIdx = end.r * cols + end.c;

            const unblockRadius = Math.min(cw, ch) * 0.7;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const pt = toPixel(c, r);
                    const distToStart = Math.hypot(pt.x - startPt.x, pt.y - startPt.y);
                    const distToEnd = Math.hypot(pt.x - endPt.x, pt.y - endPt.y);
                    if (distToStart < unblockRadius || distToEnd < unblockRadius) {
                        grid[r * cols + c] = 0;
                    }
                }
            }

            const openSet = [startIdx];
            const inOpenSet = new Uint8Array(cols * rows);
            inOpenSet[startIdx] = 1;

            const closedSet = new Uint8Array(cols * rows);
            const cameFrom = new Int32Array(cols * rows).fill(-1);

            const gScore = new Float32Array(cols * rows).fill(Infinity);
            const fScore = new Float32Array(cols * rows).fill(Infinity);

            gScore[startIdx] = 0;
            fScore[startIdx] = Math.hypot(start.c - end.c, start.r - end.r);

            while (openSet.length > 0) {
                let lowestIdx = 0;
                for (let i = 1; i < openSet.length; i++) {
                    if (fScore[openSet[i]] < fScore[openSet[lowestIdx]]) {
                        lowestIdx = i;
                    }
                }
                const current = openSet.splice(lowestIdx, 1)[0];
                inOpenSet[current] = 0;

                if (current === endIdx) {
                    const path = [];
                    let curr = current;
                    while (curr !== -1) {
                        const r = Math.floor(curr / cols);
                        const c = curr % cols;
                        path.push(toPixel(c, r));
                        curr = cameFrom[curr];
                    }
                    path.reverse();
                    path[0] = { x: startPt.x, y: startPt.y };
                    path[path.length - 1] = { x: endPt.x, y: endPt.y };
                    return path;
                }

                closedSet[current] = 1;

                const currR = Math.floor(current / cols);
                const currC = current % cols;

                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        const nr = currR + dr;
                        const nc = currC + dc;
                        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
                            const neighborIdx = nr * cols + nc;
                            if (closedSet[neighborIdx] === 1) continue;
                            if (grid[neighborIdx] === 1) continue;

                            if (dr !== 0 && dc !== 0) {
                                if (grid[currR * cols + nc] === 1 || grid[nr * cols + currC] === 1) {
                                    continue;
                                }
                            }

                            const dist = Math.hypot(dc, dr);
                            const tentativeGScore = gScore[current] + dist;

                            if (tentativeGScore < gScore[neighborIdx]) {
                                cameFrom[neighborIdx] = current;
                                gScore[neighborIdx] = tentativeGScore;
                                fScore[neighborIdx] = tentativeGScore + Math.hypot(nc - end.c, nr - end.r);
                                if (inOpenSet[neighborIdx] === 0) {
                                    openSet.push(neighborIdx);
                                    inOpenSet[neighborIdx] = 1;
                                }
                            }
                        }
                    }
                }
            }

            return null;
        }

        function solveLevelPaths(nodes) {
            const groups = {};
            nodes.forEach(n => {
                if (!groups[n.val]) groups[n.val] = [];
                groups[n.val].push(n);
            });

            const pairs = Object.keys(groups).map(val => {
                return {
                    val: parseInt(val),
                    start: groups[val][0],
                    end: groups[val][1]
                };
            });

            const permutations = [
                [0, 1, 2],
                [0, 2, 1],
                [1, 0, 2],
                [1, 2, 0],
                [2, 0, 1],
                [2, 1, 0]
            ];

            for (let padding of [1, 0]) {
                for (let perm of permutations) {
                    const occupiedCells = new Set();
                    const solutions = [];
                    let success = true;

                    for (let idx of perm) {
                        const pair = pairs[idx];
                        if (!pair || !pair.start || !pair.end) continue;
                        const otherNodes = nodes.filter(n => n !== pair.start && n !== pair.end);
                        const path = findGridPath(pair.start, pair.end, pair.start, pair.end, otherNodes, occupiedCells, padding);
                        if (path) {
                            solutions.push({ val: pair.val, path: path });
                            markOccupied(path, occupiedCells, padding);
                        } else {
                            success = false;
                            break;
                        }
                    }

                    if (success) {
                        solutions.sort((a, b) => a.val - b.val);
                        return solutions.map(sol => {
                            const simplified = simplifyPath(sol.path);
                            return {
                                val: sol.val,
                                path: getCatmullRomPoints(simplified, 15)
                            };
                        });
                    }
                }
            }

            return pairs.map(pair => {
                return {
                    val: pair.val,
                    path: getCatmullRomPoints([pair.start, pair.end], 15)
                };
            });
        }

        function generateNewPuzzle(skipStart = false) {
            let cw = Math.max(70, winW * 0.12);
            let ch = Math.max(50, winH * 0.10);
            if (state.currentLevel >= 9) {
                cw *= 0.7;
                ch *= 0.7;
            }
            state.cw = cw;
            state.ch = ch;
            const margin = 15;

            const preset = PRESET_LEVELS[state.currentLevel - 1] || PRESET_LEVELS[0];

            function resolveTrackX(tx) {
                const playX = edgePadX;
                const playW = winW - edgePadX * 2;
                switch (tx) {
                    case 'edge_left': return playX + state.cw / 2;
                    case 'col1_4': return playX + state.cw / 2;
                    case 'col2_4': return playX + state.cw / 2 + (playW - state.cw) / 3;
                    case 'col3_4': return playX + state.cw / 2 + 2 * (playW - state.cw) / 3;
                    case 'col4_4': return playX + playW - state.cw / 2;
                    case 'left_1': return playX + state.cw / 2;
                    case 'left_2': return playX + state.cw * 1.5;
                    case 'left_3': return playX + state.cw * 2.5;
                    case 'col1_5': return playX + playW * 0.3;
                    case 'left': return playX + playW / 6;
                    case 'midleft': return playX + playW / 3;
                    case 'col2_5': return playX + playW * 0.35;
                    case 'mid': return playX + playW * 0.5;
                    case 'col3_5': return playX + playW * 0.65;
                    case 'midright': return playX + playW * 2 / 3;
                    case 'col2_6': return playX + state.cw / 2 + (playW - state.cw) * 0.2;
                    case 'col3_6': return playX + state.cw / 2 + (playW - state.cw) * 0.4;
                    case 'col4_6': return playX + state.cw / 2 + (playW - state.cw) * 0.6;
                    case 'col5_6': return playX + state.cw / 2 + (playW - state.cw) * 0.8;
                    case 'col4_5': return playX + playW * 0.7;
                    case 'right': return playX + playW * 5 / 6;
                    case 'right_1': return playX + playW - state.cw * 2.5;
                    case 'right_2': return playX + playW - state.cw * 1.5;
                    case 'right_3': return playX + playW - state.cw / 2;
                    case 'edge_right': return playX + playW - state.cw / 2;
                    default: return playX + playW * 0.5;
                }
            }

            function resolveTrackY(ty) {
                const playY = edgePadYTop;
                const playH = winH - edgePadYTop - edgePadYBot;
                switch (ty) {
                    case 'edge_top': return playY + state.ch / 2;
                    case 'row1_4': return playY + state.ch / 2;
                    case 'row2_4': return playY + state.ch / 2 + (playH - state.ch) / 3;
                    case 'row3_4': return playY + state.ch / 2 + 2 * (playH - state.ch) / 3;
                    case 'row4_4': return playY + playH - state.ch / 2;
                    case 'row1_7': return playY + state.ch / 2;
                    case 'row2_7': return playY + state.ch / 2 + (playH - state.ch) / 6;
                    case 'row3_7': return playY + state.ch / 2 + 2 * (playH - state.ch) / 6;
                    case 'row4_7': return playY + state.ch / 2 + 3 * (playH - state.ch) / 6;
                    case 'row5_7': return playY + state.ch / 2 + 4 * (playH - state.ch) / 6;
                    case 'row6_7': return playY + state.ch / 2 + 5 * (playH - state.ch) / 6;
                    case 'row7_7': return playY + playH - state.ch / 2;
                    case 'row1_6': return playY + state.ch / 2;

                    case 'row3_6': return playY + state.ch / 2 + 2 * (playH - state.ch) / 5;
                    case 'row4_6': return playY + state.ch / 2 + 3 * (playH - state.ch) / 5;

                    case 'group_top_3': return playY + state.ch / 2 + state.ch * 2;
                    case 'group_bot_1': return playY + playH - state.ch / 2 - state.ch * 2;
                    case 'group_bot_2': return playY + playH - state.ch / 2 - state.ch;
                    case 'group_bot_3': return playY + playH - state.ch / 2;
                    case 'stack_1': return playY + playH * 0.5 - state.ch;
                    case 'stack_2': return playY + playH * 0.5;
                    case 'stack_3': return playY + playH * 0.5 + state.ch;
                    case 'stack4_1': return playY + playH * 0.5 - state.ch * 1.5;
                    case 'stack4_2': return playY + playH * 0.5 - state.ch * 0.5;
                    case 'stack4_3': return playY + playH * 0.5 + state.ch * 0.5;
                    case 'stack4_4': return playY + playH * 0.5 + state.ch * 1.5;
                    case 'top': return playY + state.ch / 2 + margin;
                    case 'q1': return playY + playH * 0.25;
                    case 'midtop': return playY + playH * 0.35;
                    case 'mid': return playY + playH * 0.5;
                    case 'midbot': return playY + playH * 0.65;
                    case 'q3': return playY + playH * 0.75;
                    case 'bot': return playY + playH - state.ch / 2 - margin;
                    case 'edge_bot': return playY + playH - state.ch / 2;
                    default: return playY + playH * 0.5;
                }

            if (winW < 600 && preset.mobileNodes) {
                nodesData = preset.mobileNodes;

                id: idx,
                val: n.val,
                x: resolveTrackX(n.tx),
                y: resolveTrackY(n.ty),

            state.currentPath = [];

                indicator.textContent = `第 ${state.currentLevel} 关`;
                indicator.classList.remove('success-anim');
            }
            if (!skipStart) { startGame(false); }

        function updateLayout() {
            const oldW = winW || window.innerWidth;
            const oldH = winH || window.innerHeight;
            winW = window.innerWidth; winH = window.innerHeight;
            edgePadX = winW < 600 ? 25 : 70;
            edgePadYTop = winW < 600 ? 70 : 90;
            edgePadYBot = winW < 600 ? 30 : 70;
            const borderRect = document.getElementById('border-rect');
            if (borderRect) { borderRect.setAttribute("x", edgePadX); borderRect.setAttribute("y", edgePadYTop); borderRect.setAttribute("width", winW - edgePadX * 2); borderRect.setAttribute("height", winH - edgePadYTop - edgePadYBot); }
            let cw = Math.max(70, winW * 0.12);
            let ch = Math.max(50, winH * 0.10);
            if (state.currentLevel >= 9) {
                cw *= 0.7;
                ch *= 0.7;
            }
            if (state.nodes.length > 0) {
                const scaleX = winW / oldW; const scaleY = winH / oldH;
                state.nodes.forEach(n => { n.x *= scaleX; n.y *= scaleY; });
                state.completedLines.forEach(line => { line.path.forEach(p => { p.x *= scaleX; p.y *= scaleY; }); });
                if (state.currentPath.length > 0) state.currentPath.forEach(p => { p.x *= scaleX; p.y *= scaleY; });
            }
            state.cw = cw; state.ch = ch;
            if (state.phase === GamePhase.PLAYING || state.phase === GamePhase.INTRO || state.phase === GamePhase.COMPLETED) { renderNodes(false); renderCompletedLines(); renderCurrentLine(); }
        }

        function handleIndicatorClick() {
            const indicator = document.getElementById('level-indicator');
            if (indicator.classList.contains('success-anim')) {
                if (state.currentLevel < PRESET_LEVELS.length) {
                    state.currentLevel++;
                    saveState();
                    generateNewPuzzle(false);

                    state.currentLevel = 1;
                    saveState();
                    generateNewPuzzle(false);
                }
            } else {
                openLevelSelector();

                case 'group_top_1': return 0.1;
                case 'group_top_2': return 0.25;
                case 'group_top_3': return 0.4;
                case 'group_bot_1': return 0.6;
                case 'group_bot_2': return 0.75;
                case 'group_bot_3': return 0.9;
                case 'stack_1': return 0.35;
                case 'stack_2': return 0.5;
                case 'stack_3': return 0.65;
                case 'stack4_1': return 0.28;
                case 'stack4_2': return 0.43;
                case 'stack4_3': return 0.58;
                case 'stack4_4': return 0.73;
                case 'top': return 0.2;
                case 'q1': return 0.25;
                case 'midtop': return 0.35;
                case 'mid': return 0.5;
                case 'midbot': return 0.65;
                case 'q3': return 0.75;
                case 'bot': return 0.8;
                case 'edge_bot': return 0.9;
                default: return 0.5;
            }
        }

        function openLevelSelector() {
            const grid = document.getElementById('level-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= PRESET_LEVELS.length; i++) {
                const btn = document.createElement('button');
                btn.className = 'level-btn';
                if (i > state.maxUnlockedLevel) {
                    btn.disabled = true;
                } else {
                    btn.onclick = () => {
                        state.currentLevel = i;
                        saveState();
                        generateNewPuzzle(false);
                        closeLevelSelector();
                    };
                }

                const levelData = PRESET_LEVELS[i - 1];
                let nodesData = levelData.nodes;
                if (window.innerWidth < 600 && levelData.mobileNodes) {
                    nodesData = levelData.mobileNodes;
                }

                let svgHtml = `<svg viewBox="0 0 100 80">`;
                svgHtml += `<rect x="5" y="5" width="90" height="70" fill="none" stroke="var(--text-primary)" stroke-width="1" rx="4" filter="url(#rough-filter)"/>`;
                nodesData.forEach(n => {
                    const x = getMiniTrackRatioX(n.tx) * 90 + 5;
                    const y = getMiniTrackRatioY(n.ty) * 70 + 5;
                    const color = lineColors[(n.val - 1) % lineColors.length];
                    const strokeColor = (i > state.maxUnlockedLevel) ? '#9ca3af' : color;
                    svgHtml += `<rect x="${x - 8}" y="${y - 6}" width="16" height="12" fill="white" stroke="${strokeColor}" stroke-width="0.8" rx="2" />`;
                    if (i <= state.maxUnlockedLevel) {
                        svgHtml += `<text x="${x}" y="${y}" font-size="8" font-family="'Architects Daughter', 'ZCOOL KuaiLe', cursive, sans-serif" font-weight="bold" fill="${strokeColor}" dominant-baseline="central" text-anchor="middle">${n.val}</text>`;
                    }
                });
                svgHtml += `</svg>`;
                const title = document.createElement('div');
                title.textContent = `第 ${i} 关`;
                title.className = 'level-thumb-title';

                btn.innerHTML = svgHtml;
                btn.appendChild(title);
                grid.appendChild(btn);
            }
            document.getElementById('level-selector-screen').classList.remove('hidden');
        }

        function closeLevelSelector() {
            document.getElementById('level-selector-screen').classList.add('hidden');
        }

        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed.maxUnlockedLevel) {
                        state.maxUnlockedLevel = parsed.maxUnlockedLevel;
                    }
                    if (parsed.currentLevel && parsed.currentLevel <= state.maxUnlockedLevel) {
                        state.currentLevel = parsed.currentLevel;
                    }
                }
            } catch (e) { }
        }

        window.onload = () => {
            loadState();
            generateNewPuzzle(true);
        };

        window.addEventListener('resize', updateLayout);
        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                pairCount: state.pairCount,
                maxUnlockedLevel: state.maxUnlockedLevel,
                currentLevel: state.currentLevel
            }));
        }

        function startGame(resume = false) {
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('top-bar').classList.remove('hidden');
            state.phase = GamePhase.PLAYING;
            if (!resume) {
                state.completedLines = []; state.currentPath = [];
                state.nodes.forEach(n => n.completed = false);
                saveState();
            }
            renderNodes(true); renderCompletedLines(); renderCurrentLine();

            setTimeout(() => {
                const introScreen = document.getElementById('intro-screen');
                introScreen.querySelector('h1').innerHTML = `
                    <span class="title-part">
                        <span style="color: ${lineColors[0]}">路</span><span style="color: ${lineColors[1]}">线</span><span style="color: ${lineColors[2]}">规</span><span style="color: ${lineColors[3]}">划</span>
                    </span>
                    <span class="title-part">
                        <span style="color: ${lineColors[4]}">大</span><span style="color: ${lineColors[5]}">挑</span><span style="color: ${lineColors[0]}">战</span>
                    </span>
                `;
                introScreen.querySelector('p').textContent = "相同数字连线，禁止交叉";
                introScreen.querySelector('.btn').innerHTML = `
                    <span style="color: ${lineColors[0]}">进</span><span style="color: ${lineColors[1]}">入</span><span style="color: ${lineColors[2]}">游</span><span style="color: ${lineColors[3]}">戏</span>
                `;
            }, 300);
        }

        function resetCurrentPuzzle() {
            state.completedLines = [];
            state.currentPath = [];
            state.nodes.forEach(n => n.completed = false);
            saveState();
            renderNodes(true);
            renderCompletedLines();
            renderCurrentLine();
        }

        function renderNodes(animate = false) {
            const svgNS = "http://www.w3.org/2000/svg";
            nodesGroup.innerHTML = '';
            state.nodes.forEach(node => {
                const g = document.createElementNS(svgNS, "g");
                g.setAttribute("class", "node-group");

                if (animate) {
                    g.style.opacity = "0";
                    g.style.animation = `jellyPop 0.6s ease-out forwards`;
                    g.style.animationDelay = `${(node.val - 1) * 0.15}s`;
                } else {
                    g.style.opacity = "1";
                }

                const bbox = document.createElementNS(svgNS, "rect");
                bbox.setAttribute("x", node.x - state.cw / 2 - 20); bbox.setAttribute("y", node.y - state.ch / 2 - 20);
                bbox.setAttribute("width", state.cw + 40); bbox.setAttribute("height", state.ch + 40);
                bbox.setAttribute("fill", "transparent"); bbox.setAttribute("style", "pointer-events: all;");
                g.appendChild(bbox);
                let nodeStroke = "var(--text-primary)", strokeWidth = "3";
                if (node.completed) { nodeStroke = lineColors[(node.val - 1) % lineColors.length]; strokeWidth = "5"; }
                const rect = document.createElementNS(svgNS, "rect");
                rect.setAttribute("x", node.x - state.cw / 2); rect.setAttribute("y", node.y - state.ch / 2);
                rect.setAttribute("width", state.cw); rect.setAttribute("height", state.ch);
                rect.setAttribute("class", "card-rect"); rect.style.stroke = nodeStroke; rect.style.strokeWidth = strokeWidth;
                const text = document.createElementNS(svgNS, "text");
                text.setAttribute("x", node.x); text.setAttribute("y", node.y);
                text.setAttribute("dominant-baseline", "central");
                text.setAttribute("text-anchor", "middle"); text.setAttribute("class", "node-text");
                text.textContent = node.val; text.style.fill = lineColors[(node.val - 1) % lineColors.length];
                g.appendChild(rect); g.appendChild(text);
                let lastTap = 0;
                g.addEventListener('mousedown', (e) => handleNodeDown(e, node));
                g.addEventListener('touchstart', (e) => {
                    const currentTime = new Date().getTime();
                    if (currentTime - lastTap < 300) { e.preventDefault(); handleNodeDoubleTap(node); }
                    else { handleNodeDown(e, node); }
                    lastTap = currentTime;
                }, { passive: false });
                g.addEventListener('dblclick', (e) => { e.preventDefault(); handleNodeDoubleTap(node); });
                nodesGroup.appendChild(g); node.element = g;
            });
        }

        function handleNodeDoubleTap(node) {
            if (!node.completed) return;
            const idx = state.completedLines.findIndex(l => l.val === node.val);
            if (idx > -1) {
                state.completedLines.splice(idx, 1);
                state.nodes.filter(n => n.val === node.val).forEach(n => n.completed = false);
                saveState(); renderNodes(); renderCompletedLines();
                showFeedback(node.x, node.y, "已撤销", "undo");
            }
        }

        function getSVGPoint(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX, y: clientY };
        }

        function handleNodeDown(e, node) {
            if (state.phase !== GamePhase.PLAYING || node.completed) return;
            e.preventDefault();
            state.activeNode = node;
            state.currentPath = [{ x: node.x, y: node.y }];
            state.currentColor = lineColors[(node.val - 1) % lineColors.length];
        }

        function handleGlobalDown(e) { }

        let moveTicking = false;
        let pendingMoveEvent = null;

        function handleMove(e) {
            if (!state.activeNode) return;
            e.preventDefault();
            pendingMoveEvent = getSVGPoint(e);

            if (!moveTicking) {
                requestAnimationFrame(() => {
                    processMove(pendingMoveEvent);
                    moveTicking = false;
                });
                moveTicking = true;
            }
        }

        function processMove(pt) {
            if (!state.activeNode) return;
            if (state.currentPath.length > 0) {
                const lastPt = state.currentPath[state.currentPath.length - 1];
                if (Math.hypot(pt.x - lastPt.x, pt.y - lastPt.y) < 8) return;
            }

            if (pt.x <= edgePadX || pt.x >= winW - edgePadX || pt.y <= edgePadYTop || pt.y >= winH - edgePadYBot || isCrossing(pt)) { cancelCurrentPath(); return; }
            const hitRadius = Math.min(state.cw, state.ch) / 2 + 10;
            const hitOther = state.nodes.find(n => n !== state.activeNode && Math.hypot(n.x - pt.x, n.y - pt.y) < hitRadius);
            if (hitOther && (hitOther.val !== state.activeNode.val || hitOther.completed)) { cancelCurrentPath(); return; }
            state.currentPath.push({ x: pt.x, y: pt.y }); renderCurrentLine();
        }

        function cancelCurrentPath() { state.activeNode = null; state.currentPath = []; renderCurrentLine(); }
        function handleEnd(e) {
            if (!state.activeNode) return;
            const pt = state.currentPath[state.currentPath.length - 1];
            const hitRadius = Math.max(state.cw, state.ch);
            const target = state.nodes.find(n => n !== state.activeNode && n.val === state.activeNode.val && !n.completed && Math.hypot(n.x - pt.x, n.y - pt.y) < hitRadius);
            if (target) {
                target.completed = true; state.activeNode.completed = true;
                state.completedLines.push({ path: [...state.currentPath, { x: target.x, y: target.y }], val: state.activeNode.val, color: state.currentColor });
                saveState(); renderNodes(); showFeedback(target.x, target.y, "连接成功！", "success");
                if (state.completedLines.length >= state.nodes.length / 2) setTimeout(showFinalResult, 800);
            }
            state.activeNode = null; state.currentPath = []; renderCompletedLines(); renderCurrentLine();
        }

        function renderCompletedLines() {
            const svgNS = "http://www.w3.org/2000/svg";
            linesGroup.innerHTML = '';
            state.completedLines.forEach(line => {
                const pathStr = line.path.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
                const pathEl = document.createElementNS(svgNS, "path");
                pathEl.setAttribute("d", pathStr); pathEl.setAttribute("class", "hand-drawn-line");
                pathEl.setAttribute("stroke", line.color);
                linesGroup.appendChild(pathEl);
            });
        }

        let currentPathEl = null;

        function renderCurrentLine() {
            const svgNS = "http://www.w3.org/2000/svg";
            if (state.currentPath.length > 1) {
                const pathStr = state.currentPath.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
                if (!currentPathEl) {
                    currentPathEl = document.createElementNS(svgNS, "path");
                    currentPathEl.setAttribute("class", "hand-drawn-line");
                    currentPathEl.setAttribute("stroke-dasharray", "8,8");
                    currentPathGroup.appendChild(currentPathEl);
                }
                currentPathEl.setAttribute("d", pathStr);
                currentPathEl.setAttribute("stroke", state.currentColor);
            } else {
                if (currentPathEl) {
                    currentPathGroup.removeChild(currentPathEl);
                    currentPathEl = null;
                }
            }
        }

        function isCrossing(newPt) {
            if (state.currentPath.length < 2) return false;
            const p1 = state.currentPath[state.currentPath.length - 1], p2 = newPt;
            for (let line of state.completedLines) {
                for (let i = 0; i < line.path.length - 1; i++) if (intersect(p1, p2, line.path[i], line.path[i + 1])) return true;
            }
            for (let i = 0; i < state.currentPath.length - 2; i++) if (intersect(p1, p2, state.currentPath[i], state.currentPath[i + 1])) return true;
            return false;
        }

        function intersect(p1, p2, p3, p4) {
            const det = (p2.x - p1.x) * (p4.y - p3.y) - (p2.y - p1.y) * (p4.x - p3.x);
            if (det === 0) return false;
            const lambda = ((p4.y - p3.y) * (p4.x - p1.x) + (p3.x - p4.x) * (p4.y - p1.y)) / det;
            const gamma = ((p1.y - p2.y) * (p4.x - p1.x) + (p2.x - p1.x) * (p4.y - p1.y)) / det;
            return (0 < lambda && lambda < 1) && (0 < gamma && gamma < 1);
        }

        function showFeedback(x, y, text, type) {
            const el = document.createElement('div');
            el.className = `feedback-pop pop-${type}`;
            el.style.left = `${x}px`; el.style.top = `${y}px`;
            el.style.transform = 'translate(-50%, -100%)'; el.innerText = text;
            document.getElementById('feedback-layer').appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function showFinalResult() {
            state.phase = GamePhase.COMPLETED;

            if (state.currentLevel === state.maxUnlockedLevel && state.maxUnlockedLevel < PRESET_LEVELS.length) {
                state.maxUnlockedLevel++;
                saveState();
            }

            const indicator = document.getElementById('level-indicator');
            if (indicator) {
                indicator.classList.add('success-anim');
                indicator.textContent = '下一关';
            }
        }

        svg.addEventListener('mousedown', handleGlobalDown);
        svg.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        svg.addEventListener('touchstart', handleGlobalDown, { passive: false });
        svg.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);
    </script>
</body>

</html>
