<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>路线规划大挑战</title>
    <style>
        :root {
            --bg-eye-care: #F4F3EC;
            --brand-primary: #3B82F6;
            --status-success: #10B981;
            --status-error: #FB7185;
            --status-focus: #F59E0B;
            --text-primary: #1F2937;
            --text-secondary: #4B5563;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'ZCOOL KuaiLe', cursive, system-ui, -apple-system, sans-serif;
            background: var(--bg-eye-care);
            color: var(--text-primary);
            touch-action: none;
            overflow: hidden;
            user-select: none;
            width: 100vw;
            height: 100vh;
        }

        /* Screen Overlays */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-eye-care);
            z-index: 50;
            transition: opacity 0.3s;
        }

        #intro-screen {
            background: rgba(244, 243, 236, 0.85);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .screen.hidden {
            display: none;
        }

        .screen-content {
            background: #fff;
            padding: 2rem 4rem;
            border: 4px solid var(--text-primary);
            box-shadow: 8px 8px 0 var(--text-primary);
            text-align: center;
            border-radius: 8px;
            max-width: 90%;
        }

        .screen h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .screen h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--status-success);
        }

        .screen p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: var(--text-secondary);
        }

        .btn {
            background: #fff;
            border: 3px solid var(--text-primary);
            padding: 0.8rem 2.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0 var(--text-primary);
            transition: all 0.1s;
            border-radius: 4px;
            color: var(--text-primary);
        }

        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0 var(--text-primary);
        }

        /* Toolbar */
        .toolbar {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 40;
        }

        .tool-btn {
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid var(--text-primary);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.2);
            transition: opacity 0.3s, transform 0.1s, box-shadow 0.1s, background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.6;
            color: var(--text-primary);
        }

        .tool-btn:hover:not(:disabled) {
            opacity: 1;
            background: rgba(255, 255, 255, 0.8);
        }

        .tool-btn:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0 rgba(0, 0, 0, 0.2);
        }

        .tool-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            box-shadow: none;
        }

        .toolbar.hidden {
            display: none;
        }

        /* SVG Canvas Container */
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        #game-svg {
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* SVG Elements */
        .hand-drawn-line {
            fill: none;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: url(#rough-filter);
            transition: stroke 0.3s;
        }

        .card-rect {
            fill: #ffffff;
            filter: url(#rough-filter);
            rx: 8;
            transition: all 0.2s;
        }

        .node-group {
            cursor: pointer;
        }

        .node-text {
            font-size: 36px;
            font-weight: bold;
            fill: var(--text-primary);
            pointer-events: none;
        }

        /* Feedback Popups */
        #feedback-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 45;
        }

        .feedback-pop {
            position: absolute;
            animation: popUp 0.8s ease-out forwards;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff;
        }

        .pop-undo {
            color: var(--status-focus);
        }

        .pop-success {
            color: var(--status-success);
        }

        @keyframes popUp {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }

            20% {
                opacity: 1;
                transform: translateY(-10px) scale(1.1);
            }

            80% {
                opacity: 1;
                transform: translateY(-30px) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateY(-40px);
            }
        }

        @keyframes drawLine {
            to {
                stroke-dashoffset: 0;
            }
        }

        .title-part {
            display: inline;
        }

        @media (max-width: 480px) {
            .screen h1 {
                font-size: 2.2rem;
            }

            .title-part {
                display: block;
            }
        }
    </style>
</head>

<body>

    <!-- Intro Screen -->
    <div id="intro-screen" class="screen">
        <div class="screen-content">
            <h1>
                <span class="title-part">
                    <span style="color: #3B82F6">路</span><span style="color: #10B981">线</span><span
                        style="color: #F59E0B">规</span><span style="color: #8B5CF6">划</span>
                </span>
                <span class="title-part">
                    <span style="color: #EC4899">大</span><span style="color: #14B8A6">挑</span><span
                        style="color: #3B82F6">战</span>
                </span>
            </h1>
            <p>相同数字连线，禁止交叉</p>
            <button class="btn" onclick="startGame()">
                <span style="color: #3B82F6">进</span><span style="color: #10B981">入</span><span
                    style="color: #F59E0B">游</span><span style="color: #8B5CF6">戏</span>
            </button>
        </div>
    </div>

    <!-- Toolbar -->
    <div id="toolbar" class="toolbar hidden">
        <button id="btn-restart" class="tool-btn" onclick="resetCurrentPuzzle()" title="清空连线，重新尝试">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                <path d="M3 3v5h5"></path>
            </svg>
        </button>
    </div>

    <!-- Interactive Canvas -->
    <div id="canvas-container">
        <svg id="game-svg">
            <defs>
                <filter id="rough-filter" x="-20%" y="-20%" width="140%" height="140%">
                    <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="noise"></feTurbulence>
                    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3"></feDisplacementMap>
                </filter>
            </defs>
            <!-- Hand-drawn Fullscreen Border -->
            <rect id="border-rect" x="15" y="15" width="100" height="100" fill="none" stroke="var(--text-primary)"
                stroke-width="4" filter="url(#rough-filter)" pointer-events="none"></rect>

            <g id="lines-group"></g>
            <g id="current-path-group"></g>
            <g id="nodes-group"></g>
        </svg>
        <div id="feedback-layer"></div>
    </div>
