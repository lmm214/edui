    <title>极简格子</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: linear-gradient(#aaa 1px, transparent 1px),
                linear-gradient(90deg, #aaa 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            overflow: hidden;
            font-family: sans-serif;
        }

        .container {
            flex: 1;
            position: relative;
            touch-action: none;
        }

        #draw-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            pointer-events: none;
        }

        .draggable {
            position: absolute;
            cursor: move;
            border: 1px solid rgba(0, 0, 0, 0.3);
            will-change: transform;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .draggable.outline-mode {
            border-width: 4px;
            border-style: solid;
        }

        .draggable.blue,
        .source.blue.active {
            border-color: #357abd;
        }

        .draggable.orange,
        .source.orange.active {
            border-color: #d48a1b;
        }

        .draggable.red,
        .source.red.active {
            border-color: #b00217;
        }

        .draggable.green,
        .source.green.active {
            border-color: #68ad1d;
        }

        .draggable.blue.outline-mode {
            background-color: rgba(74, 144, 226, 0.2) !important;
        }

        .draggable.orange.outline-mode {
            background-color: rgba(245, 166, 35, 0.2) !important;
        }

        .draggable.red.outline-mode {
            background-color: rgba(208, 2, 27, 0.2) !important;
        }

        .draggable.green.outline-mode {
            background-color: rgba(126, 211, 33, 0.2) !important;
        }

        .source-container {
            padding: 15px 20px;
            background: #fdfdfd;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 20px;
            align-items: center;
            z-index: 60;
        }

        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-left: auto;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .tool-group {
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.04);
            padding: 4px;
            border-radius: 10px;
        }

        .button {
            height: 48px;
            background: #222;
            font-size: 1.1rem;
            color: #333;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            white-space: nowrap;
            transition: transform 0.1s, opacity 0.2s;
        }

        .button.tool-btn {
            padding: 0 12px;
            opacity: 0.6;
        }

        .button.active {
            opacity: 1;
            transform: scale(1.05);
        }

        .button.circle {
            width: 48px;
            border-radius: 50%;
            padding: 0;
        }

        .button:active {
            transform: scale(0.95);
        }

        .size-control {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: #555;
        }

        .size-control input {
            width: 100px;
            height: 20px;
            -webkit-appearance: none;
            background: transparent;
        }

        .size-control input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #4a90e2;
            border-radius: 50%;
            cursor: pointer;
            margin-top: -8px;
        }

        .size-control input::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: #ddd;
            border-radius: 2px;
        }

        .source {
            width: 50px;
            height: 50px;
            cursor: pointer;
            border: 3px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            opacity: 0.4;
            transition: all 0.2s;
            user-select: none;
        }

        .source.active {
            opacity: 1;
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .blue {
            background-color: #4a90e2;
        }

        .orange {
            background-color: #f5a623;
        }

        .red {
            background-color: #d0021b;
        }

        .green {
            background-color: #7ed321;
        }

        /* Macaron colors for specific buttons */
        #outline-btn {
            background-color: #bae1ff;
        }

        /* Light blue */
        #clear-btn {
            background-color: #ffb3ba;
        }

        /* Light pink */
        #hand-btn {
            background-color: #e5e5e5;
        }

        #hand-btn.active {
            box-shadow: inset 0 0 0 3px #999, 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        #pen-btn {
            background-color: #ffffba;
        }

        #pen-btn.active {
            box-shadow: inset 0 0 0 3px #c4c40b, 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        #eraser-btn {
            background-color: #baffc9;
        }

        #eraser-btn.active {
            box-shadow: inset 0 0 0 3px #6eb381, 0 4px 8px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>
    <div class="container" id="container">
        <canvas id="draw-canvas"></canvas>
    </div>
    <div class="source-container">
        <div class="source blue active" id="source-blue" data-color="blue">16</div>
        <div class="source orange" id="source-orange" data-color="orange">16</div>
        <div class="source red" id="source-red" data-color="red">16</div>
        <div class="source green" id="source-green" data-color="green">16</div>
        <div class="controls">
            <div class="tool-group">
                <button class="button tool-btn active" id="hand-btn">手</button>
                <button class="button tool-btn" id="pen-btn">笔</button>
                <button class="button tool-btn" id="eraser-btn">橡皮</button>
            </div>
            <div class="size-control">
                <label>大小:</label>
                <input type="range" id="size-input" value="90" min="20" max="250" step="2">
            </div>
            <button class="button" id="outline-btn">周长模式</button>
            <button class="button circle" id="clear-btn">清</button>
        </div>
    </div>
