<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>探索圆柱与圆锥的体积关系</title>
    <style>
        /* =============================================
           配色参考附件：
           背景: 暖米白 #EDE8DF
           圆锥: 橙色系  #E07B3F
           圆柱: 青蓝系  #5ACFCA
           文字: 深棕/炭灰 #3D3530
           参数标注: 中性灰  #8A7F78
           高亮红: #E07878
           =============================================
           布局常量:
           高度规: 420px (7条线, 每格70px)
           显示单位换算: px / (210/90) = px * (3/7)
             → 210px 显示为 90，70px 显示为 30
           ============================================= */

        :root {
            --bg: #EDE8DF;
            --panel-bg: rgba(255, 255, 255, 0.6);
            --text: #3D3530;
            --text-muted: #8A7F78;
            --cone-fill: #E07B3F;
            --cone-edge: #C05E28;
            --cyl-fill: #5ACFCA;
            --cyl-edge: #3AADA8;
            --accent-red: #E07878;
            --guide-line: rgba(100, 80, 60, 0.3);
            --guide-height: 420px;
            --stage-height: 350px;
            --stage-width: 680px;
            /* 换算系数: 1显示单位 = 7/3 px */
            --px-per-unit: 2.3333;
            /* 7/3 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100vw;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }

        /* ── 顶部浮层 ── */
        .floating-header {
            position: fixed;
            top: 18px;
            left: 20px;
            background: rgba(255, 255, 255, 0.55);
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.12), inset -1px -1px 3px rgba(255, 255, 255, 0.9);
            padding: 9px 22px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--text);
            z-index: 500;
        }

        .floating-constraint {
            position: fixed;
            top: 18px;
            right: 20px;
            background: rgba(255, 255, 255, 0.55);
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.12), inset -1px -1px 3px rgba(255, 255, 255, 0.9);
            padding: 8px 16px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 500;
        }

        #constraint-label {
            font-weight: bold;
            color: var(--cone-fill);
            min-width: 60px;
        }

        .btn-toggle {
            background: var(--cone-fill);
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
            margin-right: 10px;
        }

        .btn-toggle:active {
            transform: scale(0.92);
            opacity: 0.85;
        }

        .btn-reset {
            background: rgba(0, 0, 0, 0.08);
            color: var(--text);
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.15s, background 0.15s;
        }

        .btn-reset:active {
            transform: scale(0.92);
        }

        /* ── 中央场景 ── */
        #scene {
            position: fixed;
            left: 54%;
            transform: translateX(-50%);
            top: 120px;
            bottom: 170px;
            /* 为底部栏留空 */
            width: var(--stage-width);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #stage {
            position: relative;
            width: 100%;
            height: var(--guide-height);
            /* 锁死 420px */
            flex-shrink: 0;
        }

        /* ── 7条等高参考线 ── */
        .guide-line {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
            height: 1px;
            pointer-events: none;
            background: repeating-linear-gradient(to right,
                    var(--guide-line) 0px,
                    var(--guide-line) 12px,
                    transparent 12px,
                    transparent 22px);
        }

        /* ── 图形列 ── */
        .shape-col {
            position: absolute;
            bottom: 50px;
            width: 260px;
            height: var(--stage-height);
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        #col-cone {
            left: 40px;
        }

        #col-cyl {
            right: 40px;
        }

        .shape-svg {
            display: block;
            overflow: visible;
        }

        /* ── 侧边高度滑块（更短）── */
        .h-ctrl {
            min-width: 200px;
            position: fixed;
            top: 44%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            z-index: 300;
        }

        .h-ctrl.left {
            left: 50px;
        }

        .h-ctrl.right {
            right: 50px;
        }

        .h-ctrl label {
            font-size: 1.05rem;
            font-weight: bold;
            color: var(--text-muted);
        }

        .h-badge {
            font-family: 'Courier New', monospace;
            font-size: 1.7rem;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 10px;
            white-space: nowrap;
        }

        .h-badge.cone {
            color: var(--cone-fill);
            background: rgba(224, 123, 63, 0.12);
        }

        .h-badge.cyl {
            color: var(--cyl-edge);
            background: rgba(90, 207, 202, 0.15);
        }

        input[type="range"].v-slider {
            appearance: slider-vertical;
            width: 26px;
            height: 220px;
            /* 缩短 */
            cursor: pointer;
        }

        #slider-h-cone {
            accent-color: var(--cone-fill);
        }

        #slider-h-cyl {
            accent-color: var(--cyl-edge);
        }

        /* ── 底部参数条（三行）── */
        #bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 12px 30px 16px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            z-index: 400;
        }

        .param-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-width: 250px;
        }

        /* 第一行：体积 */
        .row-v {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }

        /* 第二行：底面积标注 */
        .row-s {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }

        /* 第三行：底面积滑块 */
        .row-slider {
            width: 90%;
        }

        .lbl-v {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .lbl-s {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .badge-v {
            font-family: 'Courier New', monospace;
            font-size: 1.6rem;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 8px;
        }

        .badge-v.cone {
            color: var(--cone-fill);
            background: rgba(224, 123, 63, 0.1);
        }

        .badge-v.cyl {
            color: var(--cyl-edge);
            background: rgba(90, 207, 202, 0.15);
        }

        .badge-s {
            font-family: 'Courier New', monospace;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 8px;
        }

        .badge-s.cone {
            color: var(--cone-fill);
            background: rgba(224, 123, 63, 0.08);
        }

        .badge-s.cyl {
            color: var(--cyl-edge);
            background: rgba(90, 207, 202, 0.1);
        }

        input[type="range"].h-range {
            width: 100%;
            height: 24px;
            cursor: pointer;
        }

        #slider-s-cone {
            accent-color: var(--cone-fill);
        }

        #slider-s-cyl {
            accent-color: var(--cyl-edge);
        }

        /* 分隔线 */
        .divider {
            width: 1px;
            background: rgba(0, 0, 0, 0.1);
            align-self: stretch;
        }
    </style>
</head>

<body>

    <div class="floating-header">探索圆锥与圆柱的体积关系</div>

    <div class="floating-constraint">
        <span id="constraint-label">高相等</span>
        <button class="btn-toggle" id="btn-toggle">切换模式</button>
        <button class="btn-reset" id="btn-reset">重置</button>
    </div>

    <!-- 圆锥高度滑块（左侧）-->
    <div class="h-ctrl left">
        <label>圆锥高</label>
        <span class="h-badge cone" id="val-h-cone">90</span>
        <input type="range" id="slider-h-cone" class="v-slider" min="10" max="420" step="0.5" value="210">
    </div>

    <!-- 圆柱高度滑块（右侧）-->
    <div class="h-ctrl right">
        <label>圆柱高</label>
        <span class="h-badge cyl" id="val-h-cyl">90</span>
        <input type="range" id="slider-h-cyl" class="v-slider" min="10" max="420" step="0.5" value="210">
    </div>

    <!-- 中央场景 -->
    <div id="scene">
        <div id="stage">
            <!-- 7条等高线: top = 0,70,140,210,280,350,420 -->
            <div class="guide-line" style="top:0px"></div>
            <div class="guide-line" style="top:70px"></div>
            <div class="guide-line" style="top:140px"></div>
            <div class="guide-line" style="top:210px"></div>
            <div class="guide-line" style="top:280px"></div>
            <div class="guide-line" style="top:350px"></div>
            <div class="guide-line" style="top:420px"></div>

            <!-- 圆锥（橙色）-->
            <div class="shape-col" id="col-cone">
                <svg id="cone-svg" class="shape-svg" viewBox="0 0 280 320" width="280" height="320">
                    <!-- 底面背弧（虚线） -->
                    <path d="M 20 300 A 90 15 0 0 1 200 300" fill="none" stroke="var(--cone-edge)" stroke-width="1.5"
                        stroke-dasharray="6 4" opacity="0.6" />
                    <!-- 填色侧面 -->
                    <path d="M 20 300 L 110 20 L 200 300 Z" fill="var(--cone-fill)" opacity="0.68" />
                    <!-- 侧面轮廓 -->
                    <path d="M 20 300 L 110 20 L 200 300" fill="none" stroke="var(--cone-edge)" stroke-width="2" />
                    <!-- 底面正弧 -->
                    <path d="M 20 300 A 90 15 0 0 0 200 300" fill="rgba(224,123,71,0.68)" stroke="var(--cone-edge)"
                        stroke-width="2" />
                </svg>
            </div>

            <!-- 圆柱（青色）-->
            <div class="shape-col" id="col-cyl">
                <svg id="cyl-svg" class="shape-svg" viewBox="0 0 280 320" width="280" height="320">
                    <!-- 底面背弧 -->
                    <path d="M 20 300 A 90 15 0 0 1 200 300" fill="none" stroke="var(--cyl-edge)" stroke-width="1.5"
                        stroke-dasharray="6 4" opacity="0.6" />
                    <!-- 侧面填色 -->
                    <rect x="20" y="20" width="180" height="280" fill="var(--cyl-fill)" opacity="0.65" />
                    <!-- 右侧面阴影 -->
                    <rect x="180" y="20" width="20" height="280" fill="rgba(0,0,0,0.1)" />
                    <!-- 左右竖线 -->
                    <line x1="20" y1="20" x2="20" y2="300" stroke="var(--cyl-edge)" stroke-width="2" />
                    <line x1="200" y1="20" x2="200" y2="300" stroke="var(--cyl-edge)" stroke-width="2" />
                    <!-- 底面正弧 -->
                    <path d="M 20 300 A 90 15 0 0 0 200 300" fill="rgba(90,207,202,0.65)" stroke="var(--cyl-edge)"
                        stroke-width="2" />
                    <!-- 顶面椭圆 -->
                    <ellipse cx="110" cy="20" rx="90" ry="15" fill="var(--cyl-fill)" stroke="var(--cyl-edge)"
                        stroke-width="2" opacity="0.95" />
                </svg>
            </div>

        </div>
    </div>

    <!-- 底部参数条 -->
    <div id="bottom-bar">

        <!-- 圆锥参数 -->
        <div class="param-group">
            <!-- 行1：体积 -->
            <div class="row-v">
                <span class="lbl-v">体积 V =</span>
                <span class="badge-v cone" id="val-v-cone">90π</span>
            </div>
            <!-- 行2：底面积 -->
            <div class="row-s">
                <span class="lbl-s">底面积 S =</span>
                <span class="badge-v cone" id="val-s-cone">3.0π</span>
            </div>
            <!-- 行3：滑块 -->
            <div class="row-slider">
                <input type="range" id="slider-s-cone" class="h-range" min="0.1" max="10" step="0.01" value="3.0">
            </div>
        </div>

        <div class="divider"></div>

        <!-- 圆柱参数 -->
        <div class="param-group">
            <!-- 行1：体积 -->
            <div class="row-v">
                <span class="lbl-v">体积 V =</span>
                <span class="badge-v cyl" id="val-v-cyl">270π</span>
            </div>
            <!-- 行2：底面积 -->
            <div class="row-s">
                <span class="lbl-s">底面积 S =</span>
                <span class="badge-v cyl" id="val-s-cyl">3.0π</span>
            </div>
            <!-- 行3：滑块 -->
            <div class="row-slider">
                <input type="range" id="slider-s-cyl" class="h-range" min="0.1" max="10" step="0.01" value="3.0">
            </div>
        </div>

    </div>
