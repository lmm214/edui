<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>纸带算数</title>
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background-color 0.5s ease;
    }

    #header {
      position: relative;
      padding: 20px;
      text-align: center;
      flex-shrink: 0;
      z-index: 10;
    }

    #level-wrapper {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
    }

    #level-indicator {
      color: #333;
      font-size: 20px;
      padding: 2px 15px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      letter-spacing: 1px;
      cursor: pointer;
    }

    #level-select {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    #score-badge {
      position: absolute;
      top: 15px;
      right: 20px;
      border: 3px solid #333;
      border-radius: 12px;
      padding: 2px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 18px;
      color: #333;
      background: transparent;
    }

    #score-badge svg {
      width: 20px;
      height: 20px;
      fill: #333;
    }

    :root {
      --tile-size: clamp(55px, min(18vw, 15vh), 105px);
    }

    #target-container {
      display: flex;
      background: white;
      border: 3px solid #333;
      border-radius: 0;
      margin: 40px auto 0;
      max-width: 500px;
      overflow: hidden;
    }

    .target-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border-right: 3px solid #333;
      border-bottom: 8px solid rgba(0, 0, 0, 0.1);
      box-sizing: border-box;
      flex: 1;
      transition: background-color 0.3s;
    }

    .target-box.completed {
      background-color: #5ccfef;
      border-bottom-color: rgba(0, 0, 0, 0.2);
    }

    .target-box.completed .target-value {
      color: #fff;
    }

    .target-box:last-child {
      border-right: none;
    }

    .target-value {
      font-size: clamp(32px, 8vh, 38px);
      color: #333;
      line-height: 1;
    }

    .target-dots {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 3px solid #333;
      box-sizing: border-box;
      transition: background 0.3s;
    }

    .dot.empty {
      background: transparent;
    }

    .dot.filled {
      background: #333;
    }

    #board-container {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #central-bar {
      position: absolute;
      top: 40%;
      left: 0;
      right: 0;
      height: var(--tile-size);
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.5);
      z-index: 1;
    }

    #columns {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      display: flex;
      gap: 3px;
      justify-content: center;
      padding: 0 10px;
      width: 100%;
      max-width: 1000px;
      box-sizing: border-box;
    }

    .column-wrapper {
      position: relative;
      flex: 1;
      max-width: var(--tile-size);
      height: var(--tile-size);
      touch-action: none;
    }

    .column-inner {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      border: 3px solid #333;
      border-radius: 0;
      background: white;
      cursor: grab;
    }

    .column-inner:active {
      cursor: grabbing;
    }

    .tile {
      width: 100%;
      height: var(--tile-size);
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: calc(var(--tile-size) * 0.65);
      font-weight: 400;
      color: #444;
      background: white;
      border-bottom: 3px dashed #333;
      transition: background-color 0.3s, color 0.3s;
      user-select: none;
    }

    .tape-end {
      width: 100%;
      height: 15px;
      background: white;
      box-sizing: border-box;
    }

    .tape-end.top {
      border-bottom: 3px dashed #333;
      border-top: 3px solid var(--level-color, #5ccfef);
    }

    .tape-end.bottom {
      border-bottom: 3px solid var(--level-color, #5ccfef);
    }

    .tile.colored {
      background-color: #5ccfef;
      color: #222;
      border-bottom-color: rgba(0, 0, 0, 0.1);
    }

    @keyframes pop {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.15);
      }

      100% {
        transform: scale(1);
      }
    }

    .pop {
      animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 10;
    }

    .speech-bubble {
      position: absolute;
      top: 40%;
      transform: translate(-50%, -60px);
      background: #5ccfef;
      color: #fff;
      font-size: 42px;
      font-weight: 900;
      padding: 10px 22px;
      border-radius: 16px;
      border: 3px solid white;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      text-shadow: 1px 2px 2px rgba(0, 0, 0, 0.1);
      z-index: 50;
      pointer-events: none;
      animation: popUp 4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -13px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 14px 12px 0;
      border-style: solid;
      border-color: white transparent transparent transparent;
      z-index: -1;
    }

    .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 12px 10px 0;
      border-style: solid;
      border-color: #5ccfef transparent transparent transparent;
      z-index: 1;
    }

    @keyframes popUp {
      0% {
        opacity: 0;
        transform: translate(-50%, 0px) scale(0.5);
      }

      15% {
        opacity: 1;
        transform: translate(-50%, -100px) scale(1.1);
      }

      30% {
        opacity: 1;
        transform: translate(-50%, -120px) scale(1);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -300px) scale(0.8);
      }
    }

    @keyframes barFlash {
      0% {
        background: rgba(0, 0, 0, 0.5);
      }

      20% {
        background: #5ccfef;
      }

      60% {
        background: #5ccfef;
      }

      100% {
        background: rgba(0, 0, 0, 0.5);
      }
    }

    #central-bar.flash {
      animation: barFlash 1s ease forwards;
    }

    #next-btn {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      padding: 15px;
      background: white;
      border: 3px solid #333;
      border-radius: 8px;
      font-size: 24px;
      font-weight: 900;
      color: #333;
      display: none;
      cursor: pointer;
      z-index: 100;
      text-align: center;
      box-shadow: 0 6px 0 var(--level-color, #333);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    #next-btn:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 rgba(0, 0, 0, 0.2);
    }

    .instructions {
      text-align: center;
      color: rgba(255, 255, 255, 0.9);
      font-size: 18px;
      padding: 10px;
      position: absolute;
      bottom: 10px;
      width: 100%;
      box-sizing: border-box;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
