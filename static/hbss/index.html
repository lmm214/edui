<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算式合并大挑战</title>
    <style>
        :root {
            --primary: #FF5600;
            --bg: #F4F3EC;
            --text: #0C0302;
            --secondary: #74706E;
            --accent: #FF8941;
            --blue: #2563eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1rem 2rem;
            text-align: center;
            z-index: 100;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .math-font {
            font-family: "Times New Roman", serif;
            font-style: italic;
        }

        main {
            position: relative;
            padding: 0;
            flex: 1;
        }

        .step-card {
            position: absolute;
            padding: 10px;
            font-size: 2.4rem;
            z-index: 10;
            background: transparent;
            border: none;
            box-shadow: none;
            white-space: nowrap;
            user-select: none;
        }

        .step-card.original {
            cursor: copy;
            transition: opacity 0.3s;
        }

        .step-card.original:hover {
            opacity: 0.8;
        }

        .step-card.original[data-cloned="true"] {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .step-card.cloned {
            position: absolute;
            z-index: 1000;
            cursor: grab;
            background: transparent;
            will-change: left, top;
        }

        .step-card.cloned:active {
            cursor: grabbing;
        }

        .result-part {
            display: inline-block;
            transition: color 0.2s;
            transform-origin: left center;
            will-change: transform;
        }

        .input-part {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.1s, color 0.1s, transform 0.1s, box-shadow 0.1s;
            overflow: hidden;
            white-space: nowrap;
            padding: 0.1rem 0.3rem;
            border-radius: 0.5rem;
        }

        .highlight-target {
            color: var(--primary);
            background: #fff7ed;
            transform: scale(1.15);
            box-shadow: 0 0 10px rgba(255, 86, 0, 0.2);
        }

        .squeezing {
            color: var(--primary);
            white-space: nowrap;
        }

        .operator,
        .highlight-mul {
            margin: 0 0.6rem;
        }

        .squeezing .operator {
            margin: 0 0.2rem;
        }

        .original .operator {
            margin: 0 0.2rem;
        }

        .highlight-mul {
            color: var(--blue);
            font-weight: bold;
        }

        /* Level Tabs styles */
        .level-tabs {
            margin: 10px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .level-tab {
            cursor: pointer;
            font-size: 2.2rem;
            text-decoration: none;
            filter: grayscale(100%) opacity(0.5);
            transition: transform 0.2s, filter 0.2s;
        }

        .level-tab:hover {
            filter: grayscale(0%) opacity(0.8);
            transform: translateY(-2px);
        }

        .level-tab.active {
            filter: grayscale(0%) opacity(1);
            transform: scale(1.2);
        }

        /* Toolbar styles */
        .toolbar {
            position: absolute;
            right: 20px;
            top: 40%;
            transform: translateY(-50%);
            display: none;
            flex-direction: column;
            gap: 15px;
            z-index: 6000;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .toolbar button {
            background: none;
            border: 2px solid transparent;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toolbar button:hover {
            background: var(--bg);
        }

        .toolbar button.active {
            border-color: var(--primary);
            background: #fff7ed;
        }

        #draw-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5000;
        }

        #draw-canvas.drawing-active {
            pointer-events: auto;
        }
    </style>
</head>

<body>
    <header>
        <h1>算式合并大挑战
            <button id="btn-reset" title="重置"
                style="font-size: 2rem; background: transparent; border: none; cursor: pointer; z-index: 6000;">🔄</button>
        </h1>
        <div class="level-tabs">
            <a href="?level=1" class="level-tab" data-level="1">1️⃣</a>
            <a href="?level=2" class="level-tab" data-level="2">2️⃣</a>
            <a href="?level=3" class="level-tab" data-level="3">3️⃣</a>
        </div>
        <p style="color: var(--secondary)">先拖动算式复制，再拖动靠近合并</p>
    </header>

    <main id="drag-area">
        <canvas id="draw-canvas"></canvas>
        <div id="exercise-container">
            <!-- Dynamically populated by level -->
        </div>

        <div class="toolbar" id="toolbar">
            <button id="tool-pen" title="画笔进入/退出">✏️</button>
            <button id="tool-eraser" title="一键清空">🧹</button>
        </div>
    </main>
