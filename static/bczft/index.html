<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摆长（正）方体</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
        }

        .container {
            flex: 1;
            position: relative;
            border: 2px dashed rgba(0, 0, 0, 0.4);
            background-color: #fff;
            margin: 16px 16px 8px 16px;
            border-radius: 4px;
            overflow: visible;
        }

        #drawCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 600;
            border-radius: 4px;
        }

        .source-container {
            height: 180px;
            padding: 0 20px;
            display: flex;
            gap: 80px;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            border-top: 1px solid #e8e8e8;
        }

        .source {
            cursor: move;
            position: relative;
            overflow: visible;
            flex-shrink: 0;
        }

        .draggable {
            cursor: move;
            position: absolute;
            overflow: visible;
        }

        .draggable.selected {
            opacity: 0.6;
            z-index: 1000 !important;
        }

        /* ===== 右侧面板 ===== */
        .right-panel {
            width: 144px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #f2f4f8;
            border-left: 1px solid #dde;
        }

        /* 上部（工具+着色面）可滚动 */
        .rp-upper {
            flex-shrink: 0;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* 自定义区：固定在底部，自适应高度 */
        .rp-custom {
            flex-shrink: 0;
            border-top: 2px solid #c8d0e0;
            background: #edf0f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 8px 8px 10px;
        }

        .rp-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 10px 8px;
        }

        .rp-label {
            font-size: 10px;
            color: #999;
            letter-spacing: 1px;
            text-transform: uppercase;
            width: 100%;
            text-align: center;
            border-bottom: 1px solid #e0e4ee;
            padding-bottom: 4px;
        }

        .rp-divider {
            height: 1px;
            background: #dde;
            margin: 0;
        }

        /* 工具按钮 2列 */
        .rp-grid2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            width: 100%;
        }

        .tool-btn {
            padding: 7px 2px;
            font-size: 16px;
            border: 1.5px solid #ccc;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            color: #444;
        }

        .tool-btn span {
            font-size: 10px;
            color: #888;
        }

        .tool-btn:hover {
            background: #e0eaff;
            border-color: #4a90e2;
        }

        .tool-btn.active {
            background: #e74c3c;
            border-color: #c0392b;
            color: #fff;
        }

        .tool-btn.active span {
            color: #fdd;
        }

        /* 面模式按钮 */
        .face-btn {
            width: 100%;
            padding: 17px 4px;
            font-size: 13px;
            border: 1.5px solid #bbb;
            border-radius: 14px;
            background: #fff;
            cursor: pointer;
            transition: all 0.15s;
            color: #444;
            text-align: center;
        }

        .face-btn:hover {
            background: #e0eaff;
            border-color: #4a90e2;
            color: #1a5bbf;
        }

        .face-btn.active {
            background: #4a90e2;
            border-color: #2a70c2;
            color: #fff;
            font-weight: bold;
        }

        /* 自定义区 - 滑块 */
        .rp-slider-row {
            display: flex;
            align-items: center;
            gap: 4px;
            width: 100%;
        }

        .rp-slider-row label {
            width: 14px;
            font-size: 11px;
            font-weight: bold;
            color: #555;
            text-align: right;
        }

        .rp-slider-row input[type=range] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #c8d8ee;
            border-radius: 2px;
            cursor: pointer;
            margin: 0;
            padding: 0;
            width: 100%;
        }

        .rp-slider-row input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #4a90e2;
            border-radius: 50%;
            cursor: pointer;
        }

        .rp-slider-row span {
            width: 16px;
            font-size: 12px;
            font-weight: bold;
            color: #4a90e2;
            text-align: center;
        }

        .color-row {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 2px 0;
        }

        .color-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.15s;
        }

        .color-dot.sel {
            border-color: #222;
        }

        .drag-hint {
            font-size: 10px;
            color: #aaa;
            text-align: center;
        }

        .custom-preview {
            cursor: move;
            display: block;
        }

        /* 预览区自适应，不溢出 */
        .preview-wrap {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }
    </style>
</head>

<body>

    <div class="main-area">
        <div class="container" id="container">
            <canvas id="drawCanvas"></canvas>
        </div>
        <div class="source-container" id="sourceContainer"></div>
    </div>

    <div class="right-panel">
        <!-- 上部：工具 + 着色面 -->
        <div class="rp-upper">
            <!-- 工具 -->
            <div class="rp-section">
                <div class="rp-label">工具</div>
                <div class="rp-grid2">
                    <button class="tool-btn active" id="btn-mouse" onclick="setTool('none')"><span
                            style="font-size:18px">🖱️</span><span>鼠标</span></button>
                    <button class="tool-btn" id="btn-pen" onclick="togglePen()"><span
                            style="font-size:18px">✏️</span><span>画笔</span></button>
                    <button class="tool-btn" id="btn-eraser" onclick="eraserOrClear()"><span
                            style="font-size:18px">🧹</span><span>橡皮/清</span></button>
                    <button class="tool-btn" id="btn-reset" onclick="resetAll()"><span
                            style="font-size:18px">↺</span><span>重置</span></button>
                </div>
            </div>
            <div class="rp-divider"></div>
            <!-- 着色面 -->
            <div class="rp-section">
                <div class="rp-label">着色面</div>
                <div class="rp-grid2">
                    <button class="face-btn" id="btn-ud" onclick="setMode('ud')">上下</button>
                    <button class="face-btn" id="btn-lr" onclick="setMode('lr')">左右</button>
                    <button class="face-btn" id="btn-fb" onclick="setMode('fb')">前后</button>
                    <button class="face-btn active" id="btn-all" onclick="setMode('all')">全部</button>
                </div>
            </div>
        </div>

        <!-- 自定义区：固定在底部 -->
        <div class="rp-custom">
            <div class="rp-label">自定义</div>
            <div class="rp-slider-row"><label>长</label><input type="range" id="cW" value="2" min="1" max="5"><span
                    id="cW-val">2</span></div>
            <div class="rp-slider-row"><label>宽</label><input type="range" id="cD" value="2" min="1" max="5"><span
                    id="cD-val">2</span></div>
            <div class="rp-slider-row"><label>高</label><input type="range" id="cH" value="2" min="1" max="5"><span
                    id="cH-val">2</span></div>
            <div class="color-row" id="colorRow"></div>
            <div class="drag-hint">拖动预览放置</div>
            <div class="preview-wrap">
                <div class="custom-preview" id="customPreview"></div>
            </div>
        </div>
    </div>
