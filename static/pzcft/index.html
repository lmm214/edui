<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>如何拼组多个长方体，表面积最小</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 15% 50%, rgba(253, 228, 228, 0.8), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(226, 240, 252, 0.8), transparent 30%),
                radial-gradient(circle at 50% 80%, rgba(232, 227, 249, 0.8), transparent 30%),
                linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            background-color: #f5f7fa;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: saturate(180%) blur(25px);
            -webkit-backdrop-filter: saturate(180%) blur(25px);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }

        .view-container {
            flex: 1 1 auto;
            position: relative;
            overflow: hidden;
            display: flex;
        }

        .view-panel {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .view-panel.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 2;
        }

        #interactive-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #schemes-view {
            display: flex;
            align-items: center;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 30px 40px;
            gap: 30px;
        }

        #schemes-view::-webkit-scrollbar {
            height: 14px;
        }

        #schemes-view::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            margin: 0 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        #schemes-view::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            border: 3px solid transparent;
            background-clip: padding-box;
        }

        #schemes-view::-webkit-scrollbar-thumb:hover {
            background-color: rgba(0, 0, 0, 0.3);
        }

        .shape-card {
            flex: 0 0 auto;
            width: max-content;
            min-width: 320px;
            height: 100%;
            max-height: 560px;
            background: rgba(255, 255, 255, 0.65);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            padding: 12px;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease;
        }

        .shape-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.1), inset 0 0 0 1px rgba(255, 255, 255, 0.7);
        }

        .card-svg-wrap {
            flex: 1;
            display: flex;
            align-items: safe center;
            justify-content: safe center;
            width: 100%;
            min-height: 0;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .card-info {
            flex: 0 0 auto;
            text-align: center;
            font-size: 15px;
            color: #444;
            line-height: 1.8;
            background: rgba(255, 255, 255, 0.5);
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .footer {
            flex: 0 0 auto;
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.7);
            z-index: 10;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255, 255, 255, 0.55);
            padding: 10px 24px;
            border-radius: 16px;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.6), 0 4px 12px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .cg-title {
            font-size: 13px;
            font-weight: 600;
            color: #777;
            padding-right: 12px;
            border-right: 1px solid rgba(0, 0, 0, 0.1);
            letter-spacing: 0.5px;
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .control-item label {
            font-size: 13px;
            font-weight: 600;
            color: #444;
        }

        .virtual-input {
            width: 56px;
            height: 32px;
            line-height: 20px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            padding: 5px;
            background: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
            user-select: none;
        }

        .virtual-input:hover {
            border-color: #4a90e2;
        }

        .virtual-input.active {
            border-color: #4a90e2;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        }

        .generate-btn {
            background: linear-gradient(135deg, #4a90e2 0%, #007aff 100%);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3), inset 0 2px 4px rgba(255, 255, 255, 0.3);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.4);
        }

        .generate-btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
        }

        .numpad-popover {
            position: fixed;
            bottom: 100px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: saturate(180%) blur(25px);
            -webkit-backdrop-filter: saturate(180%) blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            border-radius: 16px;
            padding: 16px;
            z-index: 9999;
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .num-btn {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            background: rgba(255, 255, 255, 0.95);
            font-size: 22px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            transition: transform 0.1s, background 0.1s;
        }

        .num-btn:active {
            transform: scale(0.92);
            background: #e6f0ff;
        }

        .num-btn.action {
            font-size: 16px;
            background: #f0f2f5;
            color: #666;
        }

        .num-btn.ok {
            background: linear-gradient(135deg, #4a90e2 0%, #007aff 100%);
            color: white;
            font-size: 18px;
            border: none;
        }

        .interactive-info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            font-size: 16px;
            font-weight: bold;
            color: #444;
            border: 1px solid rgba(255, 255, 255, 0.9);
            pointer-events: none;
        }
    </style>
</head>

    <div class="view-container">
        <!-- Interactive View -->
        <div id="interactive-view" class="view-panel active">
            <svg id="interactive-svg" viewBox="-400 -300 800 600"
                style="width:100%; height:100%; touch-action: none; cursor: grab;"></svg>
        </div>

        <!-- Schemes View -->
        <div id="schemes-view" class="view-panel">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <!-- Footer Controls -->
    <div class="footer glass-panel">
        <div class="control-group">
            <span class="cg-title">单块尺寸</span>
            <div class="control-item"><label>长</label>
                <div class="virtual-input" id="cW" onclick="openNumpad('cW', event)">12</div>
            </div>
            <div class="control-item"><label>宽</label>
                <div class="virtual-input" id="cD" onclick="openNumpad('cD', event)">8</div>
            </div>
            <div class="control-item"><label>高</label>
                <div class="virtual-input" id="cH" onclick="openNumpad('cH', event)">5</div>
            </div>
        </div>

        <div class="control-group">
            <span class="cg-title">目标数量</span>
            <div class="control-item"><label>个数</label>
                <div class="virtual-input" id="cNum" onclick="openNumpad('cNum', event)">2</div>
            </div>
        </div>

        <button class="generate-btn" id="btn-toggle" onclick="toggleView()">✨ 所有方案</button>
    </div>

    <!-- Numpad -->
    <div class="numpad-popover" id="numpad">
        <button class="num-btn" onclick="numpadPress('1')">1</button>
        <button class="num-btn" onclick="numpadPress('2')">2</button>
        <button class="num-btn" onclick="numpadPress('3')">3</button>
        <button class="num-btn" onclick="numpadPress('4')">4</button>
        <button class="num-btn" onclick="numpadPress('5')">5</button>
        <button class="num-btn" onclick="numpadPress('6')">6</button>
        <button class="num-btn" onclick="numpadPress('7')">7</button>
        <button class="num-btn" onclick="numpadPress('8')">8</button>
        <button class="num-btn" onclick="numpadPress('9')">9</button>
        <button class="num-btn action" onclick="numpadPress('C')">清空</button>
        <button class="num-btn" onclick="numpadPress('0')">0</button>
        <button class="num-btn ok" onclick="numpadPress('OK')">确定</button>
    </div>
