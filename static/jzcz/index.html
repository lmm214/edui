<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>卷纸成圆柱</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #334455;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            /* 阻止浏览器默认的手势（如滚动、缩放等），修复触摸屏拖动卡顿断触 */
        }

        #btnGroup {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .btn {
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 10px;
            border-radius: 8px;
            border: none;
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.6), inset -1px -1px 3px rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-size: 1.2rem;
            transition: background 0.3s, box-shadow 0.3s;
            user-select: none;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            background: rgba(60, 60, 60, 0.9);
        }

        .btn:active {
            box-shadow: inset 3px 3px 6px rgba(0, 0, 0, 0.8), inset -1px -1px 2px rgba(255, 255, 255, 0.05);
        }

        #settingsBtn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 20;
        }

        #slidersContainer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
            outline: none;
            position: absolute;
            pointer-events: auto;
        }

        /* 增大滑块的透明热区并绘制白色圆点 */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            /* 在 44x44 的透明区域中心画一个 20x20 (半径 10px) 的纯白实心圆 */
            background: radial-gradient(circle, #ffffff 10px, transparent 11px);
            /* 给内部的白点加上阴影 */
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.6));
            cursor: pointer;
            border: none;
            margin-top: -17px;
            /* 轨道高度 10px, 居中偏移：(44-10)/2 = 17 */
        }

        /* 轨道样式：内凹阴影 */
        input[type=range]::-webkit-slider-runnable-track {
            height: 10px;
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: inset 1px 1px 4px rgba(0, 0, 0, 0.8), inset -1px -1px 2px rgba(255, 255, 255, 0.15);
        }

        #widthSlider {
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
        }

        #heightSlider {
            top: 50%;
            right: calc(32px - 25vh);
            /* 使旋转后水平中心刚好落在距离右侧 32px 的位置 */
            width: 50vh;
            transform: translateY(-50%) rotate(-90deg);
            margin: 0;
        }

        .slider-val {
            position: absolute;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 2rem;
            font-weight: 500;
            backdrop-filter: blur(4px);
            pointer-events: none;
            /* 数字标签也采用内凹阴影 */
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.6), inset -1px -1px 3px rgba(255, 255, 255, 0.1);
        }

        #widthVal {
            bottom: 65px;
            /* 避开扩大的热区 */
            left: 50%;
            transform: translateX(-50%);
        }

        #heightVal {
            top: 50%;
            right: 80px;
            /* 数字标签在纵向滑动条的左侧，稍微拉远避开热区 */
            transform: translateY(-50%);
        }
    </style>
</head>

<body>
    <div id="btnGroup">
        <button id="resetBtn" class="btn" title="重置">🔄</button>
    </div>

    <!-- 设置按钮，固定在右下角 -->
    <button id="settingsBtn" class="btn" title="设置长宽">⚙️</button>

    <!-- 底部和右侧的滑动条容器 -->
    <div id="slidersContainer" style="display: none;">
        <input type="range" id="widthSlider" min="10" max="60" step="1">
        <div class="slider-val" id="widthVal">30</div>

        <input type="range" id="heightSlider" min="10" max="60" step="1" orient="vertical">
        <div class="slider-val" id="heightVal">21</div>
    </div>
