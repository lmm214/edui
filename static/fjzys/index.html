<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字碰碰乐</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #F4F3ED;
            /* 参考图背景米灰色 */
            user-select: none;
            -webkit-user-select: none;
        }

        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background-color: #4A634E;
            /* 顶部深橄榄绿 */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 20;
        }

        #equation-display {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 2px;
        }

        .top-btn {
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            transition: transform 0.2s;
            z-index: 30;
        }

        .top-btn:hover {
            transform: scale(1.1);
        }

        .top-btn:active {
            transform: scale(0.9);
        }

        #app-info {
            position: absolute;
            bottom: 50px;
            right: 50px;
            text-align: right;
            pointer-events: none;
            z-index: 5;
        }

        #app-title {
            font-size: 36px;
            font-weight: bold;
            color: #111111;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        #app-subtitle {
            font-size: 16px;
            color: #6C7470;
            font-weight: normal;
            letter-spacing: 1px;
        }

        #tree-container {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #lines-svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        #nodes-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .node {
            position: absolute;
            width: 100px;
            height: 100px;
            margin-left: -50px;
            margin-top: -50px;
            border: 3px dashed #4A634E;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            font-weight: 500;
            color: #4A634E;
            box-shadow: 4px 4px 0px #E1E3DA;
            transition: border-color 0.4s, background-color 0.4s, color 0.4s, transform 0.3s;
            z-index: 10;
        }

        .node.decomposed {
            border-color: #D1D3CE;
            color: #B2B6B2;
            background-color: #F8F9F7;
            box-shadow: 4px 4px 0px #E4E6E0;
            border-style: dashed;
        }

        .node.new {
            border-color: #7DAA76;
            color: #4A634E;
            background-color: #EBF3EC;
            box-shadow: 4px 4px 0px #E1E6DE;
        }

        .node.highlight {
            border-color: #FF8C00;
            background-color: #FFF3E0;
            color: #FF8C00;
            transform: scale(1.15);
            box-shadow: 4px 4px 0px #FFD199;
            border-style: solid;
        }

        .node.shake {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
            border-color: #e55039;
            color: #e55039;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-4px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(6px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-10px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(10px, 0, 0);
            }
        }

        #keypad {
            position: absolute;
            right: 80px;
            top: 45%;
            transform: translateY(-50%);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            z-index: 10;
        }

        .key {
            width: 70px;
            height: 70px;
            border: 2px dashed #4A634E;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 500;
            cursor: grab;
            background: #ffffff;
            color: #4A634E;
            transition: all 0.2s ease;
            box-shadow: 3px 3px 0px #E1E3DA;
            user-select: none;
            pointer-events: auto;
        }

        .key:active {
            cursor: grabbing;
        }

        .key:hover {
            background: #F8F9F5;
            transform: translateY(-2px);
            box-shadow: 3px 5px 0px #D3D8CC;
        }

        .drag-clone {
            position: fixed;
            width: 70px;
            height: 70px;
            margin-left: -35px;
            margin-top: -35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.95);
            color: #4A634E;
            border: 2px dashed #4A634E;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(4px);
        }

        /* 历史记录全屏弹窗 */
        #history-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(244, 243, 237, 0.92);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #history-modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .history-content {
            background: #ffffff;
            padding: 50px 60px;
            border-radius: 20px;
            /* 增大主体区域占据 */
            width: 90%;
            max-width: 1100px;
            height: 80%;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.12);
            border: 4px solid #4A634E;
            display: flex;
            flex-direction: column;
        }


        .history-columns {
            display: flex;
            flex: 1;
            overflow: hidden;
            margin-bottom: 20px;
            border-top: 3px solid #E1E3DA;
            border-bottom: 3px solid #E1E3DA;
            padding: 10px 0;
        }

        .history-col-left {
            flex: 2;
            border-right: 3px dashed #E1E3DA;
            display: flex;
            flex-direction: column;
            padding-right: 20px;
        }

        .history-col-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-left: 20px;
        }

        .history-col-title {
            text-align: center;
            font-size: 26px;
            color: #111111;
            margin: 0 0 15px 0;
            letter-spacing: 2px;
        }

        .history-list {
            list-style: none;
            padding: 0 10px;
            margin: 0;
            overflow-y: auto;
            flex: 1;
            text-align: center;
        }

        /* 自定义大号滚动条 */
        .history-list::-webkit-scrollbar {
            width: 8px;
        }

        .history-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #A3AFA6;
            border-radius: 4px;
        }

        .history-list::-webkit-scrollbar-thumb:hover {
            background: #4A634E;
        }

        .history-item {
            display: flex;
            align-items: center;
            padding: 15px 10px;
            border-bottom: 2px dashed #E1E3DA;
            letter-spacing: 2px;
            font-size: 34px;
            color: #4A634E;
            font-weight: 600;
        }

        .history-item.prime-item {
            display: block;
            color: #7DAA76;
            font-size: 40px;
            text-align: left;
            line-height: 1.6;
            border-bottom: none;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .no-history {
            color: #A3AFA6;
            font-size: 24px;
            font-weight: 500;
            text-align: center;
            margin-top: 50px;
        }

        #close-history {
            padding: 20px 0;
            border: none;
            border-radius: 40px;
            background: #4A634E;
            color: white;
            font-size: 26px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            letter-spacing: 6px;
            margin-top: 20px;
        }

        #close-history:hover {
            background: #3B523F;
        }

        /* 自定义提示框 */
        #custom-alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #custom-alert-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        #custom-alert-box {
            background: #ffffff;
            padding: 40px 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            max-width: 500px;
            width: 80%;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 4px solid #FF8C00;
        }

        #custom-alert-overlay.show #custom-alert-box {
            transform: scale(1);
        }

        #custom-alert-title {
            font-size: 32px;
            font-weight: bold;
            color: #FF8C00;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        #custom-alert-msg {
            font-size: 26px;
            color: #4A634E;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        #custom-alert-btn {
            background: #FF8C00;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            border-radius: 40px;
            cursor: pointer;
            letter-spacing: 2px;
            font-weight: bold;
            transition: background 0.2s;
        }

        #custom-alert-btn:hover {
            background: #E67E00;
        }
    </style>
</head>

<body>

    <div id="top-bar">
        <!-- 历史记录在左侧不变 -->
        <div id="history-btn" class="top-btn" title="查看分解记录">
            <svg viewBox="0 0 24 24" width="30" height="30" stroke="#FFFFFF" stroke-width="2.5" fill="none"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                <path d="M3 3v5h5"></path>
                <path d="M12 7v5l4 2"></path>
            </svg>
        </div>
        <div id="equation-display"></div>
        <!-- 更换为加号圆圈图标 -->
        <div id="reset-btn" class="top-btn" title="生成新数字">
            <svg viewBox="0 0 24 24" width="32" height="32" stroke="#FFFFFF" stroke-width="2.5" fill="none"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="16"></line>
                <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
        </div>
    </div>

    <div id="tree-container">
        <svg id="lines-svg"></svg>
        <div id="nodes-container"></div>
    </div>

    <div id="app-info">
        <div id="app-title">数字碰碰乐</div>
        <div id="app-subtitle">拖动小数，碰大数</div>
    </div>

    <div id="keypad">
        <!-- JS populated, 2~9 -->
    </div>

    <div id="history-modal">
        <div class="history-content">
            <div class="history-columns">
                <div class="history-col-left">
                    <h4 class="history-col-title">已分解</h4>
                    <ul id="history-list-left" class="history-list"></ul>
                </div>
                <div class="history-col-right">
                    <h4 class="history-col-title">未分解</h4>
                    <ul id="history-list-right" class="history-list"></ul>
                </div>
            </div>
            <button id="close-history">关闭</button>
        </div>
    </div>

    <!-- 自定义提示框 -->
    <div id="custom-alert-overlay">
        <div id="custom-alert-box">
            <div id="custom-alert-title">提示</div>
            <div id="custom-alert-msg"></div>
            <button id="custom-alert-btn" onclick="hideCustomAlert()">我知道了</button>
        </div>
    </div>
