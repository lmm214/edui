<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字碰碰乐</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #F4F3ED;
            /* 参考图背景米灰色 */
            user-select: none;
            -webkit-user-select: none;
        }

        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background-color: #4A634E;
            /* 顶部深橄榄绿 */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 20;
        }

        #equation-display {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 2px;
        }

        .top-btn {
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            transition: transform 0.2s;
            z-index: 30;
        }

        .top-btn:hover {
            transform: scale(1.1);
        }

        .top-btn:active {
            transform: scale(0.9);
        }

        #app-info {
            position: absolute;
            bottom: 50px;
            right: 50px;
            text-align: right;
            pointer-events: none;
            z-index: 5;
        }

        #app-title {
            font-size: 36px;
            font-weight: bold;
            color: #111111;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        #app-subtitle {
            font-size: 16px;
            color: #6C7470;
            font-weight: normal;
            letter-spacing: 1px;
        }

        #tree-container {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #lines-svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        #nodes-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .node {
            position: absolute;
            width: 100px;
            height: 100px;
            margin-left: -50px;
            margin-top: -50px;
            border: 3px dashed #4A634E;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            font-weight: 500;
            color: #4A634E;
            box-shadow: 4px 4px 0px #E1E3DA;
            transition: border-color 0.4s, background-color 0.4s, color 0.4s, transform 0.3s;
            z-index: 10;
        }

        .node.decomposed {
            border-color: #D1D3CE;
            color: #B2B6B2;
            background-color: #F8F9F7;
            box-shadow: 4px 4px 0px #E4E6E0;
            border-style: dashed;
        }

        .node.new {
            border-color: #7DAA76;
            color: #4A634E;
            background-color: #EBF3EC;
            box-shadow: 4px 4px 0px #E1E6DE;
        }

        .node.highlight {
            border-color: #FF8C00;
            background-color: #FFF3E0;
            color: #FF8C00;
            transform: scale(1.15);
            box-shadow: 4px 4px 0px #FFD199;
            border-style: solid;
        }

        .node.shake {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
            border-color: #e55039;
            color: #e55039;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-4px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(6px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-10px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(10px, 0, 0);
            }
        }

        #keypad {
            position: absolute;
            right: 80px;
            top: 45%;
            transform: translateY(-50%);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            z-index: 10;
        }

        .key {
            width: 70px;
            height: 70px;
            border: 2px dashed #4A634E;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 500;
            cursor: grab;
            background: #ffffff;
            color: #4A634E;
            transition: all 0.2s ease;
            box-shadow: 3px 3px 0px #E1E3DA;
            user-select: none;
            pointer-events: auto;
        }

        .key:active {
            cursor: grabbing;
        }

        .key:hover {
            background: #F8F9F5;
            transform: translateY(-2px);
            box-shadow: 3px 5px 0px #D3D8CC;
        }

        .drag-clone {
            position: fixed;
            width: 70px;
            height: 70px;
            margin-left: -35px;
            margin-top: -35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.95);
            color: #4A634E;
            border: 2px dashed #4A634E;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(4px);
        }

        /* 历史记录全屏弹窗 */
        #history-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(244, 243, 237, 0.92);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #history-modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .history-content {
            background: #ffffff;
            padding: 50px 60px;
            border-radius: 20px;
            /* 增大主体区域占据 */
            width: 80%;
            max-width: 900px;
            height: 75%;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.12);
            border: 4px solid #4A634E;
            display: flex;
            flex-direction: column;
        }

        .history-content h3 {
            margin-top: 0;
            color: #111111;
            text-align: center;
            font-size: 40px;
            margin-bottom: 30px;
            font-weight: 800;
            letter-spacing: 4px;
        }

        #history-list {
            list-style: none;
            padding: 0 20px;
            margin: 0 0 30px 0;
            text-align: center;
            font-size: 46px;
            /* 更大的数字字号 */
            color: #4A634E;
            font-weight: 600;
            line-height: 2.2;
            overflow-y: auto;
            flex: 1;
            /* 占据剩余可用垂直空间 */
        }

        /* 自定义大号滚动条 */
        #history-list::-webkit-scrollbar {
            width: 10px;
        }

        #history-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 5px;
        }

        #history-list::-webkit-scrollbar-thumb {
            background: #A3AFA6;
            border-radius: 5px;
        }

        #history-list::-webkit-scrollbar-thumb:hover {
            background: #4A634E;
        }

        .history-item {
            padding: 15px 20px;
            border-bottom: 3px dashed #E1E3DA;
            letter-spacing: 2px;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .no-history {
            color: #A3AFA6;
            font-size: 28px;
            font-weight: 500;
            margin-top: 100px;
        }

        #close-history {
            padding: 20px 0;
            border: none;
            border-radius: 40px;
            background: #4A634E;
            color: white;
            font-size: 26px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            letter-spacing: 6px;
            margin-top: 20px;
        }

        #close-history:hover {
            background: #3B523F;
        }
    </style>
</head>
