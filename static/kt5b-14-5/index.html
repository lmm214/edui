<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下面的图形折叠后能围成长方体的有？</title>
    <style>
        :root {
            --primary-color: #FF5600;
            --bg-color: #F4F3EC;
            --grid-color: #ccc;
            --face-color: rgba(220, 220, 220, 0.7);
            --border-color: #333;
            --unit: 60px;
        }

        body {
            background-color: var(--bg-color);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 垂直居中 */
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
            box-sizing: border-box;
            padding: 0 0 40px;
        }

        .header {
            margin-top: 20px;
            text-align: center;
        }

        .question-text {
            font-size: 1.6rem;
            margin-bottom: 20px;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            /* 竖屏默认纵向显示 */
            align-items: center;
            gap: 40px;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        @media (min-width: 1024px) {
            .main-container {
                flex-direction: row;
                /* 宽屏切换为横向 */
                flex-wrap: nowrap;
                overflow-x: auto;
                padding: 10px 20px 40px;
                scroll-snap-type: x mandatory;
                -webkit-overflow-scrolling: touch;
            }

            /* 如果没有横向滚动条则水平居中的技巧 */
            .main-container>.display-area:first-child {
                margin-left: auto;
            }

            .main-container>.display-area:last-child {
                margin-right: auto;
            }

            .display-area {
                flex-shrink: 0;
                /* 防止宽屏下被挤压 */
                scroll-snap-align: center;
                min-width: 320px;
            }

            /* 自定义横向滚动条样式 */
            .main-container::-webkit-scrollbar {
                height: 6px;
            }

            .main-container::-webkit-scrollbar-track {
                background: #eee;
                border-radius: 10px;
            }

            .main-container::-webkit-scrollbar-thumb {
                background: var(--primary-color);
                border-radius: 10px;
            }
        }

        .display-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
        }

        /* 网格背景基础样式 */
        .grid-container {
            position: relative;
            background-image:
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            border: 1px solid var(--grid-color);
            border-width: 0 1px 1px 0;
            background-size: var(--unit) var(--unit);
            perspective: 1200px;
            margin-bottom: 20px;
        }

        /* 不同图形的网格尺寸 */
        #area1 .grid-container {
            width: calc(var(--unit) * 7);
            height: calc(var(--unit) * 5);
        }

        #area2 .grid-container {
            --unit: calc(300px / 6);
            width: calc(var(--unit) * 7);
            height: calc(var(--unit) * 6);
        }

        #area3 .grid-container {
            --unit: calc(300px / 7);
            width: calc(var(--unit) * 10);
            height: calc(var(--unit) * 7);
        }

        #area4 .grid-container {
            --unit: calc(300px / 6);
            width: calc(var(--unit) * 7);
            height: calc(var(--unit) * 6);
        }

        /* 3D 场景 */
        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.8s ease;
        }

        .face {
            position: absolute;
            background: var(--face-color);
            border: 2px solid var(--border-color);
            box-sizing: border-box;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: rgba(0, 0, 0, 0.2);
        }

        /* 按钮样式 */
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            padding: 8px 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 86, 0, 0.3);
        }

        .btn.reset {
            background: #74706E;
        }

        .index-label {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* 图形 ① 布局 (5行7列 - 精确还原) */
        #shape1 .base {
            left: calc(var(--unit)*3);
            top: var(--unit);
            width: calc(var(--unit)*2 + 2px);
            height: calc(var(--unit)*3 + 2px);
        }

        #shape1 .left1 {
            left: calc(var(--unit)*-1 - 2px);
            width: calc(var(--unit) + 2px);
            height: calc(var(--unit)*3 + 2px);
            transform-origin: calc(100% - 1px) 50%;
        }

        #shape1 .left2 {
            left: calc(var(--unit)*-1 - 2px);
            width: calc(var(--unit) + 2px);
            height: calc(var(--unit)*3 + 2px);
            transform-origin: calc(100% - 1px) 50%;
        }

        #shape1 .right {
            left: calc(var(--unit)*2 - 2px);
            width: calc(var(--unit) + 2px);
            height: calc(var(--unit)*3 + 2px);
            transform-origin: 1px 50%;
        }

        #shape1 .top {
            top: calc(var(--unit)*-1 - 2px);
            width: calc(var(--unit)*2 + 2px);
            height: calc(var(--unit) + 2px);
            ;
            transform-origin: 50% calc(100% - 1px);
        }

        #shape1 .bottom {
            top: calc(var(--unit)*3 - 2px);
            width: calc(var(--unit)*2 + 2px);
            height: calc(var(--unit) + 2px);
            transform-origin: 50% 1px;
        }

        #shape2 .base {
            left: calc(var(--unit)*3);
            top: var(--unit);
            width: calc(var(--unit)*2 + 2px);
            height: calc(var(--unit)*4 + 2px);
        }

        #shape2 .left {
            left: calc(var(--unit)*-1 - 2px);
            width: calc(var(--unit) + 2px);
            height: calc(var(--unit)*4 + 2px);
            transform-origin: calc(100% - 1px) 50%;
        }

        #shape2 .far {
            left: calc(var(--unit)*-2 - 2px);
            width: calc(var(--unit)*2 + 2px);
            height: calc(var(--unit)*4 + 2px);
            transform-origin: calc(100% - 1px) 50%;
        }

        #shape2 .top_on_left {
            top: calc(var(--unit)*-1 - 2px);
            width: calc(var(--unit)*2 + 2px);
            height: calc(var(--unit) + 2px);
            transform-origin: 50% calc(100% - 1px);
        }

        #shape2 .right {
            left: calc(var(--unit)*2 - 2px);
            width: calc(var(--unit) + 2px);
            height: calc(var(--unit)*4 + 2px);
            transform-origin: 1px 50%;
        }

        #shape2 .bottom {
            top: calc(var(--unit)*4 - 2px);
            width: calc(var(--unit)*2 + 2px);
            height: calc(var(--unit) + 2px);
            transform-origin: 50% 1px;
        }

        /* 图形 ③ 布局 (7行10列) */
        #shape3 .base {
            left: calc(var(--unit)*4);
            top: calc(var(--unit)*2);
            width: calc(var(--unit)*2 + 2px);
            height: calc(var(--unit)*3 + 2px);
        }

        #shape3 .top_left {
            left: calc(var(--unit)*-3 - 2px);
            width: calc(var(--unit)*3 + 2px);
            height: calc(var(--unit)*2 + 2px);
            transform-origin: calc(100% - 1px) calc(100% - 1px);
        }

        #shape3 .top_right {
            top: calc(var(--unit)*-2 - 2px);
            width: calc(var(--unit)*2 + 2px);
            height: calc(var(--unit)*2 + 2px);
            transform-origin: 50% calc(100% - 1px);
        }

        #shape3 .bottom_left {
            left: calc(var(--unit)*-3 - 2px);
            width: calc(var(--unit)*3 + 2px);
            height: calc(var(--unit)*2 + 2px);
            transform-origin: calc(100% - 1px) 1px;
        }

        #shape3 .bottom_mid {
            top: calc(var(--unit)*3 - 2px);
            width: calc(var(--unit)*2 + 2px);
            height: calc(var(--unit)*2 + 2px);
            transform-origin: 50% 1px;
        }

        #shape3 .bottom_right {
            left: calc(var(--unit)*2 - 2px);
            width: calc(var(--unit)*3 + 2px);
            height: calc(var(--unit)*2 + 2px);
            transform-origin: 1px 50%;
        }

        /* 图形 ④ 布局 (6行7列) */
        #shape4 .base {
            left: var(--unit);
            top: var(--unit);
            width: calc(var(--unit)*2 + 2px);
            height: calc(var(--unit)*3 + 2px);
        }

        #shape4 .left {
            left: calc(var(--unit)*-1 - 2px);
            width: calc(var(--unit) + 2px);
            height: calc(var(--unit)*3 + 2px);
            transform-origin: calc(100% - 1px) 50%;
        }

        #shape4 .bottom_on_left {
            top: calc(var(--unit)*3 - 2px);
            width: calc(var(--unit) + 2px);
            height: calc(var(--unit) + 2px);
            transform-origin: 50% 1px;
        }

        #shape4 .right_mid {
            left: calc(var(--unit)*2 - 2px);
            width: calc(var(--unit) + 2px);
            height: calc(var(--unit)*3 + 2px);
            transform-origin: 1px 50%;
        }

        #shape4 .top_on_mid {
            top: calc(var(--unit)*-1 - 2px);
            width: calc(var(--unit) + 2px);
            height: calc(var(--unit) + 2px);
            transform-origin: 50% calc(100% - 1px);
        }

        #shape4 .far_right {
            left: calc(var(--unit) - 2px);
            width: calc(var(--unit)*2 + 2px);
            height: calc(var(--unit)*3 + 2px);
            transform-origin: 1px 50%;
        }

        /* 折叠状态动画 */
        .folded #shape1 .left1 {
            transform: rotateY(90deg);
            transition-delay: 0.1s;
        }

        .folded #shape1 .left2 {
            transform: rotateY(90deg);
            transition-delay: 0.5s;
        }

        .folded #shape1 .right {
            transform: rotateY(-90deg);
            transition-delay: 0.2s;
        }

        .folded #shape1 .top {
            transform: rotateX(-90deg);
            transition-delay: 0.3s;
        }

        .folded #shape1 .bottom {
            transform: rotateX(90deg);
            transition-delay: 0.4s;
        }

        .folded #shape2 .left {
            transform: rotateY(90deg);
            transition-delay: 0.1s;
        }

        .folded #shape2 .right {
            transform: rotateY(-90deg);
            transition-delay: 0.2s;
        }

        .folded #shape2 .top_on_left {
            transform: rotateX(-90deg);
            transition-delay: 0.3s;
        }

        .folded #shape2 .bottom {
            transform: rotateX(90deg);
            transition-delay: 0.4s;
        }

        .folded #shape2 .far {
            transform: rotateY(90deg);
            transition-delay: 0.5s;
        }

        .folded #shape3 .top_left {
            transform: rotateY(90deg);
            transition-delay: 0.1s;
        }

        .folded #shape3 .top_right {
            transform: rotateX(-90deg);
            transition-delay: 0.2s;
        }

        .folded #shape3 .bottom_left {
            transform: rotateY(90deg);
            transition-delay: 0.3s;
        }

        .folded #shape3 .bottom_mid {
            transform: rotateX(90deg);
            transition-delay: 0.4s;
        }

        .folded #shape3 .bottom_right {
            transform: rotateY(-90deg);
            transition-delay: 0.5s;
        }

        .folded #shape4 .left {
            transform: rotateY(90deg);
            transition-delay: 0.1s;
        }

        .folded #shape4 .right_mid {
            transform: rotateY(-90deg);
            transition-delay: 0.2s;
        }

        .folded #shape4 .top_on_mid {
            transform: rotateX(-90deg);
            transition-delay: 0.3s;
        }

        .folded #shape4 .far_right {
            transform: rotateY(-90deg);
            transition-delay: 0.4s;
        }

        .folded #shape4 .bottom_on_left {
            transform: rotateX(90deg);
            transition-delay: 0.5s;
        }

        /* 整体旋转观察 */
        .view-3d .scene {
            transform: rotateX(-20deg) rotateY(30deg);
        }

        /* 拖拽时禁用过渡，确保画面流畅 */
        .scene.is-dragging {
            transition: none !important;
        }

        .tip {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
            background: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
        }
    </style>
</head>

                        <div class="face top_right">
                            <div class="face top_left"></div>
                        </div>
                        <div class="face bottom_mid">
                            <div class="face bottom_left"></div>
                            <div class="face bottom_right"></div>
                        </div>
                    </div>

            </div>

        <!-- 图形 ④ -->

            <div class="grid-container">
                <div class="scene" id="shape4">

                        <div class="face left"> <!-- Col 1, Row 2-4 -->
                            <div class="face bottom_on_left"></div> <!-- Col 1, Row 5 -->

                        <div class="face right_mid"> <!-- Col 4, Row 2-4 -->
                            <div class="face top_on_mid"></div> <!-- Col 4, Row 1 -->
                            <div class="face far_right"></div> <!-- Col 5-6, Row 2-4 -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="index-label">④</div>
            <div class="controls">
                <button class="btn" onclick="toggleState(4, this)">演示折叠</button>
            </div>
        </div>
    </main>
