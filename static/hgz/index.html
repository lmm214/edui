<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小乐的喝果汁问题 - 互动课件</title>


    <style>
        /* === 核心变量定义与高级色彩系统 === */
        :root {
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 255, 255, 0.6);
            --card-shadow: 0 10px 25px -5px rgba(148, 163, 184, 0.1), 0 8px 10px -6px rgba(148, 163, 184, 0.05);
            --card-shadow-hover: 0 20px 30px -5px rgba(148, 163, 184, 0.2), 0 10px 15px -5px rgba(148, 163, 184, 0.1);

            --step1-primary: #ea580c;
            --step1-bg: #ffedd5;
            --step1-border: #fed7aa;

            --step2-primary: #2563eb;
            --step2-bg: #dbeafe;
            --step2-border: #bfdbfe;

            --step3-primary: #9333ea;
            --step3-bg: #f3e8ff;
            --step3-border: #d8b4fe;

            --step4-primary: #dc2626;
            --step4-bg: #fee2e2;
            --step4-border: #fca5a5;
        }

        /* === 基础复位与全局高亮去除 === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            /* 去除点击出现的大矩形高亮 */
            outline: none;
            /* 去除选中边框 */
        }

        /* 强制一屏幕显示，禁止全局滚动 */
        html,
        body {
            height: 100vh;
            overflow: hidden;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-gradient);
            color: #1e293b;
            padding: 0.75rem 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        /* === 页面顶部 === */
        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            flex: 0 0 auto;
        }

        .gradient-title {
            background: linear-gradient(135deg, #0f172a 0%, #2563eb 50%, #7e22ce 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        .header-btns {
            display: flex;
            gap: 0.5rem;
        }

        .top-btn {
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid #cbd5e1;
            padding: 0.35rem 1.25rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        .top-btn:hover {
            background: white;
            color: #2563eb;
            border-color: #3b82f6;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transform: translateY(-1px);
        }

        /* === 横向滚动卡片容器结构 === */
        .slider-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            padding: 0 3.5rem;
            /* 留出左右悬浮箭头的空间 */
            flex: 1;
            /* 占据剩余可用高度 */
            min-height: 0;
            /* 防止溢出 */
            margin-bottom: 0.5rem;
        }

        .slider-viewport {
            width: 100%;
            height: 100%;
            overflow-x: auto;
            scroll-behavior: smooth;
            display: flex;
            align-items: center;
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        .slider-viewport::-webkit-scrollbar {
            display: none;
            /* Safari and Chrome */
        }

        .slider-track {
            display: flex;
            gap: 1.25rem;
            width: 100%;
            height: 100%;
            padding: 0.5rem 0;
        }

        /* === 步骤卡片样式 === */
        .step-card {
            flex: 0 0 calc(33.333% - 0.84rem);
            /* 默认桌面端显示 3 个卡片 */
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 1.5rem;
            padding: 1.25rem;
            box-shadow: var(--card-shadow);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100%;
            /* 占满 slider 轨道高度 */
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        @media (max-width: 1023px) and (min-width: 768px) {
            .step-card {
                flex: 0 0 calc(50% - 0.63rem);
                /* 平板端显示 2 个卡片 */
            }
        }

        @media (max-width: 767px) {
            .step-card {
                flex: 0 0 100%;
                /* 移动端显示 1 个卡片 */
            }
        }

        /* === 折叠卡片状态 === */
        .step-card.collapsed {
            background: rgba(255, 255, 255, 0.45);
            border: 2px dashed rgba(148, 163, 184, 0.35);
            box-shadow: none;
            justify-content: center;
            cursor: pointer;
        }

        .step-card.collapsed:hover {
            background: rgba(255, 255, 255, 0.65);
            border-color: rgba(148, 163, 184, 0.6);
            transform: translateY(-2px);
        }

        .step-card.collapsed .step-badge {
            transform: scale(1.2);
            margin-bottom: 0;
            animation: pulse 2s infinite;
        }

        /* 引导性虚线提示 */
        .step-card.collapsed::after {
            content: "点击卡片展开步骤";
            font-size: 0.8rem;
            font-weight: 700;
            color: #64748b;
            margin-top: 0.85rem;
            opacity: 0.7;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.25);
            }

            70% {
                box-shadow: 0 0 0 8px rgba(37, 99, 235, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(37, 99, 235, 0);
            }
        }

        /* 折叠状态下隐藏内容 */
        .step-card.collapsed .step-action,
        .step-card.collapsed .cup-wrapper,
        .step-card.collapsed .questions-container {
            opacity: 0;
            pointer-events: none;
            height: 0;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* 展开动画 */
        .step-action,
        .cup-wrapper,
        .questions-container {
            width: 100%;
            opacity: 1;
            transition: opacity 0.3s ease, height 0.3s ease, margin 0.3s ease, padding 0.3s ease;
        }

        /* 顶部步骤徽章 */
        .step-badge {
            font-size: 0.85rem;
            font-weight: 800;
            padding: 0.25rem 0.85rem;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03);
            border: 1px solid transparent;
            transition: all 0.3s;
        }

        /* 各卡片色彩主题 */
        .step-card[data-step="1"] .step-badge {
            background: var(--step1-bg);
            color: var(--step1-primary);
            border-color: var(--step1-border);
        }

        .step-card[data-step="2"] .step-badge {
            background: var(--step2-bg);
            color: var(--step2-primary);
            border-color: var(--step2-border);
        }

        .step-card[data-step="3"] .step-badge {
            background: var(--step3-bg);
            color: var(--step3-primary);
            border-color: var(--step3-border);
        }

        .step-card[data-step="4"] .step-badge {
            background: var(--step4-bg);
            color: var(--step4-primary);
            border-color: var(--step4-border);
        }

        .step-action {
            font-size: 2.25rem;
            color: #0f172a;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        /* 眼睛按钮交互样式 */
        .eye-btn {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.25rem;
            border-radius: 6px;
            transition: all 0.2s;
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .eye-btn.visible {
            opacity: 1;
            pointer-events: auto;
            visibility: visible;
        }

        .eye-btn:hover {
            color: #2563eb;
            background: rgba(37, 99, 235, 0.08);
            transform: scale(1.08);
        }

        .eye-btn.active {
            color: #2563eb;
            background: rgba(37, 99, 235, 0.15);
        }

        .eye-icon {
            width: 1.35rem;
            height: 1.35rem;
            display: block;
        }

        /* 眼睛图标的 SVG 属性强化显现 */
        .eye-btn svg {
            stroke: currentColor;
            stroke-width: 2px;
            fill: none;
        }

        .eye-btn.active svg {
            stroke: #2563eb;
        }

        /* === 虚拟杯子及玻璃遮罩（自适应大小） === */
        .cup-wrapper {
            position: relative;
            flex: 1;
            /* 弹性高度自适应 */
            min-height: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 0.5rem;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .cup-wrapper svg {
            width: auto;
            height: 100%;
            max-height: 100%;
            max-width: 100%;
        }

        .liquid-rect {
            transition: y 0.5s cubic-bezier(0.4, 0, 0.2, 1), height 0.5s cubic-bezier(0.4, 0, 0.2, 1), fill 0.5s ease, opacity 0.5s ease;
        }

        .liquid-label {
            transition: y 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
        }

        .liquid-label-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
            width: 100%;
            height: 100%;
            white-space: nowrap;
        }

        [data-step="4"] .liquid-label-inner {
            font-size: 1rem;
        }

        .quarter-lines {
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        /* === 问题与点击回答区域 === */
        .questions-container {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            border-top: 1px dashed #cbd5e1;
            padding-top: 0.5rem;
            margin-top: auto;
        }

        .question-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            font-size: 1.5rem;
        }

        .question-row.question-juice {
            color: #ff7f50;
        }

        .question-row.question-water {
            color: #00a2ff;
        }

        .question-juice .answer-badge {
            color: #ff7f50;
            background: #fff5f2;
        }

        .question-juice .answer-badge:hover {
            background: #ffe3d9;
            color: #e05319;
        }

        .question-juice .answer-badge.revealed {
            background: #fff5f2;
            color: #ff7f50;
            border: 1.5px solid #ffccb8;
            box-shadow: 0 4px 6px -1px rgba(255, 127, 80, 0.15);
        }

        .question-water .answer-badge {
            color: #00a2ff;
            background: #f0f9ff;
        }

        .question-water .answer-badge:hover {
            background: #dbeffe;
            color: #0084d1;
        }

        .question-water .answer-badge.revealed {
            background: #f0f9ff;
            color: #00a2ff;
            border: 1.5px solid #bde3ff;
            box-shadow: 0 4px 6px -1px rgba(0, 162, 255, 0.15);
        }

        .question-label {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot-juice {
            background: #ff7f50;
        }

        .dot-water {
            background: #00a2ff;
        }

        .answer-badge {
            background: #f1f5f9;
            color: #64748b;
            border: none;
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 50%;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.04), 0 2px 4px rgba(0, 0, 0, 0.02);
            -webkit-tap-highlight-color: transparent;
        }

        .answer-badge:hover {
            background: #e2e8f0;
            color: #1e293b;
            transform: scale(1.1);
        }

        .answer-badge.revealed {
            background: #eff6ff;
            color: #2563eb;
            width: auto;
            height: 2.25rem;
            padding: 0 0.85rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.1);
            border: 1.5px solid #bfdbfe;
            font-family: inherit;
            font-size: 1.1rem;
            animation: bounceIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .fraction-box {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            line-height: 1;
            margin: 0 0.15rem;
        }

        .fraction-num {
            border-bottom: 1.5px solid currentColor;
            padding-bottom: 1px;
            font-size: 0.85em;
        }

        .fraction-denom {
            font-size: 0.85em;
            padding-top: 1px;
        }

        /* === 悬浮横向滚动切换按钮 === */
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 30;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #cbd5e1;
            border-radius: 50%;
            width: 3rem;
            height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            color: #334155;
            -webkit-tap-highlight-color: transparent;
        }

        .slider-btn:hover:not(:disabled) {
            background: white;
            color: #2563eb;
            transform: translateY(-50%) scale(1.08);
            box-shadow: 0 6px 15px rgba(37, 99, 235, 0.15);
        }

        .slider-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            box-shadow: none;
        }

        .slider-btn.left {
            left: 0;
        }

        .slider-btn.right {
            right: 0;
        }
    </style>
</head>

<body>

    <!-- 共享 SVG 渐变和裁切模板定义 -->
    <svg style="position: absolute; width: 0; height: 0; overflow: hidden;" version="1.1"
        xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- 纯果汁（橙色） -->
            <linearGradient id="juiceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ffa500" />
                <stop offset="100%" stop-color="#ff6d00" />
            </linearGradient>
            <!-- 纯水（蓝色） -->
            <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#a0e0ff" />
                <stop offset="100%" stop-color="#00a2ff" />
            </linearGradient>
            <!-- 混合果汁（淡一些的果汁橙色） -->
            <linearGradient id="mixedGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ffd59a" />
                <stop offset="100%" stop-color="#ffb37b" />
            </linearGradient>
            <!-- 裁切 -->
            <clipPath id="cupClip">
                <rect x="30" y="20" width="100" height="140" rx="10" ry="10" />
            </clipPath>
        </defs>
    </svg>

    <header>
        <h1 class="gradient-title">喝果汁问题</h1>
        <div class="header-btns">
            <button class="top-btn" onclick="resetAll()">重置</button>
        </div>
    </header>

    <!-- 横向滚动卡片总容器 -->
    <main class="slider-container">

        <!-- 左切换箭头 -->
        <button class="slider-btn left" id="slider-prev" onclick="moveSlider(-1)" disabled>
            <svg style="width: 1.5rem; height: 1.5rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
            </svg>
        </button>

        <!-- 视口容器 -->
        <div class="slider-viewport" id="slider-viewport">
            <div class="slider-track" id="slider-track">

                <!-- 第一卡片：第一步（喝半杯） -->
                <section class="step-card" data-step="1" id="card-1">
                    <span class="step-badge" onclick="expandStep(1)">第一步</span>
                    <h2 class="step-action">喝半杯</h2>

                    <div class="cup-wrapper" onclick="toggleCup(1)">
                        <svg viewBox="0 0 160 180" width="100%" height="100%">
                            <g clip-path="url(#cupClip)">
                                <rect x="30" y="20" width="100" height="140" fill="#f8fafc" opacity="0.6" />
                                <rect id="water-1" class="liquid-rect" x="30" y="160" width="100" height="0"
                                    fill="url(#waterGrad)" />
                                <rect id="juice-1" class="liquid-rect" x="30" y="20" width="100" height="140"
                                    fill="url(#juiceGrad)" />

                                <foreignObject id="juice-label-1" class="liquid-label" x="30" y="75" width="100"
                                    height="30">
                                    <div xmlns="http://www.w3.org/1999/xhtml" class="liquid-label-inner">1 杯果汁</div>
                                </foreignObject>
                                <foreignObject id="water-label-1" class="liquid-label" x="30" y="145" width="100"
                                    height="30" opacity="0">
                                    <div xmlns="http://www.w3.org/1999/xhtml" class="liquid-label-inner"></div>
                                </foreignObject>
                            </g>
                            <rect x="30" y="20" width="100" height="140" rx="10" ry="10" fill="none" stroke="#94a3b8"
                                stroke-width="4" />
                            <line x1="130" y1="20" x2="138" y2="20" stroke="#94a3b8" stroke-width="2" />
                            <text x="144" y="24" font-size="10" fill="#64748b" font-weight="600">1</text>
                            <line x1="130" y1="90" x2="138" y2="90" stroke="#94a3b8" stroke-width="2" />
                            <foreignObject x="144" y="78" width="20" height="24">
                                <div xmlns="http://www.w3.org/1999/xhtml"
                                    style="display: flex; align-items: center; justify-content: flex-start; color: #64748b; font-family: inherit; font-size: 10px; font-weight: 600; line-height: 1; height: 100%;">
                                    <div class="fraction-box" style="margin: 0; font-weight: 600;"><span
                                            class="fraction-num" style="border-bottom-width: 1px;">1</span><span
                                            class="fraction-denom">2</span></div>
                                </div>
                            </foreignObject>
                            <line x1="130" y1="160" x2="138" y2="160" stroke="#94a3b8" stroke-width="2" />
                            <text x="144" y="164" font-size="10" fill="#64748b" font-weight="600">0</text>
                        </svg>
                    </div>

                    <div class="questions-container" onclick="event.stopPropagation()">
                        <div class="question-row question-juice">
                            <span class="question-label"><span class="dot dot-juice"></span> 喝掉果汁：</span>
                            <button class="answer-badge" id="ans-j-1" onclick="revealIndividual('j-1')">？</button>
                        </div>
                        <div class="question-row question-water">
                            <span class="question-label"><span class="dot dot-water"></span> 喝掉水：</span>
                            <button class="answer-badge" id="ans-w-1" onclick="revealIndividual('w-1')">？</button>
                        </div>
                    </div>
                </section>

                <!-- 第二卡片：第二步（加满水） -->
                <section class="step-card collapsed" data-step="2" id="card-2" onclick="expandStep(2)">
                    <span class="step-badge">第二步</span>
                    <h2 class="step-action">
                        加满水
                        <button class="eye-btn" id="eye-btn-2" onclick="toggleSeparated(2, event)" title="分开水和果汁">
                            <svg class="eye-icon" viewBox="0 0 24 24" fill="none">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </h2>

                    <div class="cup-wrapper" onclick="toggleCup(2)">
                        <svg viewBox="0 0 160 180" width="100%" height="100%">
                            <g clip-path="url(#cupClip)">
                                <rect x="30" y="20" width="100" height="140" fill="#f8fafc" opacity="0.6" />
                                <rect id="water-2" class="liquid-rect" x="30" y="90" width="100" height="0"
                                    fill="url(#waterGrad)" />
                                <rect id="juice-2" class="liquid-rect" x="30" y="90" width="100" height="70"
                                    fill="url(#juiceGrad)" />

                                <foreignObject id="juice-label-2" class="liquid-label" x="30" y="110" width="100"
                                    height="30">
                                    <div xmlns="http://www.w3.org/1999/xhtml" class="liquid-label-inner">
                                        <div class="fraction-box"><span class="fraction-num">1</span><span
                                                class="fraction-denom">2</span></div>果汁
