<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课作长方体里摆小正方体</title>
    <script src="three.js"></script>
    <script src="oc.js"></script>
    <style>
        body {
            margin: 0;
            background-image: radial-gradient(73% 147%, #EADFDF 59%, #ECE2DF 100%), radial-gradient(91% 146%, rgba(255, 255, 255, 0.50) 47%, rgba(0, 0, 0, 0.50) 100%);
            background-blend-mode: screen;
            font-family: 'PingFang SC', sans-serif;
            overflow: hidden;
        }

        #container {
            width: 100vw;
            height: 100vh;
        }

        .controls {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        .btn {
            padding: 10px 16px;
            background: #f1f5f9;
            /* 更淡的背景 */
            color: #475569;
            border: 1px solid #94a3b8;
            /* 加深边框颜色 */
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            min-width: 80px;
        }

        .btn:hover:not(:disabled) {
            background: #e2e8f0;
            transform: translateY(-2px);
            border-color: #64748b;
        }

        .num-btn {
            border: none;
            background: #f1f5f9;
            padding: 6px 12px;
            cursor: pointer;
            color: #475569;
            font-weight: bold;
            transition: background 0.2s;
        }

        .num-btn:hover {
            background: #e2e8f0;
        }

        .num-btn:active {
            background: #cbd5e1;
        }

        .label {
            position: absolute;
            color: #475569;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            transform: translate(-50%, -50%);
            text-shadow: 1px 1px 2px white, -1px -1px 2px white, 1px -1px 2px white, -1px 1px 2px white;
            z-index: 10;
        }

        .size-control-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 8px;
        }

        .size-control-label {
            font-size: 14px;
            color: #475569;
            font-weight: bold;
            text-align: center;
        }

        .size-control-box {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #94a3b8;
            border-radius: 6px;
            overflow: hidden;
            background: white;
            width: 100%;
        }

        .btn-minus {
            border-right: 1px solid #94a3b8;
            flex: 1;
        }

        .size-control-display {
            text-align: center;
            font-size: 5rem;
            color: #475569;
            font-weight: bold;
            margin: 4px 0;
            line-height: 1;
        }

        .btn-plus {
            flex: 1;
        }
    </style>
</head>

<body>
    <div id="container"></div>
    <div id="labelX" class="label">36</div>
    <div id="labelZ" class="label">8</div>
    <div id="labelY" class="label">12</div>
    <div class="controls">
        <div class="size-control-wrapper">
            <label class="size-control-label">小正方体棱长</label>
            <div id="cubeSizeDisplay" class="size-control-display">1</div>
            <div class="size-control-box">
                <button id="btnMinus" class="num-btn btn-minus">-</button>
                <button id="btnPlus" class="num-btn btn-plus">+</button>
            </div>
        </div>
        <button id="btn1" class="btn">长</button>
        <button id="btn2" class="btn">宽</button>
        <button id="btn3" class="btn">高</button>
    </div>
