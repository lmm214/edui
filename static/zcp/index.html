<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找次品 · 虚拟天平</title>
    <style>
        :root {
            --bg: #EDE8DF;
            --panel-bg: rgba(255, 255, 255, 0.55);
            --text: #3D3530;
            --text-muted: #8A7F78;
            --cone-fill: #E07B3F;
            --cone-edge: #C05E28;
            --cyl-fill: #5ACFCA;
            --cyl-edge: #3AADA8;
            --accent-red: #E07878;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100vw;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }

        /* ── Canvas ── */
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ── 顶部浮层 ── */
        .floating-header {
            position: fixed;
            top: 18px;
            left: 20px;
            background: rgba(255, 255, 255, 0.55);
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.12), inset -1px -1px 3px rgba(255, 255, 255, 0.9);
            padding: 9px 22px;
            border-radius: 30px;
            z-index: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-group {
            display: flex;
            align-items: center;
            gap: 9px;
            color: var(--text);
        }

        .title-icon {
            font-size: 24px;
            line-height: 1;
        }

        .title-text {}

        .title-main {
            font-size: 19px;
            font-weight: 800;
            letter-spacing: 2px;
            line-height: 1.1;
        }

        #defectBadge {
            font-weight: 700;
            color: #fff;
            background: var(--cone-fill);
            padding: 2px 8px;
            border-radius: 8px;
            letter-spacing: 1px;
            display: inline-block;
            line-height: 1.5;
            transition: background 0.3s, color 0.3s;
        }

        #defectBadge.heavy {
            background: rgba(224, 120, 120, 0.15);
            color: var(--accent-red);
        }

        #defectBadge.unknown {
            background: rgba(138, 127, 120, 0.15);
            color: var(--text-muted);
        }

        .floating-constraint {
            position: fixed;
            top: 18px;
            right: 20px;
            background: rgba(255, 255, 255, 0.55);
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.12), inset -1px -1px 3px rgba(255, 255, 255, 0.9);
            padding: 8px 16px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 500;
        }

        .btn-toggle {
            background: var(--cone-fill);
            box-shadow: 0 2px 5px rgba(224, 123, 63, 0.3);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
        }

        .btn-toggle:active {
            transform: scale(0.92);
            opacity: 0.85;
        }

        .btn-reset {
            background: rgba(0, 0, 0, 0.08);
            /* changed from transparent reset red button */
            color: var(--text);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.15s, background 0.15s;
        }

        #btnReset.btn-reset {
            font-size: 0.85rem;
        }

        .btn-reset:active {
            transform: scale(0.92);
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.05);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--text);
            transition: all 0.25s;
        }

        .btn-icon:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: scale(1.05);
        }

        .btn-icon.locked {
            background: var(--cyl-fill);
            color: #fff;
        }

        #modePanel {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #weighActions {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.55);
            box-shadow: inset 2px 2px 6px rgba(0, 0, 0, 0.08), inset -2px -2px 5px rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 8px 16px;
            gap: 30px;
            align-items: center;
            z-index: 500;
        }



        /* 水平分割线 */
        .divider {
            width: 1px;
            height: 20px;
            background: rgba(0, 0, 0, 0.1);
        }

        /* ══════════════════════════════
           RESULT TIP
        ══════════════════════════════ */
        #resultTip {
            position: fixed;
            top: 114px;
            left: 50%;
            transform: translateX(-50%);
            padding: 7px 22px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            color: white;
            z-index: 35;
            display: none;
            white-space: nowrap;
            background: var(--cone-fill);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            pointer-events: none;
        }

        /* ══════════════════════════════
           SETTINGS MODAL
        ══════════════════════════════ */
        #settingsOverlay {
            position: fixed;
            inset: 0;
            background: rgba(237, 232, 223, 0.5);
            /* var(--bg) with opacity */
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s;
        }

        #settingsOverlay.open {
            opacity: 1;
            pointer-events: all;
        }

        #settingsPanel {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 22px;
            padding: 28px 32px 24px;
            width: 390px;
            max-width: 92vw;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.08);
            transform: translateY(18px) scale(0.97);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #settingsOverlay.open #settingsPanel {
            transform: translateY(0) scale(1);
        }

        .panel-head {
            font-size: 18px;
            font-weight: bold;
            color: var(--text);
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 7px;
            letter-spacing: 1px;
        }

        .panel-divider {
            height: 1px;
            background: rgba(0, 0, 0, 0.06);
            margin: 8px 0 20px;
        }

        .setting-row {
            margin-bottom: 20px;
        }

        .setting-lbl {
            font-size: 13px;
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 10px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .setting-lbl::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 13px;
            background: var(--cyl-fill);
            border-radius: 2px;
        }

        /* Radio buttons */
        .segment-control {
            display: flex;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 20px;
            padding: 3px;
            gap: 2px;
        }

        .segment-btn {
            border: none;
            background: transparent;
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 18px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .segment-btn:hover {
            color: var(--text);
        }

        .segment-btn.active {
            background: var(--cone-fill);
            color: #fff;
            box-shadow: 0 2px 5px rgba(224, 123, 63, 0.3);
        }

        .radio-group {
            display: flex;
            gap: 9px;
        }

        .radio-btn {
            flex: 1;
            height: 42px;
            border-radius: 20px;
            border: 2px solid transparent;
            background: rgba(0, 0, 0, 0.04);
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.18s;
            color: var(--text);
            font-family: inherit;
        }

        .radio-btn:hover {
            background: rgba(0, 0, 0, 0.08);
        }

        .radio-btn.sel {
            background: var(--cone-fill);
            color: white;
            box-shadow: 0 2px 8px rgba(224, 123, 63, 0.3);
        }

        /* Counter */
        .counter-wrap {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .ctr-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.04);
            border: none;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            transition: all 0.18s;
            line-height: 1;
            font-family: inherit;
        }

        .ctr-btn:hover:not(:disabled) {
            background: rgba(0, 0, 0, 0.08);
        }

        .ctr-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        #sCountVal {
            font-size: 28px;
            font-weight: bold;
            color: var(--text);
            min-width: 48px;
            text-align: center;
        }

        .ctr-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* Panel actions */
        .panel-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .panel-actions button {
            flex: 1;
            height: 44px;
            border-radius: 22px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.18s;
            letter-spacing: 1px;
            font-family: inherit;
            border: none;
        }

        #btnCancelSt {
            background: rgba(0, 0, 0, 0.06);
            color: var(--text);
        }

        #btnCancelSt:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        #btnApplySt {
            background: var(--cyl-fill);
            color: white;
            box-shadow: 0 4px 12px rgba(90, 207, 202, 0.3);
        }

        #btnApplySt:hover {
            box-shadow: 0 6px 16px rgba(90, 207, 202, 0.4);
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>

    <div class="floating-header">
        <div class="title-group">
            <span class="title-icon">⚖️</span>
            <div class="title-text">
                <span class="title-main">找次品</span>
                <span id="defectBadge">次品较轻</span>
            </div>
        </div>
    </div>

    <div class="floating-constraint">
        <div id="modePanel" class="segment-control">
            <button id="btnRealTime" class="segment-btn active">实时模式</button>
            <button id="btnManual" class="segment-btn">手动模式</button>
        </div>
        <div class="divider"></div>
        <button id="btnReset" class="btn-reset">重置</button>

        <div class="divider"></div>
        <button id="btnSettings" title="设置" class="btn-icon">⚙️</button>
    </div>

    <!-- ── Center Action Bar ── -->
    <div id="weighActions" style="display:none">
        <button id="btnWeigh" class="btn-toggle">称一称</button>
        <button id="btnMoveBack" class="btn-reset">移回</button>
    </div>

    <!-- ── Result tip ── -->
    <div id="resultTip"></div>

    <!-- ── Settings modal ── -->
    <div id="settingsOverlay">
        <div id="settingsPanel">
            <div class="panel-head">⚙️ 参数设置</div>
            <div class="panel-divider"></div>

            <div class="setting-row">
                <div class="setting-lbl">次品特征</div>
                <div class="radio-group" id="typeGroup">
                    <button class="radio-btn sel" data-val="light">🪶 较 轻</button>
                    <button class="radio-btn" data-val="heavy">🧱 较 重</button>
                    <button class="radio-btn" data-val="unknown">❓ 未 知</button>
                </div>
            </div>

            <div class="setting-row">
                <div class="setting-lbl">钙片数量</div>
                <div class="counter-wrap">
                    <button class="ctr-btn" id="btnCtrDown">−</button>
                    <div id="sCountVal">8</div>
                    <button class="ctr-btn" id="btnCtrUp">+</button>
                </div>
                <div class="ctr-hint">可设置 3 ~ 12 片</div>
            </div>

            <div class="panel-actions">
                <button id="btnCancelSt">取消</button>
                <button id="btnApplySt">应用并重置</button>
            </div>
        </div>
    </div>
