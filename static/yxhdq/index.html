<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蝴蝶棋</title>
    <style>
        :root {
            --red-primary: #ff4757;
            --blue-primary: #1e90ff;
            --bg-color: #fff9f0;
            --green-primary: #2ed573;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(160deg, #fff9f0 0%, #ffecd2 100%);
            font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            touch-action: none;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ── 顶部回合栏 ── */
        .top-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 16px 6px;
            flex-shrink: 0;
        }

        .turn-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 14px;
            border-radius: 50px;
            font-size: 1rem;
            letter-spacing: 0.05em;
            transition: all 0.35s cubic-bezier(.34, 1.56, .64, 1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
            cursor: pointer;
            user-select: none;
        }

        .turn-red {
            border: 3px solid #ff6b81;
        }

        .turn-blue {
            border: 3px solid #54a0ff;
        }

        .turn-indicator .emoji {
            font-size: 1rem;
        }

        /* ── 棋盘区 ── */
        .game-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4px 16px;
            position: relative;
            overflow: hidden;
        }

        #game-svg {
            width: 100%;
            height: 100%;
            max-width: 380px;
            max-height: 480px;
            filter: drop-shadow(0 6px 18px rgba(0, 0, 0, 0.10));
        }

        /* ── 底部工具栏 ── */
        .bottom-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 8px 16px 16px;
            flex-shrink: 0;
        }

        .btn-tool {
            width: 62px;
            height: 62px;
            border: 0 none;
            font-size: 1.7rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.18s cubic-bezier(.34, 1.56, .64, 1), box-shadow 0.18s;
            background: transparent;
        }

        .btn-tool:active {
            transform: scale(0.88);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
        }

        .btn-tool.btn-end {
            background: var(--green-primary);
            display: none;
            width: auto;
            border-radius: 32px;
            padding: 0 24px;
            font-size: 1.1rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.05em;
            border-color: #26d065;
        }

        /* ── 棋盘元素 ── */
        .piece {
            cursor: grab;
            touch-action: none;
            transition: opacity 0.3s;
        }

        .drag-ghost {
            pointer-events: none;
            opacity: 0.72;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.35));
        }

        .node-slot-nearest {
            fill: #ffd93d !important;
            filter: url(#inner-shadow-deep);
        }

        .piece-selected {
            animation: piece-pulse 1.4s infinite ease-in-out;
            filter: url(#piece-shadow) brightness(1.2);
        }

        @keyframes piece-pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.45;
                transform: scale(1.08);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .node-slot {
            fill: #ffe8cc;
            filter: url(#inner-shadow-deep);
            cursor: pointer;
            transition: all 0.2s;
        }

        .node-slot-highlight {
            fill: #b8f5d0 !important;
            paint-order: stroke fill;
        }

        .line {
            stroke: #f4c38a;
            stroke-width: 5;
            stroke-linecap: round;
        }

        /* ── 设置面板 ── */
        #settings-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 300;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .settings-content {
            background: #fff9f0;
            padding: 30px;
            border-radius: 28px;
            width: 82%;
            max-width: 310px;
            box-shadow: 0 14px 35px rgba(0, 0, 0, 0.18);
            border: 3px solid #ffecd2;
        }

        .settings-title {
            font-size: 1.3rem;
            font-weight: 900;
            margin-bottom: 20px;
            color: #6c5ce7;
            text-align: center;
        }

        .setting-item {
            margin-bottom: 18px;
            text-align: left;
        }

        .setting-label {
            display: block;
            font-size: 0.95rem;
            font-weight: 700;
            color: #636e72;
            margin-bottom: 8px;
        }

        .setting-group {
            display: flex;
            gap: 8px;
        }

        .btn-toggle {
            flex: 1;
            padding: 10px 6px;
            border-radius: 14px;
            border: 2px solid #e2e8f0;
            background: #f1f5f9;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            color: #636e72;
        }

        .btn-toggle.active {
            background: #6c5ce7;
            color: white;
            border-color: #6c5ce7;
        }

        .btn-save {
            width: 100%;
            padding: 13px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.4);
        }

        /* ── 胜利弹窗 ── */
        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 200;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .modal-content {
            padding: 44px 40px;
            border-radius: 36px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            border-width: 4px;
            border-style: solid;
        }

        .modal-content h2 {
            font-size: 2rem;
            margin: 0 0 8px;
        }

        .modal-content .trophy {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 12px;
        }

        .modal-red {
            background: #fff0f0;
            color: var(--red-primary);
            border-color: #ffb3ba;
        }

        .modal-blue {
            background: #f0f7ff;
            color: var(--blue-primary);
            border-color: #a8d4ff;
        }

        .btn-play-again {
            margin-top: 16px;
            padding: 12px 32px;
            border-radius: 50px;
            border: none;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            background: #fdcb6e;
            color: #6c4a00;
            box-shadow: 0 5px 14px rgba(253, 203, 110, 0.5);
            transition: transform 0.15s;
        }

        .btn-play-again:active {
            transform: scale(0.92);
        }
    </style>
</head>

<body>
    <!-- 顶部回合栏 -->
    <div class="top-bar">
        <div id="turn-box" class="turn-indicator turn-red" onclick="toggleFirstPlayer()">
            <span class="emoji">🔴</span>
            <span id="turn-text">红方行动</span>
        </div>
    </div>
    <!-- 棋盘区 -->
    <div class="game-container">
        <svg id="game-svg" viewBox="0 0 400 500">
            <defs>
                <filter id="inner-shadow-deep" x="-50%" y="-50%" width="200%" height="200%">
                    <!-- 深色阴影（右下角） -->
                    <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"></feGaussianBlur>
                    <feOffset dx="4" dy="4" result="offsetBlur"></feOffset>
                    <feComposite operator="out" in="SourceGraphic" in2="offsetBlur" result="inverse"></feComposite>
                    <feFlood flood-color="#7a4a00" flood-opacity="0.75" result="color"></feFlood>
                    <feComposite operator="in" in="color" in2="inverse" result="shadow"></feComposite>
                    <!-- 高光（左上角） -->
                    <feOffset dx="-2" dy="-2" in="SourceAlpha" result="offsetHighlight"></feOffset>
                    <feGaussianBlur in="offsetHighlight" stdDeviation="1.5" result="blurHighlight"></feGaussianBlur>
                    <feComposite operator="out" in="SourceGraphic" in2="blurHighlight" result="inverseHighlight">
                    </feComposite>
                    <feFlood flood-color="#ffffff" flood-opacity="0.95" result="colorHighlight"></feFlood>
                    <feComposite operator="in" in="colorHighlight" in2="inverseHighlight" result="highlight">
                    </feComposite>
                    <feMerge>
                        <feMergeNode in="SourceGraphic"></feMergeNode>
                        <feMergeNode in="shadow"></feMergeNode>
                        <feMergeNode in="highlight"></feMergeNode>
                    </feMerge>
                </filter>
                <radialGradient id="grad-red" cx="35%" cy="35%" r="50%">
                    <stop offset="0%" stop-color="#ff8a8a"></stop>
                    <stop offset="70%" stop-color="#ef4444"></stop>
                    <stop offset="100%" stop-color="#991b1b"></stop>
                </radialGradient>
                <radialGradient id="grad-blue" cx="35%" cy="35%" r="50%">
                    <stop offset="0%" stop-color="#93c5fd"></stop>
                    <stop offset="70%" stop-color="#3b82f6"></stop>
                    <stop offset="100%" stop-color="#1e3a8a"></stop>
                </radialGradient>
                <filter id="piece-shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="2"></feGaussianBlur>
                    <feOffset dx="0" dy="3" result="offsetblur"></feOffset>
                    <feComponentTransfer>
                        <feFuncA type="linear" slope="0.4"></feFuncA>
                    </feComponentTransfer>
                    <feMerge>
                        <feMergeNode></feMergeNode>
                        <feMergeNode in="SourceGraphic"></feMergeNode>
                    </feMerge>
                </filter>
            </defs>
            <g id="board-lines"></g>
            <g id="board-nodes"></g>
            <g id="pieces-layer"></g>
        </svg>
    </div>
    <!-- 底部工具栏 -->
    <div class="bottom-bar">
        <button class="btn-tool btn-settings" onclick="toggleSettings()" title="游戏设置">⚙️</button>
        <button id="btn-end" class="btn-tool btn-end" onclick="endTurn()">✅ 结束回合</button>
        <button class="btn-tool btn-restart" onclick="initGame()" title="重新开始">🔄</button>
    </div>
    <div id="modal">
        <div class="modal-content">
            <span class="trophy" id="winner-trophy">🏆</span>
            <h2 id="winner-msg">红方获胜！</h2>
            <button class="btn-play-again" onclick="initGame()">🎮 再来一局</button>
        </div>
    </div>
    <div id="settings-panel">
        <div class="settings-content">
            <div class="settings-title">游戏设置</div>
            <div class="setting-item">
                <label class="setting-label">对战模式</label>
                <div class="setting-group">
                    <button id="mode-pvp" class="btn-toggle" onclick="setMode('pvp')">双人对战</button>
                    <button id="mode-pve" class="btn-toggle" onclick="setMode('pve')">与 AI 对战</button>
                </div>
            </div>
            <div class="setting-item">
                <label class="setting-label">AI 难度</label>
                <div class="setting-group">
                    <button id="diff-easy" class="btn-toggle" onclick="setDiff('easy')">简单</button>
                    <button id="diff-normal" class="btn-toggle" onclick="setDiff('normal')">普通</button>
                    <button id="diff-hard" class="btn-toggle" onclick="setDiff('hard')">困难</button>
                </div>
            </div>
            <button class="btn-save" onclick="saveSettings()">保存并重启</button>
        </div>
    </div>
