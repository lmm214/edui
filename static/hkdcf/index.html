<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短除法候课小工具</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #F4F3ED;
            user-select: none;
            -webkit-user-select: none;
        }

        #main-container {
            display: flex;
            height: 100%;
        }

        #left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #F4F3ED;
        }

        #gcd-display {
            width: 100%;
            padding: 20px 40px;
            border-bottom: 3px solid #E1E3DA;
            font-size: 40px;
            color: #4A634E;
            font-weight: bold;
            text-align: left;
            box-sizing: border-box;
            letter-spacing: 2px;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #short-division-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            overflow: hidden;
            width: 100%;
        }

        #division-content {
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform-origin: top center;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* Short Division Aesthetics */
        .sd-row {
            display: flex;
            color: #4A634E;
        }

        .sd-left {
            color: #FF8C00;
            font-size: 5rem;
            flex-shrink: 0;
            font-weight: 600;
        }

        .sd-right {
            display: flex;
            gap: 10rem;
            font-size: 5rem;
        }

        .sd-right.has-border {
            border-left: 5px solid #4A634E;
            border-bottom: 5px solid #4A634E;
            border-bottom-left-radius: 8px;
        }

        .sd-right.no-border {
            border-left: 5px solid transparent;
            border-bottom: 5px solid transparent;
        }

        .sd-num {
            min-width: 6rem;
            text-align: center;
        }

        /* Keypad */
        #keypad-container {
            width: 240px;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.05);
            padding: 30px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            border-left: 1px solid #E1E3DA;
        }

        .keys-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn-prime {
            height: 70px;
            border: 2px dashed #4A634E;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #4A634E;
            cursor: pointer;
            background: #F8F9F5;
            transition: all 0.2s;
        }

        .btn-prime:hover {
            background: #EBF3EC;
            border-style: solid;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        .btn-prime:active {
            transform: translateY(0);
            box-shadow: none;
        }

        .btn-done {
            height: 80px;
            background: #7DAA76;
            color: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #4A634E;
            transition: all 0.2s;
            letter-spacing: 2px;
            margin-bottom: 4rem;
        }

        .btn-done:hover {
            background: #6c9a66;
        }

        .btn-done:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #4A634E;
        }

        .btn-end {
            height: 60px;
            background: #4A634E;
            color: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: auto;
            transition: all 0.2s;
            letter-spacing: 2px;
        }

        .btn-end:hover {
            background: #3B523F;
        }

        /* Alert & Success Animations */
        .shake {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-4px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(6px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-10px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(10px, 0, 0);
            }
        }

        .check-mark-inline {
            font-size: 40px;
            text-shadow: 0 5px 15px rgba(125, 170, 118, 0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Modal custom alert */
        #custom-alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #custom-alert-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        #custom-alert-box {
            background: #ffffff;
            padding: 40px 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            max-width: 500px;
            width: 80%;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 4px solid #FF8C00;
        }

        #custom-alert-overlay.show #custom-alert-box {
            transform: scale(1);
        }

        #custom-alert-title {
            font-size: 32px;
            font-weight: bold;
            color: #FF8C00;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        #custom-alert-msg {
            font-size: 26px;
            color: #4A634E;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        #custom-alert-btn {
            background: #FF8C00;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            border-radius: 40px;
            cursor: pointer;
            letter-spacing: 2px;
            font-weight: bold;
            transition: background 0.2s;
        }

        #custom-alert-btn:hover {
            background: #E67E00;
        }

        /* History Modal */
        #history-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(244, 243, 237, 0.92);
            backdrop-filter: blur(10px);
            z-index: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #history-modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .history-content {
            background: #ffffff;
            padding: 20px;
            border-radius: 20px;
            width: 90%;
            max-width: 1200px;
            height: 85%;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.12);
            border: 4px solid #4A634E;
            display: flex;
            flex-direction: column;
        }

        .history-title {
            text-align: center;
            font-size: 24px;
            margin: 0 0 15px 0;
            color: #4A634E;
            letter-spacing: 2px;
        }

        .history-columns {
            display: flex;
            flex: 1;
            overflow: hidden;
            margin-bottom: 20px;
            border-top: 3px solid #E1E3DA;
            border-bottom: 3px solid #E1E3DA;
            padding: 15px 0;
            gap: 20px;
        }

        .history-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 3px dashed #E1E3DA;
        }

        .history-col:last-child {
            border-right: none;
        }

        .history-col-title {
            text-align: center;
            font-size: 26px;
            color: #111111;
            margin: 0 0 15px 0;
            letter-spacing: 2px;
        }

        .history-list {
            list-style: none;
            padding: 0 10px;
            margin: 0;
            overflow-y: auto;
            flex: 1;
        }

        .history-list::-webkit-scrollbar {
            width: 8px;
        }

        .history-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #A3AFA6;
            border-radius: 4px;
        }

        .history-list::-webkit-scrollbar-thumb:hover {
            background: #4A634E;
        }

        .history-item {
            font-size: 2.4rem;
            color: #4A634E;
            margin-bottom: 5px;
            padding: 5px 10px;
            display: flex;
            justify-content: center;
            text-align: center;
        }

        .highlight-prime {
            color: #FF8C00;
            font-weight: bold;
        }

        #list-other {
            font-size: 1.8rem;
        }

        .no-history {
            font-size: 24px;
            color: #A3AFA6;
            text-align: center;
            margin-top: 30px;
        }

        #close-history {
            padding: 15px 0;
            border: none;
            border-radius: 40px;
            background: #4A634E;
            color: white;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            letter-spacing: 6px;
        }

        #close-history:hover {
            background: #3B523F;
        }
    </style>
</head>

<body>

    <div id="main-container">
        <div id="left-panel">
            <div id="gcd-display"></div>
            <div id="short-division-container">
                <div id="division-content"></div>
            </div>
        </div>

        <div id="keypad-container">
            <div class="btn-done">已经互质</div>
            <div class="keys-grid">
                <div class="btn-prime">2</div>
                <div class="btn-prime">3</div>
                <div class="btn-prime">5</div>
                <div class="btn-prime">7</div>
                <div class="btn-prime">11</div>
                <div class="btn-prime">13</div>
                <div class="btn-prime">17</div>
                <div class="btn-prime">19</div>
            </div>
            <div class="btn-end" id="end-btn">结束汇总</div>
        </div>
    </div>

    <!-- Modals -->
    <div id="custom-alert-overlay">
        <div id="custom-alert-box">
            <div id="custom-alert-title">提示</div>
            <div id="custom-alert-msg"></div>
            <button id="custom-alert-btn"
                onclick="document.getElementById('custom-alert-overlay').classList.remove('show')">我知道了</button>
        </div>
    </div>

    <div id="history-modal">
        <div class="history-content">
            <div class="history-columns">
                <div class="history-col">
                    <h4 class="history-col-title">互质</h4>
                    <ul id="list-coprime" class="history-list"></ul>
                </div>
                <div class="history-col">
                    <h4 class="history-col-title">倍数</h4>
                    <ul id="list-multiple" class="history-list"></ul>
                </div>
                <div class="history-col">
                    <h4 class="history-col-title">其它</h4>
                    <ul id="list-other" class="history-list"></ul>
                </div>
            </div>
            <button id="close-history">关闭汇总</button>
        </div>
    </div>
