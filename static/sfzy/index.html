<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>四分之一的秘密</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #ffffff;
      font-family: sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #workspace-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    svg.workspace {
      width: 100%;
      height: 100%;
    }

    .clone-group {
      cursor: grab;
    }

    .clone-group.dragging {
      cursor: grabbing;
    }

    .clone-group g {
      transition: transform 0.2s ease-out;
    }

    @keyframes breatheFill {
      0% {
        fill-opacity: 0.2;
      }

      50% {
        fill-opacity: 0.5;
      }

      100% {
        fill-opacity: 0.1;
      }
    }

    .clone-path {
      fill: var(--shape-color, transparent);
      fill-opacity: 0;
      stroke: #000000;
      stroke-width: 2;
      stroke-linejoin: round;
      pointer-events: all;
      transition: fill-opacity 0.2s ease-out;
    }

    .clone-group.dragging .clone-path {
      animation: breatheFill 1.2s infinite ease-in-out;
    }

    .source-path {
      stroke: #000000;
      stroke-width: 2;
      stroke-linejoin: round;
      cursor: pointer;
    }

    * {
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
  </style>
</head>
