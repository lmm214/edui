<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>怎样通知最快</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5dc;
            overflow: hidden;
            touch-action: none;
        }
        .header {
            background-color: #5f9ea0;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
            z-index: 20;
        }
        #status-text {
            font-size: 28px;
            margin-top: 0;
            font-weight: bold;
            color: #f1c40f;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            background-color: rgba(0, 0, 0, 0.1);
            padding: 4px 12px;
            border-radius: 8px;
        }
        #app-svg {
            display: block;
            width: 100%;
            height: calc(100vh - 70px);
            background-color: #f5f5dc;
        }
        
        .node {
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .node.ready {
            transition: transform 0.5s ease;
        }
        
        .node .main-circle {
            transition: fill 0.5s ease, stroke 0.5s ease, r 0.5s ease;
            stroke-width: 2;
        }
        
        .node.student .main-circle {
            fill: #e0f7fa;
            stroke: #2c3e50;
        }
        
        .node.student text {
            fill: #2c3e50;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
        }
        
        .node.captain .main-circle {
            fill: #e74c3c;
            stroke: #c0392b;
        }
        
        .node.captain text {
            fill: white;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        
        .glow {
            fill: none;
            stroke: #f1c40f;
            stroke-width: 4;
            opacity: 0;
            transform-origin: 0 0;
            pointer-events: none;
            transition: r 0.5s ease;
        }
        
        .node.can-notify .glow {
            animation: pulse-svg 1.5s infinite;
        }
        
        @keyframes pulse-svg {
            0% { transform: scale(1); opacity: 0.7; }
            70% { transform: scale(1.4); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }

        .controls {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            z-index: 30;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        button {
            padding: 20px 15px;
            background-color: #5f9ea0;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 4px;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        
        button:focus {
            outline: none;
        }
        
        button:hover {
            background-color: #4a7a7c;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>怎样通知最快</div>
        <div id="status-text">初始化中...</div>
    </div>
    
    <svg id="app-svg">
        <g id="lines-layer"></g>
        <g id="nodes-layer"></g>
        <line id="drag-line" stroke-width="3" stroke-dasharray="5,5" style="display:none; pointer-events: none;"></line>
    </svg>
    
    <div class="controls">
        <button id="main-btn">开始通知</button>
    </div>
