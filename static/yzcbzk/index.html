<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>圆锥侧面展开</title>
    <script src="three.js"></script>
    <script src="ob.js"></script>
    <style>
        :root {
            --macaron-blue: #B3E5FC;
            --macaron-pink: #F8BBD0;
            --panel: rgba(255, 255, 255, 0.9);
        }
        body { margin: 0; overflow: hidden; font-family: 'PingFang SC', sans-serif; background: #fdfdfd; touch-action: none; }
        #container { width: 100vw; height: 100vh; }
        
        /* 右侧垂直滑块面板 */
        .controls {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--panel);
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: row;
            gap: 25px;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
        }
        
        .control-col { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
        }
        .control-col label { 
            font-weight: bold; 
            color: #555; 
            font-size: 14px; 
            writing-mode: horizontal-tb;
        }
        
        /* 纵向滑动条样式 */
        input[type=range] { 
            -webkit-appearance: slider-vertical;
            appearance: slider-vertical;
            width: 8px; 
            height: 180px; 
            border-radius: 4px; 
            background: #e0e0e0; 
            outline: none; 
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; 
            width: 24px; 
            height: 24px; 
            background: #FFAB91; 
            border-radius: 50%; 
            cursor: pointer; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.15); }

        .info {
            position: absolute;
            top: 25px;
            left: 20px;
            color: #999; 
            font-size: 12px; 
            pointer-events: none;
        }
        .hint { position: absolute; top: 25px; right: 20px; color: #999; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

<div id="container"></div>

<div class="info">圆锥侧面展开</div>

<div class="hint">单指旋转 | 双指缩放平移</div>

<div class="controls">
    <div class="control-col">
        <input type="range" id="unfoldSlider" min="0" max="1" step="0.001" value="0" orient="vertical">
        <label>展开</label>
    </div>
    <div class="control-col">
        <input type="range" id="radiusSlider" min="1" max="2.5" step="0.1" value="1.8" orient="vertical">
        <label>半径</label>
    </div>
</div>
