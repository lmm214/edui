<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <title>长方体的体积</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* 控制面板 */
        #control-panel {
            position: fixed;
            right: 0;
            top: 30%;
            width: clamp(200px, 20vw, 320px);
            border-radius: 12px 0 0 12px;
            padding: 12px 20px 12px 30px;
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
            z-index: 1000;
        }

        /* 场景容器 */
        #scene-container {
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        /* 主视图容器 */
        #main-view {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        /* 控制按钮组 */
        .control-group {
            margin: 0 0 10px;
            border-radius: 8px;
            width: 100%;
        }

        .quickcard {
            margin-top: 5px;
            display: grid;
            grid-template-rows: repeat(2, 1fr);
            gap: 3px;
            width: 100%;
        }

        /* 替换 wired-button 样式 */
        button, #add-color, #add-close, .quickcard input {
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #f5f5f5;
            transition: all 0.3s;
            text-align: center;
            user-select: none;
        }

        #add-color, #add-close {
            padding: 8px;
        }

        button:hover {
            background: #e0e0e0;
        }

        .quickcard button, .quickcard input {
            padding: 8px;
        }

        .quickcard input {
            width: 100%;
            text-align: center;
        }

        .quickcard {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .dimension-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .quickcard button {
            padding: 8px;
        }



        /* 滑块样式 */
        .slider-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .slider-label {
            font-size: 24px;
            font-weight: bold;
        }

        .dimension-slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .dimension-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4CAF50;
            cursor: pointer;
        }

        .dimension-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4CAF50;
            cursor: pointer;
            border: none;
        }

        .action-buttons {
            display: flex;
            flex-direction: row;
            gap: 8px;
        }

        .layer-button,.clear-button {
            flex: 1;
            padding: 8px;
            font-size: 24px;
        }
    </style>
</head>

<body>
    <!-- 控制区 -->
    <div id="control-panel" class="card">
        <div class="control-group">
            <div class="quickcard">
                <div class="dimension-controls">
                    <div class="slider-container">
                        <div class="slider-label">长: <span id="length-value" class="slider-value">1</span></div>
                        <input type="range" id="quick-length" class="dimension-slider" min="1" max="10" value="1">
                    </div>
                    <div class="slider-container">
                        <div class="slider-label">宽: <span id="width-value" class="slider-value">1</span></div>
                        <input type="range" id="quick-width" class="dimension-slider" min="1" max="10" value="1">
                    </div>
                    <div class="slider-container">
                        <div class="slider-label">高: <span id="height-value" class="slider-value">1</span></div>
                        <input type="range" id="quick-height" class="dimension-slider" min="1" max="10" value="1">
                    </div>
                </div>
                <div class="action-buttons">
                    <div id="layer-vertical" class="layer-button">分层</div>
                    <div id="clear-canvas" class="clear-button">清空</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 场景 -->
    <div id="scene-container" class="card">
        <div id="main-view"></div>
    </div>
</body>
