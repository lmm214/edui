<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>长方形、三角形、梯形、半圆旋转体</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #E8E7E0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100vw;
            height: 100vh;
            gap: 8px;
            background-color: #CDDCDC;
            background-image: radial-gradient(at 50% 100%, rgba(255, 255, 255, 0.50) 0%, rgba(0, 0, 0, 0.50) 100%), linear-gradient(to bottom, rgba(255, 255, 255, 0.25) 0%, rgba(0, 0, 0, 0.25) 100%);
            background-blend-mode: screen, overlay;
            padding: 8px;
        }

        .cell {
            background: #fff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            border-radius: 4px;
        }

        .cell-top {
            height: 4px;
            flex-shrink: 0;
            border-radius: 4px 4px 0 0;
        }

        .cell-header {
            flex-shrink: 0;
            padding: 0.42rem 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .cell-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .cell-label {
            font-size: 0.96rem;
            font-weight: 700;
            color: #374151;
        }

        .cell-sub {
            font-size: 0.75rem;
            color: #9CA3AF;
            margin-left: 0.2rem;
        }

        /* 视口 */
        .viewport {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .viewport canvas {
            display: block;
        }

        /* 标题栏内图标按钮 */
        .cell-icons {
            display: flex;
            gap: 0.3rem;
            margin-left: auto;
            flex-shrink: 0;
        }

        .icon-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1.5px solid rgba(0, 0, 0, 0.08);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F9FAFB;
            transition: transform 0.12s, background 0.12s;
            font-size: 13px;
            line-height: 1;
        }

        .icon-btn:hover:not(:disabled) {
            transform: scale(1.1);
            background: #F3F4F6;
        }

        .icon-btn:active:not(:disabled) {
            transform: scale(0.93);
        }

        .icon-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .icon-btn svg {
            width: 15px;
            height: 15px;
            display: block;
        }
    </style>
</head>
