<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>长方体的认识</title>
    <script src="three.js"></script>
    <script src="oc.js"></script>
    <script src="tween.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-image: radial-gradient(73% 147%, #EADFDF 59%, #ECE2DF 100%), radial-gradient(91% 146%, rgba(255, 255, 255, 0.50) 47%, rgba(0, 0, 0, 0.50) 100%);
            background-blend-mode: screen;
            overflow: hidden;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .ui>* {
            pointer-events: auto;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            right: 20px;
            display: flex;
            gap: 15px;
        }

        .top-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: none;
        }

        .quick-controls {
            position: fixed;
            top: 20px;
            right: 20px;
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            background: #fff;
        }

        .btn-primary {
            background: #007AFF;
            color: white;
        }

        .btn-primary:hover {
            background: #0056CC;
        }

        .btn:disabled {
            background: #ccc;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }

        .dimension-info {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            text-align: center;
        }

        .dimension-info h3 {
            font-size: 1.8rem;
            color: #0660c1;
            writing-mode: vertical-rl;
            letter-spacing: 0.8rem;
            margin-bottom: 15px;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.8);
        }

        .slider-panel {
            position: fixed;
            bottom: 30px;
            right: 20px;
            display: none;
            flex-direction: column;
            gap: 20px;
            background: #e6ebf1;
            padding: 15px 20px;
            border-radius: 12px;
            /* 内凹立体效果 */
            box-shadow: inset 4px 4px 10px rgba(160, 175, 195, 0.4), inset -4px -4px 10px rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .slider-group label {
            width: 30px;
            font-size: 18px;
            color: #333;
            font-weight: 500;
        }

        .slider-panel input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #e6ebf1;
            box-shadow: 2px 2px 5px rgba(160, 175, 195, 0.8), -2px -2px 5px rgba(255, 255, 255, 1);
            cursor: pointer;
        }

        .slider-panel input[type="range"]::-moz-range-thumb {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #e6ebf1;
            box-shadow: 2px 2px 5px rgba(160, 175, 195, 0.8), -2px -2px 5px rgba(255, 255, 255, 1);
            cursor: pointer;
            border: none;
        }

        .mode-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .mode-item {
            font-size: 1.1rem;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #555;
            border-radius: 50%;
            background: #e6ebf1;
            box-shadow: 4px 4px 10px rgba(160, 175, 195, 0.4), -4px -4px 10px rgba(255, 255, 255, 0.9);
            transition: all 0.2s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .mode-item:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 12px rgba(160, 175, 195, 0.5), -6px -6px 12px rgba(255, 255, 255, 1);
            color: #333;
        }

        .mode-item.active {
            background: #007AFF;
            color: white;
            font-weight: bold;
            box-shadow: inset 2px 2px 6px rgba(0, 0, 0, 0.3);
            transform: none;
        }

        #quickBtn {
            background: #ff9500;
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        #quickBtn:hover {
            background: #e68600;
        }

        #resetBtn {
            background: #e6ebf1;
            color: #333;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: inset 4px 4px 10px rgba(160, 175, 195, 0.4), inset -4px -4px 10px rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        #resetBtn:hover {
            background: #d9dfe8;
            box-shadow: inset 6px 6px 12px rgba(160, 175, 195, 0.6), inset -6px -6px 12px rgba(255, 255, 255, 1);
        }

        .draw-toolbar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #e6ebf1;
            padding: 15px 10px;
            border-radius: 12px;
            box-shadow: inset 4px 4px 10px rgba(160, 175, 195, 0.4), inset -4px -4px 10px rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 100;
        }

        .draw-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #e6ebf1;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 4px 4px 10px rgba(160, 175, 195, 0.4), -4px -4px 10px rgba(255, 255, 255, 0.9);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .draw-btn:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 12px rgba(160, 175, 195, 0.5), -6px -6px 12px rgba(255, 255, 255, 1);
        }

        .draw-btn.active {
            box-shadow: inset 2px 2px 6px rgba(160, 175, 195, 0.6), inset -2px -2px 6px rgba(255, 255, 255, 1);
            background: #d9dfe8;
            transform: none;
        }

        .color-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            margin-top: 5px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .color-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(160, 175, 195, 0.6), -2px -2px 5px rgba(255, 255, 255, 1);
            border: 2px solid transparent;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        .color-btn:hover {
            transform: scale(1.1);
        }

        .color-btn.active {
            border-color: #fff;
            box-shadow: 1px 1px 4px rgba(0, 0, 0, 0.4);
            transform: scale(1.3);
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        #drawCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            touch-action: none;
        }
    </style>
</head>

<body>
    <canvas id="drawCanvas"></canvas>
    <div id="canvas-container"></div>
    <div class="ui">
        <div class="draw-toolbar" id="drawToolbar">
            <button class="draw-btn" id="btnPen" title="画笔">✏️</button>
            <button class="draw-btn" id="btnEraser" title="橡皮擦 (再按清屏)">🧼</button>
            <div class="color-options" id="colorOptions">
                <div class="color-btn active" data-color="#ff3b30" style="background: #ff3b30;" title="红色"></div>
                <div class="color-btn" data-color="#000000" style="background: #000000;" title="黑色"></div>
                <div class="color-btn" data-color="#ff9500" style="background: #ff9500;" title="橙色"></div>
                <div class="color-btn" data-color="#34c759" style="background: #34c759;" title="绿色"></div>
            </div>
        </div>
        <div class="dimension-info">
            <h3 id="stageTitle"></h3>
            <div class="mode-panel" id="modePanel" style="display:none;">
                <div class="mode-item" data-mode="point">点</div>
                <div class="mode-item" data-mode="line">线</div>
                <div class="mode-item" data-mode="face">面</div>
                <div class="mode-item active" data-mode="volume">体</div>
            </div>
        </div>

        <div class="controls" id="startGroup">
            <button class="btn btn-primary" id="startBtn">开始</button>
        </div>

        <div class="top-controls" id="resetGroup">
            <button class="btn" id="resetBtn">重置</button>
        </div>

        <div class="quick-controls" id="quickGroup">
            <button class="btn" id="quickBtn">长方体</button>
        </div>

        <div class="slider-panel" id="sliderPanel">
            <div class="slider-group">
                <label>长</label>
                <input type="range" id="lR" min="1" max="500" step="20" value="300">
            </div>
            <div class="slider-group">
                <label>宽</label>
                <input type="range" id="wR" min="1" max="500" step="20" value="160">
            </div>
            <div class="slider-group">
                <label>高</label>
                <input type="range" id="hR" min="1" max="500" step="20" value="140">
            </div>
        </div>
    </div>
