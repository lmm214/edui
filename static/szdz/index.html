<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>绳子对折、对折再对折</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #1a1a2a;
      color: #eee;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #ui {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    button {
      width: 60px;
      height: 60px;
      border-radius: 30px;
      border: none;
      color: white;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    button:hover:not(:disabled) {
      transform: scale(1.1);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
    }

    button:active:not(:disabled) {
      transform: scale(0.95);
    }

    button:disabled {
      background: #3a3a4a !important;
      color: #777;
      cursor: not-allowed;
      box-shadow: none;
    }

    #btn-next {
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
    }

    #btn-prev {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      margin-top: 20px;
    }

    #status-text {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffffff;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
      pointer-events: none;
      z-index: 100;
      font-family: sans-serif;
      display: none;
    }
  </style>
  <script src="three.js"></script>
  <script src="oc.js"></script>
</head>

<body>
  <div id="status-text"></div>
  <div id="ui">
    <button id="btn-next" title="剪（继续对折）">剪</button>
    <button id="btn-prev" disabled title="接（展开接回）">接</button>
  </div>
