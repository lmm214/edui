<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>绳子对折、对折再对折</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #1a1a2a;
      color: #eee;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #ui {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    button {
      width: 60px;
      height: 60px;
      border-radius: 30px;
      border: none;
      color: white;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    button:hover:not(:disabled) {
      transform: scale(1.1);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
    }

    button:active:not(:disabled) {
      transform: scale(0.95);
    }

    button:disabled {
      background: #3a3a4a !important;
      color: #777;
      cursor: not-allowed;
      box-shadow: none;
    }

    #btn-next {
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
    }

    #btn-prev {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      margin-top: 20px;
    }

    #status-text {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffffff;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
      pointer-events: none;
      z-index: 100;
      font-family: sans-serif;
      display: none;
    }
  </style>
  <script src="three.js"></script>
  <script src="oc.js"></script>
</head>

<body>
  <div id="status-text"></div>
  <div id="ui">
    <button id="btn-next" title="剪（继续对折）">剪</button>
    <button id="btn-prev" disabled title="接（展开接回）">接</button>
  </div>
  <script>
        const whiteList = ["edui123.com", "edui.fun"];if (!whiteList.includes(window.location.hostname)) {window.location.href = "https://edui123.com";}
    // ==========================================
    // 1. 初始化 Three.js 场景设置
    // ==========================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#141420');
    scene.fog = new THREE.FogExp2('#141420', 0.02);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    // 视角接近俯视：抬高 Y，稍微偏移 Z 以保留三维立体感
    camera.position.set(0, 25, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    // 焦点对准地面中心并稍向折叠方向（Z轴正向）偏移
    controls.target.set(0, 0, 1.5);
    controls.enableRotate = false; // 禁止旋转
    // 将左键和单指拖动改为平移 (Pan)
    controls.mouseButtons = {
      LEFT: THREE.MOUSE.PAN,
      MIDDLE: THREE.MOUSE.DOLLY,
      RIGHT: THREE.MOUSE.PAN
    };
    controls.touches = {
      ONE: THREE.TOUCH.PAN,
      TWO: THREE.TOUCH.DOLLY_PAN
    };

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(15, 25, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    dirLight.shadow.bias = -0.0005;
    scene.add(dirLight);

    const spotLight = new THREE.SpotLight(0x4facfe, 1.5, 100, Math.PI / 4, 0.5, 2);
    spotLight.position.set(-10, 15, -10);
    scene.add(spotLight);

    const floorGeo = new THREE.PlaneGeometry(200, 200);
    const floorMat = new THREE.MeshStandardMaterial({
      color: '#1a1a25',
      roughness: 0.9,
      metalness: 0.1
    });
    const floorMesh = new THREE.Mesh(floorGeo, floorMat);
    floorMesh.rotation.x = -Math.PI / 2;
    floorMesh.receiveShadow = true;
    scene.add(floorMesh);

    const gridHelper = new THREE.GridHelper(60, 60, '#333344', '#1f1f2e');
    gridHelper.position.y = 0.02;
    scene.add(gridHelper);

    // ==========================================
    // 2. 自研 Verlet 绳索物理引擎
    // ==========================================
    const numSegments = 80;
    const distance = 0.22;
    const radius = 0.1;
    const particles = [];

    // 用于记录物理连接是否被“截断”
    const isBroken = new Array(numSegments).fill(false);

    class Particle {
      constructor(x, y, z) {
        this.position = new THREE.Vector3(x, y, z);
        this.oldPosition = new THREE.Vector3(x, y, z);
        this.isPinned = false;
      }
    }

    for (let i = 0; i < numSegments; i++) {
      // 每个圆柱体拥有独立的左右端点粒子，共 160 个粒子
      particles.push(new Particle((i - numSegments / 2) * distance, radius, 0));
      particles.push(new Particle((i + 1 - numSegments / 2) * distance, radius, 0));
    }

    const gravity = new THREE.Vector3(0, -9.81 * 0.0025, 0);
    const velocity = new THREE.Vector3();
    const delta = new THREE.Vector3();

    function simulateVerlet() {
      for (let p of particles) {
        if (p.isPinned) {
          p.oldPosition.copy(p.position);
          continue;
        }

        velocity.subVectors(p.position, p.oldPosition);
        velocity.multiplyScalar(0.98);

        p.oldPosition.copy(p.position);
        p.position.add(velocity).add(gravity);

        if (p.position.y < radius) {
          p.position.y = radius;
          p.position.x = p.oldPosition.x + velocity.x * 0.98;
          p.position.z = p.oldPosition.z + velocity.z * 0.98;
        }
      }

      const iterations = 100;
      for (let iter = 0; iter < iterations; iter++) {
        for (let i = 0; i < numSegments; i++) {
          // 内部圆柱体的定长约束
          const p1 = particles[i * 2];
          const p2 = particles[i * 2 + 1];

          delta.subVectors(p2.position, p1.position);
          const dist = delta.length();
          if (dist > 0) {
            const diff = (dist - distance) / dist;
            delta.multiplyScalar(diff * 0.5);
            if (!p1.isPinned) p1.position.add(delta);
            if (!p2.isPinned) p2.position.sub(delta);
          }

          // 与下一个圆柱体的连接约束
          if (i < numSegments - 1 && !isBroken[i]) {
            const pTail = particles[i * 2 + 1];
            const pHead = particles[(i + 1) * 2];
            const cx = (pTail.position.x + pHead.position.x) / 2;
            const cy = (pTail.position.y + pHead.position.y) / 2;
            const cz = (pTail.position.z + pHead.position.z) / 2;
            if (!pTail.isPinned) pTail.position.set(cx, cy, cz);
            if (!pHead.isPinned) pHead.position.set(cx, cy, cz);
          }
        }
      }
    }

    // ==========================================
    // 3. 构建视觉模型与独立着色 (Per-Instance Color)
    // ==========================================
    // 材质基础色必须为白色，否则会与实例颜色(Vertex Color)混合导致变暗
    const ropeMat = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      roughness: 0.6,
      metalness: 0.1
    });

    const cylinderGeo = new THREE.CylinderGeometry(radius, radius, distance, 16);
    cylinderGeo.rotateX(Math.PI / 2);
    const instancedMesh = new THREE.InstancedMesh(cylinderGeo, ropeMat, numSegments);
    instancedMesh.castShadow = true;
    instancedMesh.receiveShadow = true;
    scene.add(instancedMesh);

    // 初始化颜色为红色
    const defaultColor = new THREE.Color('#ff6b6b');
    for (let i = 0; i < numSegments; i++) instancedMesh.setColorAt(i, defaultColor);
    instancedMesh.instanceColor.needsUpdate = true;

    const dummy = new THREE.Object3D();

    function updateMeshes() {
      for (let i = 0; i < numSegments; i++) {
        const p1 = particles[i * 2];
        const p2 = particles[i * 2 + 1];

        dummy.position.set(
          (p1.position.x + p2.position.x) / 2,
          (p1.position.y + p2.position.y) / 2,
          (p1.position.z + p2.position.z) / 2
        );
        dummy.lookAt(p2.position.x, p2.position.y, p2.position.z);

        dummy.scale.set(1, 1, 1);
        dummy.updateMatrix();
        instancedMesh.setMatrixAt(i, dummy.matrix);
      }
      instancedMesh.instanceMatrix.needsUpdate = true;
    }

    // ==========================================
    // 4. 折叠与截断逻辑
    // ==========================================
    const zSpread = 0.32; // 增大间距，绳子半径是 0.1(直径0.2)，0.32 保证了绳子之间有 0.12 的明显空隙
    const stateCoords = [];
    for (let s = 0; s <= 3; s++) {
      stateCoords.push(new Array(numSegments * 2));
    }

    // State 0: 展开状态，共 160 个粒子端点
    for (let i = 0; i < numSegments; i++) {
      stateCoords[0][i * 2] = new THREE.Vector3((i - numSegments / 2) * distance, radius, 0);
      stateCoords[0][i * 2 + 1] = new THREE.Vector3((i + 1 - numSegments / 2) * distance, radius, 0);
    }

    // 辅助折叠函数，处理整段绳子的镜像
    function computeFold(stateIdx, foldX, conditionFn, zOffset) {
      const prevCoords = stateCoords[stateIdx - 1];
      const currCoords = stateCoords[stateIdx];
      for (let i = 0; i < numSegments; i++) {
        let p1 = prevCoords[i * 2];
        let p2 = prevCoords[i * 2 + 1];
        let center = (p1.x + p2.x) / 2; // 圆柱体中点

        if (conditionFn(center, i)) {
          // 整根圆柱体的两个端点一起翻转！
          currCoords[i * 2] = new THREE.Vector3(foldX * 2 - p1.x, radius, p1.z + zOffset);
          currCoords[i * 2 + 1] = new THREE.Vector3(foldX * 2 - p2.x, radius, p2.z + zOffset);
        } else {
          currCoords[i * 2] = p1.clone();
          currCoords[i * 2 + 1] = p2.clone();
        }
      }
    }

    // State 1: Fold at X=0
    computeFold(1, 0, (cx, i) => i <= 39, zSpread);

    // State 2: Fold at X=4.4
    const fold2X = 4.4;
    computeFold(2, fold2X, (cx, i) => (i >= 0 && i <= 19) || (i >= 60 && i <= 79), zSpread * 2);

    // State 3: Fold at X=2.2
    const fold3X = 2.2;
    computeFold(3, fold3X, (cx, i) => (i >= 0 && i <= 9) || (i >= 30 && i <= 39) || (i >= 40 && i <= 49) || (i >= 70 && i <= 79), zSpread * 4);

    const activeTargets = new Map();
    let currentState = 0;
    let animationDone = false;

    function setFoldState(newState) {
      if (newState === currentState) return;
      const isBackward = newState < currentState;
      const startState = currentState;

      activeTargets.clear();
      for (let p of particles) p.isPinned = false;

      const btnNext = document.getElementById('btn-next');
      const btnPrev = document.getElementById('btn-prev');

      btnNext.disabled = (newState >= 3);
      btnPrev.disabled = (newState <= 0);

      const statusText = document.getElementById('status-text');
      if (newState === 0) {
        statusText.style.display = 'none';
      } else {
        statusText.style.display = 'block';
        statusText.innerText = `第 ${newState} 次`;
      }

      animationDone = false;
      window.isBackwardAnim = isBackward;
      window.animTargetState = newState;

      // 如果是向前折叠，先执行物理截断和变色
      if (!isBackward) {
        performCut(newState);
      }
      // 如果是后退（接回），保持当前断开状态飞回，落地后再接上！

      const prevCoords = stateCoords[startState];
      const nextCoords = stateCoords[newState];

      for (let i = 0; i < numSegments * 2; i++) {
        if (prevCoords[i].distanceTo(nextCoords[i]) > 0.01) {
          activeTargets.set(i, {
            startPos: particles[i].position.clone(),
            finalTarget: nextCoords[i].clone(),
            progress: 0
          });
          particles[i].isPinned = true;
        }
      }
      currentState = newState;
    }

    function applyFoldLogic() {
      const speed = 0.012;
      let allDone = activeTargets.size > 0;

      for (let [idx, data] of activeTargets.entries()) {
        const p = particles[idx];

        if (data.progress < 1) {
          data.progress = Math.min(1, data.progress + speed);
          allDone = false;
        }
        const t = data.progress;
        const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

        const mx = (data.startPos.x + data.finalTarget.x) / 2;
        const rx = data.startPos.x - mx;

        // 直线立体翻转：Z轴平滑过渡，Y轴在空中画半圆（类似翻书），不绕远路
        const targetX = mx + rx * Math.cos(Math.PI * ease);
        const targetY = radius + Math.abs(rx) * Math.sin(Math.PI * ease);
        const targetZ = data.startPos.z + (data.finalTarget.z - data.startPos.z) * ease;

        p.position.set(targetX, targetY, targetZ);
      }

      if (allDone && !animationDone && activeTargets.size > 0) {
        animationDone = true;
        for (let idx of activeTargets.keys()) {
          particles[idx].isPinned = false;
        }

        // 如果是后退回点（即接回绳子），在落地之后恢复物理约束和重置颜色
        if (window.isBackwardAnim) {
          performCut(window.animTargetState);
        }
      }
    }

    // ==========================================
    // 5. 截断功能 (Cut)
    // ==========================================
    function performCut(targetState) {
      targetState = targetState ?? currentState;

      // 1. 重置所有连接和颜色，这是为了回退时能接上
      for (let i = 0; i < numSegments; i++) {
        isBroken[i] = false;
        instancedMesh.setColorAt(i, defaultColor);
      }

      if (targetState === 0) {
        instancedMesh.instanceColor.needsUpdate = true;
        return;
      }

      let cutIndices = [];

      // 级联应用颜色和截断状态
      // 只有当前新被折叠（移动）的段会被赋予新颜色，原地不动的段保留其之前的颜色
      if (targetState >= 1) {
        cutIndices.push(39);
        updateSegmentsColor([[0, 39]], '#4facfe'); // 变蓝色
      }
      if (targetState >= 2) {
        cutIndices.push(19, 59);
        updateSegmentsColor([[0, 19], [60, 79]], '#43e97b'); // 变绿色
      }
      if (targetState >= 3) {
        cutIndices.push(9, 29, 49, 69);
        updateSegmentsColor([[0, 9], [30, 39], [40, 49], [70, 79]], '#f9d423'); // 变黄色
      }

      // 2. 物理层断开约束
      for (let idx of cutIndices) {
        if (idx >= 0 && idx < numSegments) {
          isBroken[idx] = true;
        }
      }

      // 3. 刷新渲染管线的颜色
      instancedMesh.instanceColor.needsUpdate = true;
    }

    // 辅助函数：根据粒子的范围给圆柱体上色
    function updateSegmentsColor(ranges, colorHex) {
      const color = new THREE.Color(colorHex);
      for (let range of ranges) {
        const start = range[0];
        const end = range[1];

        for (let i = start; i <= end; i++) {
          instancedMesh.setColorAt(i, color);
        }
      }
    }

    // 事件绑定
    document.getElementById('btn-next').addEventListener('click', () => {
      if (currentState < 3) setFoldState(currentState + 1);
    });
    document.getElementById('btn-prev').addEventListener('click', () => {
      if (currentState > 0) setFoldState(currentState - 1);
    });

    window.addEventListener('resize', onWindowResize, false);

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // ==========================================
    // 6. 渲染循环
    // ==========================================
    function animate() {
      requestAnimationFrame(animate);

      applyFoldLogic();
      simulateVerlet();
      updateMeshes();

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>

</html>
