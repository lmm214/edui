<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神奇的刻度尺</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F4F3EC;
            color: #333;
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        .ruler-wrapper {
            width: 95%;
            max-width: 1200px;
            /* 继续增高，给顶部留出巨大的防重叠堆叠空间 */
            margin-top: 15vh;
            height: 321px;
            position: relative;
        }

        /* 尺子本体背景：仅占据下方120px，顶部留出足足180px空白区域 */
        .ruler-body {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 140px;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            pointer-events: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: grab;
            z-index: 10;
        }

        canvas:active {
            cursor: grabbing;
        }

        .bottom-controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 100;
        }

        .instruction {
            font-size: 1.1rem;
            color: #e67e22;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
            margin-right: 10px;
        }

        button {
            background: #fff;
            border: 1px solid #ccc;
            padding: 10px 24px;
            border-radius: 6px;
            color: #333;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        button:hover {
            background: #f8f9fa;
            border-color: #999;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div class="ruler-wrapper" id="ruler-wrapper">
        <div class="ruler-body"></div>
        <canvas id="ruler-canvas"></canvas>
    </div>

    <div class="bottom-controls">
        <div id="instruction" class="instruction">提示文字</div>
        <button id="btn-ten" onclick="divideTen()">十等分</button>
        <button id="btn-subdivide" onclick="startSubdivide()">指定区间</button>
        <button id="btn-reset" onclick="resetRuler()">重置</button>
    </div>
