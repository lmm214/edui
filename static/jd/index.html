<html lang="zh-CN">

<head>

    <title>简单时钟</title>
    <style>
        @import url('https://fonts.googleapis.cn/css2?family=Share+Tech+Mono&display=swap');

        body {
            margin: 0;
            min-height: 100vh;
            background-color: #bfccd2;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            padding-top: 20px;
            text-align: center;
        }

        .clock {
            width: min(60vh, 60vh);
            height: min(60vh, 60vh);
            border-radius: 50%;
            background-image: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            border: calc(60vh * 0.013) solid #504e4d;
            position: relative;
            margin: calc(60vh * 0.08) auto calc(60vh * 0.1);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.15),
                inset 0 0 50px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .tick {
            position: absolute;
            width: calc(60vh * 0.007);
            height: calc(60vh * 0.033);
            background: #888;
            left: 50%;
            transform-origin: 50% calc(30vh);
        }

        .tick-hour {
            width: calc(60vh * 0.01);
            height: calc(60vh * 0.05);
            background-color: #666;
        }

        .hour,
        .minute {
            position: absolute;
            left: 50%;
            bottom: 50%;
            transform-origin: bottom;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        .hour {
            width: calc(60vh * 0.03);
            height: calc(60vh * 0.26);
            background: linear-gradient(to right, #485563, #29323c);
            left: calc(50% - 60vh * 0.017);
            clip-path: polygon(50% 0%,
                    100% 15%,
                    100% 100%,
                    0% 100%,
                    0% 15%);
            box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.3),
                inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .second {
            position: absolute;
            width: calc(60vh * 0.015);
            height: calc(60vh * 0.45);
            background: linear-gradient(to right, #ff4d4d, #cc0000);
            left: calc(50% - 60vh * 0.0075);
            bottom: 50%;
            transform-origin: bottom;
            clip-path: polygon(50% 0%,
                    100% 15%,
                    100% 100%,
                    0% 100%,
                    0% 15%);
            box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.3),
                inset 0 0 10px rgba(0, 0, 0, 0.5);
            z-index: 11;
        }

        .minute {
            width: calc(60vh * 0.025);
            height: calc(60vh * 0.36);
            background: linear-gradient(to right, #6aace6, #1488db);
            left: calc(50% - 60vh * 0.01);
            clip-path: polygon(50% 0%,
                    100% 15%,
                    100% 100%,
                    0% 100%,
                    0% 15%);
            box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.3),
                inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .center {
            position: absolute;
            width: calc(60vh * 0.05);
            height: calc(60vh * 0.05);
            background: radial-gradient(circle at center, #666, #4a4a4a);
            border: 2px solid #333;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 11;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3),
                inset 0 0 5px rgba(255, 255, 255, 0.2);
        }

        .numbers {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .number {
            position: absolute;
            width: calc(60vh * 0.1);
            height: calc(60vh * 0.1);
            text-align: center;
            line-height: calc(60vh * 0.1);
            font-size: calc(60vh * 0.08);
            color: #555;
            transform-origin: center;
        }

        .digital-time {
            font-size: 5rem;
            min-height: 60px;
            line-height: 1;
            margin-top: 20px;
            color: #333;
            font-family: 'Share Tech Mono', monospace;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.2),
                2px 2px 2px rgba(0, 0, 0, 0.1),
                3px 3px 3px rgba(0, 0, 0, 0.1),
                4px 4px 4px rgba(0, 0, 0, 0.1),
                5px 5px 5px rgba(0, 0, 0, 0.1);
        }

        @keyframes breathe {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        .blink-colon {
            animation: breathe 1s infinite ease-in-out;
        }

        .n1 {
            top: 10%;
            right: 25%;
        }

        .n2 {
            top: 25%;
            right: 10%;
        }

        .n3 {
            top: 46%;
            right: 5%;
        }

        .n4 {
            bottom: 25%;
            right: 10%;
        }

        .n5 {
            bottom: 10%;
            right: 25%;
        }

        .n6 {
            bottom: 5%;
            left: 46%;
        }

        .n7 {
            bottom: 10%;
            left: 25%;
        }

        .n8 {
            bottom: 25%;
            left: 10%;
        }

        .n9 {
            top: 46%;
            left: 5%;
        }

        .n10 {
            top: 25%;
            left: 10%;
        }

        .n11 {
            top: 10%;
            left: 25%;
        }

        .n12 {
            top: 5%;
            left: 46%;
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            cursor: pointer;
            color: #555;
            z-index: 100;
            transition: color 0.3s, transform 0.2s;
            width: 48px;
            height: 48px;
        }

        .fullscreen-btn:hover {
            color: #111;
            transform: scale(1.1);
        }

        .fullscreen-btn svg {
            width: 100%;
            height: 100%;
        }

        .conslog {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: #555;
            z-index: 100;
            background: rgba(255, 255, 255, 0.5);
            padding: 5px 10px;
            border-radius: 4px;
            pointer-events: none;
            max-width: 80%;
            word-wrap: break-word;
        }
    </style>
</head>

<body>
    <div class="fullscreen-btn" id="fullscreenBtn" title="全屏/退出全屏">
        <svg id="fullscreen-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
        </svg>
        <svg id="exit-fullscreen-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
            stroke-linecap="round" stroke-linejoin="round" style="display: none;">
            <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3" />
        </svg>
    </div>
    <div class="conslog" id="conslog"></div>
    <div class="container">
        <div class="digital-time"></div>
        <div class="clock">
            <div class="hour"></div>
            <div class="minute"></div>
            <div class="second"></div>
            <div class="center"></div>
            <div class="numbers">
                <span class="number n1">1</span>
                <span class="number n2">2</span>
                <span class="number n3">3</span>
                <span class="number n4">4</span>
                <span class="number n5">5</span>
                <span class="number n6">6</span>
                <span class="number n7">7</span>
                <span class="number n8">8</span>
                <span class="number n9">9</span>
                <span class="number n10">10</span>
                <span class="number n11">11</span>
                <span class="number n12">12</span>
            </div>
            <div id="ticks"></div>
        </div>
    </div>
    <script>
        // 生成表盘刻度
        const ticksContainer = document.getElementById('ticks');
        for (let i = 0; i < 60; i++) {
            const tick = document.createElement('div');
            tick.className = i % 5 === 0 ? 'tick tick-hour' : 'tick';
            tick.style.transform = `rotate(${i * 6}deg)`;
            ticksContainer.appendChild(tick);
        }

        const hourHand = document.querySelector('.hour');
        const minuteHand = document.querySelector('.minute');
        const secondHand = document.querySelector('.second');
        const digitalTime = document.querySelector('.digital-time');
        const conslog = document.getElementById('conslog');

        function appendLog(msg) {
            if (!conslog) return;
            // 改为替换内容而不是无限制追加，保持界面简洁
            conslog.innerHTML = `<div>${msg}</div>`;
        }

        let timeOffset = 0;

        // 在线时间校准
        async function calibrateTime() {
            const apis = [
                {
                    name: '京东API(Header)',
                    url: 'https://api.m.jd.com',
                    extract: async (response) => {
                        const reqId = response.headers.get('x-api-request-id');
                        if (reqId && reqId.length >= 13) {
                            return parseInt(reqId.slice(-13), 10);
                        }
                        return null;
                    }
                }
            ];

            for (const api of apis) {
                try {
                    const startTime = Date.now();
                    // 添加时间戳防止缓存
                    const url = api.url + (api.url.includes('?') ? '&' : '?') + '_t=' + startTime;
                    const response = await fetch(url, { cache: 'no-store' });

                    if (!response.ok && api.name !== '京东API(Header)') {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const endTime = Date.now();
                    const latency = (endTime - startTime) / 2;

                    const remoteTime = await api.extract(response);
                    if (remoteTime && !isNaN(remoteTime)) {
                        timeOffset = (remoteTime + latency) - endTime;
                        // 控制台依然输出详细信息供调试
                        console.log(`时间校准成功 (${api.name})，偏差值 (ms):`, timeOffset);
                        // UI 仅展示精简后的成功信息
                        appendLog(`✅ 时间校准成功`);
                        return; // 成功即返回
                    } else {
                        throw new Error("格式解析错误");
                    }
                } catch (error) {
                    console.warn(`${api.name} 校准失败:`, error.message || error);
                }
            }

            console.error('所有接口时间校准均失败，将使用本地时间。');
            appendLog('❌ 时间校准失败');
        }

        // 初始校准，并每10分钟重新校准一次
        calibrateTime();
        setInterval(calibrateTime, 600000);

        function updateClock() {
            // 使用加上偏差值后的时间
            const now = new Date(Date.now() + timeOffset);
            // 自动获取北京时间 (UTC+8)
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const bjTime = new Date(utc + (3600000 * 8));

            const hours = bjTime.getHours();
            const minutes = bjTime.getMinutes();
            const seconds = bjTime.getSeconds();
            const milliseconds = bjTime.getMilliseconds();

            // 计算指针角度（秒针连续旋转）
            const secondAngle = (seconds + milliseconds / 1000) * 6;
            const minuteAngle = (minutes + seconds / 60) * 6;
            const hourAngle = (hours % 12 + minutes / 60) * 30;

            secondHand.style.transform = `rotate(${secondAngle}deg)`;
            minuteHand.style.transform = `rotate(${minuteAngle}deg)`;
            hourHand.style.transform = `rotate(${hourAngle}deg)`;

            // 更新顶部数字时间格式 (HH:MM)
            const displayHours = hours.toString().padStart(2, '0');
            const displayMinutes = minutes.toString().padStart(2, '0');

            digitalTime.innerHTML = `${displayHours}<span class="blink-colon">:</span>${displayMinutes}`;

            requestAnimationFrame(updateClock);
        }

        // 初始化和动画循环
        requestAnimationFrame(updateClock);

        // 全屏切换逻辑
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const enterIcon = document.getElementById('fullscreen-icon');
        const exitIcon = document.getElementById('exit-fullscreen-icon');

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`尝试进入全屏时出错: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                enterIcon.style.display = 'none';
                exitIcon.style.display = 'block';
            } else {
                enterIcon.style.display = 'block';
                exitIcon.style.display = 'none';
            }
        });
    </script>
</body>

</html>
