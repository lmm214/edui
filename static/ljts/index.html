<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>垃圾总量自动推算笔记本</title>
    <style>
        :root {
            --primary: #FF5600;
            --bg: #F4F3EC;
            --text: #0C0302;
            --secondary: #74706E;
            --accent: #FF8941;
            --box-bg: #FEFCF6;
            --border: #A09D94;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(#d5d2c8 1px, transparent 1px);
            background-size: 20px 20px;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        h1 {
            font-size: 2rem;
            margin: 0;
            font-weight: bold;
            color: rgba(0, 0, 0, 0.1);
            letter-spacing: 2px;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            padding: 0rem;
            z-index: 10;
        }

        .notebook-wrapper {
            z-index: 100;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .notebook {
            width: 90%;
            max-width: 880px;
            background: #fff;
            border: 1px solid #e0e0e0;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            position: relative;
            padding: 30px 60px;
            /* Notebook horizontal lines */
            background-image: repeating-linear-gradient(transparent, transparent 59px, #d1d1d1 59px, #d1d1d1 60px);
            background-size: 100% 60px;
            background-position: 0 30px;
            background-attachment: local;
            min-height: 500px;
            max-height: 75vh;
            overflow-y: auto;
            font-size: 24px;
            line-height: 60px;
            border-radius: 4px;
        }

        .notebook::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 40px;
            width: 2px;
            background-color: #ff9999;
            z-index: 5;
        }

        .row {
            height: 60px;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .row-label {
            margin-right: 10px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            white-space: nowrap;
        }

        .tag-who {
            color: #007AFF;
            font-size: 2rem;
            padding: 2px 6px;
            background: rgba(0, 122, 255, 0.1);
            border-radius: 4px;
            margin-right: 8px;
        }

        .tag-time {
            color: #34C759;
            font-size: 2rem;
            padding: 2px 6px;
            background: rgba(52, 199, 89, 0.1);
            border-radius: 4px;
        }

        .input-box {
            display: block;
            flex: 1;
            min-width: 0;
            height: 50px;
            line-height: 50px;
            cursor: pointer;
            color: var(--primary);
            font-family: "Times New Roman", Times, serif;
            font-size: 3rem;
            padding: 0 10px;
            transition: background 0.2s;
            white-space: nowrap;
            overflow-x: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
            -webkit-tap-highlight-color: transparent;
        }

        .input-box::-webkit-scrollbar {
            display: none;
        }

        .input-box:hover {
            background: rgba(255, 86, 0, 0.05);
        }

        .input-box:empty::before {
            content: "点击输入...";
            color: #ddd;
            font-size: 2rem;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* Toolbar styles */
        .toolbar {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 6000;
            background: white;
            padding: 0px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .toolbar button {
            background: none;
            border: 2px solid transparent;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toolbar button:hover {
            background: var(--bg);
        }

        .toolbar button.active {
            border-color: var(--primary);
            background: #fff7ed;
        }

        #draw-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5000;
        }

        #draw-canvas.drawing-active {
            pointer-events: auto;
        }

        /* Calculator Styles */
        .calculator {
            position: absolute;
            background: var(--box-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(4, 50px);
            gap: 8px;
            z-index: 6000;
        }

        .calculator.hidden {
            display: none !important;
        }

        .calculator button {
            height: 50px;
            font-size: 22px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            transition: all 0.1s;
        }

        .calculator button:active {
            background: #e0e0e0;
            transform: scale(0.95);
        }

        .calculator button.btn-wide {
            grid-column: span 3;
            background: var(--primary);
            color: #fff;
            border: none;
            font-weight: bold;
        }

        .calculator button.btn-wide:active {
            background: var(--accent);
        }

        .calculator button.btn-op {
            background: #f5f5f5;
            color: var(--primary);
            font-weight: bold;
            font-size: 26px;
        }

        #btn-next {
            position: absolute;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 56px;
            height: 56px;
            font-size: 38px;
            border-radius: 50%;
            border: none;
            background-color: var(--primary);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 86, 0, 0.3);
            transition: all 0.2s;
            z-index: 6000;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        #btn-next:hover {
            background-color: var(--accent);
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 6px 15px rgba(255, 86, 0, 0.4);
        }

        #btn-next:active {
            transform: translateY(-50%) scale(0.95);
            box-shadow: 0 2px 5px rgba(255, 86, 0, 0.3);
        }
    </style>
</head>

<body>
    <canvas id="draw-canvas"></canvas>

    <header>
        <h1>垃圾总量自动推算笔记本</h1>
    </header>

    <div class="toolbar" id="toolbar">
        <button id="tool-pen" title="画笔">✏️</button>
        <button id="tool-eraser-mode" title="橡皮擦">🧽</button>
        <button id="tool-eraser" title="一键清空">🧹</button>
        <button id="btn-reset" title="重置" style="transition: transform 0.4s;">🔄</button>
    </div>

    <button id="btn-next" title="添加下一行">+</button>

    <main>
        <div class="notebook-wrapper">
            <div class="notebook" id="notebook-content">
                <!-- Rows dynamically generated -->
            </div>
        </div>
    </main>

    <!-- Floating Calculator -->
    <div id="calculator" class="calculator hidden">
        <button>7</button><button>8</button><button>9</button><button class="btn-op">÷</button>
        <button>4</button><button>5</button><button>6</button><button class="btn-op">×</button>
        <button>1</button><button>2</button><button>3</button><button class="btn-op">-</button>
        <button class="btn-op">C</button><button>0</button><button>.</button><button class="btn-op">+</button>
        <button class="btn-op" style="font-size: 18px;">Del</button><button class="btn-wide">=</button>
    </div>
