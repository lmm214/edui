<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>探索周长</title>
    <style>
        :root {
            --bg-color: #F4F3EC;
            --grid-size: 60px;
            --fill-color: rgba(178, 226, 242, 0.8);
            --border-deep: #5D8A99;
            --highlight-orange: #FF5600;
            --border-width: 3px;
        }
        @media (min-width: 1024px) { :root { --grid-size: 80px; } }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { 
            margin: 0; 
            font-size: 1.2rem; 
            font-weight: normal; 
            color: #5D8A99; 
        }
        .btn-reset {
            background: white;
            border: 2px solid var(--border-deep);
            color: var(--border-deep);
            padding: 8px 24px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            z-index: 1000;
        }
        .btn-reset:hover { background: #eee; transform: translateY(-2px); }
        
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            place-items: center;
        }
        .shape-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .shape-container {
            display: grid;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }
        .grid-cell {
            width: var(--grid-size);
            height: var(--grid-size);
            background-color: var(--fill-color);
            position: relative;
            transition: background-color 0.3s;
        }
        .grid-cell.empty {
            background-color: transparent;
            visibility: hidden;
        }
        
        /* 统一线段层 */
        .edge {
            position: absolute;
            background-color: var(--border-deep);
            transition: background-color 0.2s, box-shadow 0.2s, transform 0.1s;
            z-index: 50;
            cursor: pointer;
        }
        /* 外周边缘激活状态 */
        .edge.perimeter.active {
            background-color: var(--highlight-orange);
            box-shadow: 0 0 8px rgba(255, 86, 0, 0.5);
            z-index: 60;
        }
        /* 可拖动标识：去除箭头符号 */
        .edge.can-drag.active {
            cursor: move;
        }

        /* 内部线条点击后的虚线状态 */
        .edge-h.internal.dashed-active, .edge-h.drag-placeholder {
            background-color: transparent !important;
            background-image: linear-gradient(to right, var(--border-deep) 60%, transparent 60%);
            background-size: 12px 100%;
        }
        .edge-v.internal.dashed-active, .edge-v.drag-placeholder {
            background-color: transparent !important;
            background-image: linear-gradient(to bottom, var(--border-deep) 60%, transparent 60%);
            background-size: 100% 12px;
        }

        .edge::after {
            content: '';
            position: absolute;
            inset: -12px;
        }
        
        .edge.internal {
            opacity: 0.6;
        }
        
        .edge-h { 
            height: var(--border-width); 
            width: calc(var(--grid-size) + var(--border-width));
        }
        .edge-v { 
            width: var(--border-width); 
            height: calc(var(--grid-size) + var(--border-width));
        }
        
        .peri-display {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--border-deep);
            background: white;
            padding: 5px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .peri-display span {
            color: var(--highlight-orange);
            font-size: 1.8rem;
            display: inline-block;
            transition: transform 0.2s;
            margin: 0 5px;
        }
        .bump { transform: scale(1.3); }

        /* 拖拽中的样式 */
        .dragging {
            opacity: 0.8;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>探索：面积与周长的关系</h1>
        <button class="btn-reset" onclick="resetAll()">重置课件</button>
    </header>
    <main id="main-content">
        <div class="shape-wrapper">
            <div id="shapeA" class="shape-container"></div>
            <div class="peri-display">周长: <span id="periA">0</span> cm</div>
        </div>
        <div class="shape-wrapper">
            <div id="shapeB" class="shape-container"></div>
            <div class="peri-display">周长: <span id="periB">0</span> cm</div>
        </div>
        <div class="shape-wrapper">
            <div id="shapeC" class="shape-container"></div>
            <div class="peri-display">周长: <span id="periC">0</span> cm</div>
        </div>
        <div class="shape-wrapper">
            <div id="shapeD" class="shape-container"></div>
            <div class="peri-display">周长: <span id="periD">0</span> cm</div>
        </div>
    </main>

    <script>
        const shapesData = {
            shapeA: { grid: [[0,1,0],[1,1,1]], cols: 3, rows: 2 },
            shapeB: { grid: [[1,1,1,1]], cols: 4, rows: 1 },
            shapeC: { grid: [[1,1],[1,1]], cols: 2, rows: 2 },
            shapeD: { grid: [[1,1,1],[1,0,0]], cols: 3, rows: 2 }
        };

        let isGlobalDragging = false; 
        let activeDragElement = null;
        let dragStartX, dragStartY;
        let dragInitialPos;

        function init() {
            Object.keys(shapesData).forEach(id => renderShape(id));
            
            window.addEventListener('mousedown', (e) => { if(!activeDragElement) isGlobalDragging = true; });
            window.addEventListener('mouseup', handleGlobalMouseUp);
            window.addEventListener('mousemove', handleGlobalMouseMove);
            window.addEventListener('touchstart', (e) => { if(!activeDragElement) isGlobalDragging = true; }, {passive: false});
            window.addEventListener('touchend', handleGlobalMouseUp);
            window.addEventListener('touchmove', handleGlobalMouseMove, {passive: false});
        }

        function renderShape(shapeId) {
            const container = document.getElementById(shapeId);
            const { grid, cols, rows } = shapesData[shapeId];
            
            container.style.gridTemplateColumns = `repeat(${cols}, var(--grid-size))`;
            container.innerHTML = '';

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = grid[r][c] ? 'grid-cell' : 'grid-cell empty';
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    container.appendChild(cell);
                }
            }

            const step = "var(--grid-size)";
            const halfBorder = "calc(var(--border-width) / 2)";

            // 水平
            for (let r = 0; r <= rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const top = r > 0 ? grid[r-1][c] : 0;
                    const bottom = r < rows ? grid[r][c] : 0;
                    if (top || bottom) {
                        const isPerimeter = top !== bottom;
                        const edge = createEdge(container, shapeId, 'h', r, c, step, halfBorder, isPerimeter);
                        
                        // 定义可拖动的凹角线段
                        if (shapeId === 'shapeA' && r === 1 && (c === 0 || c === 2)) edge.classList.add('can-drag');
                        if (shapeId === 'shapeD' && r === 1 && (c === 1 || c === 2)) edge.classList.add('can-drag');
                    }
                }
            }

            // 垂直
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c <= cols; c++) {
                    const left = c > 0 ? grid[r][c-1] : 0;
                    const right = c < cols ? grid[r][c] : 0;
                    if (left || right) {
                        const isPerimeter = left !== right;
                        const edge = createEdge(container, shapeId, 'v', r, c, step, halfBorder, isPerimeter);
                        
                        if (shapeId === 'shapeA' && r === 0 && (c === 1 || c === 2)) edge.classList.add('can-drag');
                        if (shapeId === 'shapeD' && r === 1 && c === 1) edge.classList.add('can-drag');
                    }
                }
            }
        }

        function createEdge(container, shapeId, type, r, c, step, halfBorder, isPerimeter) {
            const edge = document.createElement('div');
            edge.className = `edge edge-${type} ${isPerimeter ? 'perimeter' : 'internal'}`;
            edge.dataset.r = r;
            edge.dataset.c = c;
            edge.dataset.type = type;
            edge.dataset.shapeId = shapeId;
            
            edge.style.top = `calc(${r} * ${step} - ${halfBorder})`;
            edge.style.left = `calc(${c} * ${step} - ${halfBorder})`;

            const toggle = () => {
                if (isPerimeter) {
                    if (!edge.classList.contains('active')) {
                        edge.classList.add('active');
                        updateCount(shapeId);
                    }
                } else {
                    edge.classList.toggle('dashed-active');
                }
            };

            edge.addEventListener('mouseover', () => isGlobalDragging && toggle());
            edge.addEventListener('mousedown', (e) => {
                if (edge.classList.contains('can-drag') && edge.classList.contains('active')) {
                    startDragging(edge, e);
                } else {
                    toggle();
                }
            });
            
            edge.addEventListener('touchstart', (e) => {
                if (edge.classList.contains('can-drag') && edge.classList.contains('active')) {
                    startDragging(edge, e.touches[0]);
                } else {
                    toggle();
                }
            }, {passive: false});

            edge.addEventListener('manual-trigger', toggle);
            container.appendChild(edge);
            return edge;
        }

        function startDragging(el, e) {
            activeDragElement = el;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            dragInitialPos = {
                top: parseFloat(window.getComputedStyle(el).top),
                left: parseFloat(window.getComputedStyle(el).left)
            };
            el.classList.add('dragging');
            
            // 创建原地占位虚线
            const placeholder = el.cloneNode();
            placeholder.className = `edge edge-${el.dataset.type} drag-placeholder`;
            placeholder.classList.remove('active', 'can-drag', 'dragging');
            el.parentElement.appendChild(placeholder);
            el._placeholder = placeholder;
        }

        function handleGlobalMouseMove(e) {
            if (activeDragElement) {
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const dx = clientX - dragStartX;
                const dy = clientY - dragStartY;

                const shapeId = activeDragElement.dataset.shapeId;
                const type = activeDragElement.dataset.type;
                const r = parseInt(activeDragElement.dataset.r);
                const c = parseInt(activeDragElement.dataset.c);

                // 限制拖动方向
                if (type === 'h') {
                    // T形肩部向上，L形凹角向下
                    const moveY = (shapeId === 'shapeA') ? Math.min(0, dy) : Math.max(0, dy);
                    activeDragElement.style.top = (dragInitialPos.top + moveY) + 'px';
                } else {
                    // T形头部向左/右，L形凹角向右
                    let moveX = dx;
                    if (shapeId === 'shapeA' && c === 1) moveX = Math.min(0, dx);
                    if (shapeId === 'shapeA' && c === 2) moveX = Math.max(0, dx);
                    if (shapeId === 'shapeD') moveX = Math.max(0, dx);
                    activeDragElement.style.left = (dragInitialPos.left + moveX) + 'px';
                }
            }
        }

        function handleGlobalMouseUp(e) {
            isGlobalDragging = false;
            if (activeDragElement) {
                const el = activeDragElement;
                const shapeId = el.dataset.shapeId;
                const type = el.dataset.type;
                const r = parseInt(el.dataset.r);
                const c = parseInt(el.dataset.c);
                const container = el.parentElement;

                const currentTop = parseFloat(el.style.top);
                const currentLeft = parseFloat(el.style.left);
                const distY = Math.abs(currentTop - dragInitialPos.top);
                const distX = Math.abs(currentLeft - dragInitialPos.left);

                const threshold = 30; // 吸附阈值

                if (distY > threshold || distX > threshold) {
                    // 成功完成平移补全边界
                    if (type === 'h') {
                        const targetR = (shapeId === 'shapeA') ? 0 : 2;
                        // 移动到目标边界
                        el.style.top = `calc(${targetR} * var(--grid-size) - (var(--border-width) / 2))`;
                    } else {
                        const targetC = (shapeId === 'shapeA') ? (c===1?0:3) : 3;
                        // 移动到目标边界
                        el.style.left = `calc(${targetC} * var(--grid-size) - (var(--border-width) / 2))`;
                    }
                    el.classList.remove('can-drag');
                    // 注意：这里移除了 fillCells 调用，角落保持不填充颜色
                } else {
                    // 还原
                    el.style.top = dragInitialPos.top + 'px';
                    el.style.left = dragInitialPos.left + 'px';
                    if (el._placeholder) el._placeholder.remove();
                }

                el.classList.remove('dragging');
                activeDragElement = null;
            }
        }

        function updateCount(shapeId) {
            const activeEdges = document.querySelectorAll(`#${shapeId} .perimeter.active`).length;
            const displayId = 'peri' + shapeId.replace('shape', '');
            const span = document.getElementById(displayId);
            if (span && span.innerText != activeEdges) {
                span.innerText = activeEdges;
                span.classList.remove('bump');
                void span.offsetWidth; 
                span.classList.add('bump');
            }
        }

        function resetAll() {
            Object.keys(shapesData).forEach(id => renderShape(id));
            document.querySelectorAll('.peri-display span').forEach(s => {
                s.innerText = '0';
                s.classList.remove('bump');
            });
        }

        init();
    </script>
</body>
</html>
