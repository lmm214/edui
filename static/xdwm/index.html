<head>

    <title>线段围面</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #F4F3EC;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        svg {
            width: 100vw;
            height: 100vh;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .endpoint {
            cursor: grab;
        }

        .endpoint:active {
            cursor: grabbing;
        }

        #curve {
            transition: fill 0.3s ease;
        }

        .hint {
            position: absolute;
            bottom: 40px;
            color: #aaa;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: default;
            /* 隐藏功能，不改变鼠标样式 */
        }
    </style>
</head>
