<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>「路线规划大挑战」出题解题器</title>
    <style>
        html {
            touch-action: none;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-image: linear-gradient(to top, #fff1eb 0%, #ace0f9 100%);
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: stretch;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            height: 100vh;
            height: 100dvh;
            color: #333;
            user-select: none;
            gap: 20px;
            overflow: hidden;
            touch-action: none;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-start;
            justify-content: center;
            flex-shrink: 0;
        }

        .controls span {
            font-weight: bold;
            font-size: 16px;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .group-btn {
            padding: 8px 5px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            color: #2c3e50;
            width: 80px;
            line-height: 1.4;
        }

        .group-btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .group-btn.active {
            background: rgba(52, 152, 219, 0.5);
            border-color: rgba(52, 152, 219, 0.6);
            color: #fff;
        }

        .container {
            position: relative;
            flex: 1;
            height: 100%;
            max-width: 1000px;
            background: #fff;
            overflow: hidden;
            box-sizing: border-box;
        }

        :root {
            --cell-size: 40px;
        }

        .grid-bg {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(to right, #f1f2f6 1px, transparent 1px),
                linear-gradient(to bottom, #f1f2f6 1px, transparent 1px);
            background-size: var(--cell-size) var(--cell-size);
            pointer-events: none;
        }

        #svg-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        #blocks-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        .block {
            position: absolute;
            width: calc(var(--cell-size) * 4);
            height: calc(var(--cell-size) * 4);
            margin: 0;
            cursor: grab;
            pointer-events: auto;
            transition: transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: calc(var(--cell-size) * 1.6);
            box-sizing: border-box;
            touch-action: none;
        }

        .block:active {
            cursor: grabbing;
            transform: scale(1.05);
            z-index: 100;
        }

        .path {
            fill: none;
            stroke-width: 4;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                padding: 10px;
                gap: 10px;
                align-items: stretch;
                justify-content: flex-start;
            }

            .container {
                flex: 1;
                min-height: 0;
                max-width: none;
            }

            .controls {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: space-between;
                align-items: center;
                gap: 8px;
            }

            .controls span {
                width: 100%;
                margin-bottom: 0;
                font-size: 14px;
            }

            .group-btn {
                flex: 1;
                min-width: calc(33% - 10px);
                width: auto;
                padding: 8px 10px;
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="container" id="container">
        <div class="grid-bg"></div>
        <svg id="svg-layer"></svg>
        <div id="blocks-layer"></div>
    </div>

    <div class="controls">
        <button class="group-btn active" onclick="setGroups(this, 3)">3组<br>数字</button>
        <button class="group-btn" onclick="setGroups(this, 4)">4组<br>数字</button>
        <button class="group-btn" onclick="setGroups(this, 5)">5组<br>数字</button>

        <button class="group-btn" id="btn-toggle" onclick="toggleGridLines()">隐藏网格<br>和连线</button>
    </div>

    <script>
        let CELL = 20;
        let COLS = 40;
        let ROWS = 30;
        let SIZE = COLS * ROWS;

        const colors = ['#9b59b6', '#e74c3c', '#3498db', '#2ecc71', '#f1c40f'];

        let blocks = [];
        let allPerms = [];
        let lastBestPerm = null;
        let lastComputedPaths = null;
        let currentCount = 3;
        let linesVisible = true;

        const blocksLayer = document.getElementById('blocks-layer');
        const svg = document.getElementById('svg-layer');
        let pathEls = [];

        const MAX_SIZE = 10000;
        let gScoreArr = new Float32Array(MAX_SIZE);
        let fScoreArr = new Float32Array(MAX_SIZE);
        let parentArr = new Int32Array(MAX_SIZE);
        let dirArrMap = new Int32Array(MAX_SIZE);
        let inOpenArr = new Uint8Array(MAX_SIZE);

        function permute(arr, m = []) {
            if (arr.length === 0) {
                allPerms.push(m);
            } else {
                for (let i = 0; i < arr.length; i++) {
                    let curr = arr.slice();
                    let next = curr.splice(i, 1);
                    permute(curr, m.concat(next));
                }
            }
        }

        function setGroups(btn, num) {
            if (num === currentCount) return;
            document.querySelectorAll('.controls .group-btn:not(#btn-toggle)').forEach(b => {
                b.classList.remove('active');
            });
            btn.classList.add('active');
            initBlocks(num);
        }

        function toggleGridLines() {
            linesVisible = !linesVisible;
            document.querySelector('.grid-bg').style.display = linesVisible ? 'block' : 'none';
            document.getElementById('svg-layer').style.display = linesVisible ? 'block' : 'none';

            let btn = document.getElementById('btn-toggle');
            btn.innerHTML = linesVisible ? '隐藏网格<br>和连线' : '显示网格<br>和连线';
            if (!linesVisible) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function resizeGrid() {
            const container = document.getElementById('container');
            container.style.maxWidth = '';
            container.style.maxHeight = '';
            const rect = container.getBoundingClientRect();
            if (rect.width < 400) {
                CELL = Math.floor(rect.width / 20);
            } else {
                CELL = 20;
            }
            document.documentElement.style.setProperty('--cell-size', CELL + 'px');
            let newCols = Math.max(20, Math.floor(rect.width / CELL));
            let newRows = Math.max(20, Math.floor(rect.height / CELL));
            let snappedWidth = newCols * CELL;
            let snappedHeight = newRows * CELL;
            container.style.maxWidth = snappedWidth + 'px';
            container.style.maxHeight = snappedHeight + 'px';
            svg.setAttribute('width', snappedWidth);
            svg.setAttribute('height', snappedHeight);

            if (newCols !== COLS || newRows !== ROWS) {
                COLS = newCols;
                ROWS = newRows;
                SIZE = COLS * ROWS;

                // Constrain existing blocks dynamically based on new boundaries
                blocks.forEach(b => {
                    b.c = Math.max(0, Math.min(b.c, COLS - 2));
                    b.r = Math.max(0, Math.min(b.r, ROWS - 2));
                    b.px = b.c * CELL;
                    b.py = b.r * CELL;
                    b.el.style.left = b.px + 'px';
                    b.el.style.top = b.py + 'px';
                });

                if (blocks.length > 0) {
                    updateRouting();
                }
            }
        }

        window.addEventListener('resize', () => {
            clearTimeout(window.resizeTimer);
            window.resizeTimer = setTimeout(resizeGrid, 100);
        });

        function initBlocks(count) {
            currentCount = count;
            blocksLayer.innerHTML = '';
            svg.innerHTML = '';
            blocks = [];
            pathEls = [];

            // Calculate grid size based on screen
            const container = document.getElementById('container');
            container.style.maxWidth = '';
            container.style.maxHeight = '';
            const rect = container.getBoundingClientRect();
            if (rect.width < 400) {
                CELL = Math.floor(rect.width / 20);
            } else {
                CELL = 20;
            }
            document.documentElement.style.setProperty('--cell-size', CELL + 'px');
            if (rect.width > 0) {
                COLS = Math.max(20, Math.floor(rect.width / CELL));
                ROWS = Math.max(20, Math.floor(rect.height / CELL));
                SIZE = COLS * ROWS;
                let snappedWidth = COLS * CELL;
                let snappedHeight = ROWS * CELL;
                container.style.maxWidth = snappedWidth + 'px';
                container.style.maxHeight = snappedHeight + 'px';
                svg.setAttribute('width', snappedWidth);
                svg.setAttribute('height', snappedHeight);
            }

            // Dynamic initial layout: paired blocks spaced at least 8 units apart (now grid is 2x finer)
            const initialConfigs = [
                [{ c: 0, r: 0 }, { c: Math.min(COLS - 4, 12), r: 0 }],                                // Purple
                [{ c: COLS - 4, r: 0 }, { c: Math.max(0, COLS - 16), r: 0 }],                         // Red
                [{ c: 0, r: ROWS - 4 }, { c: Math.min(COLS - 4, 12), r: ROWS - 4 }],                  // Blue
                [{ c: COLS - 4, r: ROWS - 4 }, { c: Math.max(0, COLS - 16), r: ROWS - 4 }],           // Green
                [{ c: 0, r: Math.floor(ROWS / 2) }, { c: Math.max(0, COLS - 16), r: Math.floor(ROWS / 2) }] // Yellow
            ];

            for (let i = 0; i < count; i++) {
                let conf = initialConfigs[i];
                blocks.push({ id: i * 2, pairId: i, c: conf[0].c, r: conf[0].r, color: colors[i] });
                blocks.push({ id: i * 2 + 1, pairId: i, c: conf[1].c, r: conf[1].r, color: colors[i] });

                let p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                p.setAttribute('class', 'path');
                p.setAttribute('stroke', colors[i]);
                svg.appendChild(p);
                pathEls.push(p);
            }

            blocks.forEach(b => {
                let el = document.createElement('div');
                el.className = 'block';
                el.style.backgroundColor = '#fff';
                el.style.border = `4px solid ${b.color}`;
                el.style.color = b.color;
                el.innerText = b.pairId + 1;
                b.el = el;
                b.px = b.c * CELL;
                b.py = b.r * CELL;
                el.style.left = b.px + 'px';
                el.style.top = b.py + 'px';
                blocksLayer.appendChild(el);
            });

            allPerms = [];
            let arr = [];
            for (let i = 0; i < count; i++) arr.push(i);
            permute(arr);

            lastBestPerm = null;
            updateRouting();
        }

        let draggingBlock = null;
        let startX, startY;
        let isDragRendering = false;
        let latestDragEvent = null;

        function handleDragStart(e) {
            let blockEl = e.target.closest('.block');
            if (!blockEl) return;
            draggingBlock = blocks.find(x => x.el === blockEl);
            let rect = blockEl.getBoundingClientRect();

            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;

            startX = clientX - rect.left;
            startY = clientY - rect.top;

            if (e.type === 'touchstart') {
                e.preventDefault();
            }
        }

        blocksLayer.addEventListener('mousedown', handleDragStart);
        blocksLayer.addEventListener('touchstart', handleDragStart, { passive: false });

        function handleDragMove(e) {
            if (e.type === 'touchmove' && e.cancelable) {
                e.preventDefault();
            }
            if (!draggingBlock) return;

            latestDragEvent = e;
            if (!isDragRendering) {
                isDragRendering = true;
                requestAnimationFrame(processDragMove);
            }
        }

        function processDragMove() {
            if (!draggingBlock || !latestDragEvent) {
                isDragRendering = false;
                return;
            }
            let e = latestDragEvent;

            let rect = document.getElementById('container').getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;

            let x = clientX - rect.left - startX;
            let y = clientY - rect.top - startY;

            // Constrain
            x = Math.max(0, Math.min(x, COLS * CELL - 4 * CELL));
            y = Math.max(0, Math.min(y, ROWS * CELL - 4 * CELL));

            draggingBlock.px = x;
            draggingBlock.py = y;
            draggingBlock.el.style.left = x + 'px';
            draggingBlock.el.style.top = y + 'px';

            let newC = Math.round(x / CELL);
            let newR = Math.round(y / CELL);

            let overlap = blocks.find(b => {
                if (b === draggingBlock) return false;
                return newC < b.c + 4 && newC + 4 > b.c && newR < b.r + 4 && newR + 4 > b.r;
            });

            let logicalPositionChanged = false;
            if (!overlap) {
                if (draggingBlock.c !== newC || draggingBlock.r !== newR) {
                    draggingBlock.c = newC;
                    draggingBlock.r = newR;
                    logicalPositionChanged = true;
                }
            }

            updateRouting(logicalPositionChanged, true);
            isDragRendering = false;
        }

        document.addEventListener('mousemove', handleDragMove);
        document.addEventListener('touchmove', handleDragMove, { passive: false });

        function handleDragEnd() {
            if (draggingBlock) {
                draggingBlock.px = draggingBlock.c * CELL;
                draggingBlock.py = draggingBlock.r * CELL;
                draggingBlock.el.style.left = draggingBlock.px + 'px';
                draggingBlock.el.style.top = draggingBlock.py + 'px';
                draggingBlock = null;
                updateRouting();
            }
        }

        document.addEventListener('mouseup', handleDragEnd);
        document.addEventListener('touchend', handleDragEnd);

        // highly optimized A* with penalty for corners
        function getPath(sc, sr, ec, er, gridData) {
            let startIdx = sr * COLS + sc;
            let endIdx = er * COLS + ec;

            gScoreArr.fill(Infinity, 0, SIZE);
            fScoreArr.fill(Infinity, 0, SIZE);
            parentArr.fill(-1, 0, SIZE);
            dirArrMap.fill(-1, 0, SIZE);
            inOpenArr.fill(0, 0, SIZE);

            let open = [startIdx];
            gScoreArr[startIdx] = 0;
            fScoreArr[startIdx] = Math.abs(sc - ec) + Math.abs(sr - er);
            inOpenArr[startIdx] = 1;

            const dC = [0, 1, 0, -1];
            const dR = [-1, 0, 1, 0];

            while (open.length > 0) {
                let minF = Infinity;
                let minIdx = -1;
                let openIdx = -1;
                for (let i = 0; i < open.length; i++) {
                    let id = open[i];
                    if (fScoreArr[id] < minF) {
                        minF = fScoreArr[id];
                        minIdx = id;
                        openIdx = i;
                    }
                }

                let curr = minIdx;
                if (curr === endIdx) {
                    let path = [];
                    let currNode = curr;
                    while (currNode !== -1) {
                        path.push({ c: currNode % COLS, r: Math.floor(currNode / COLS) });
                        currNode = parentArr[currNode];
                    }
                    return path.reverse();
                }

                open.splice(openIdx, 1);
                inOpenArr[curr] = 0;

                let c = curr % COLS;
                let r = Math.floor(curr / COLS);
                let currDir = dirArrMap[curr];

                for (let i = 0; i < 4; i++) {
                    let nc = c + dC[i];
                    let nr = r + dR[i];
                    if (nc >= 0 && nc < COLS && nr >= 0 && nr < ROWS) {
                        let nIdx = nr * COLS + nc;
                        if (gridData[nIdx] === 1 && nIdx !== endIdx) continue;

                        let penalty = (currDir !== -1 && currDir !== i) ? 0.01 : 0;
                        if (nIdx !== endIdx) {
                            if (gridData[nIdx] === 2) penalty += 40; // 1 unit margin
                            if (gridData[nIdx] === 3) penalty += 10; // 2 units margin
                            if (gridData[nIdx] === 4) penalty += 2;  // 3 units margin
                        }

                        let tentativeG = gScoreArr[curr] + 1 + penalty;

                        if (tentativeG < gScoreArr[nIdx]) {
                            parentArr[nIdx] = curr;
                            dirArrMap[nIdx] = i;
                            gScoreArr[nIdx] = tentativeG;
                            fScoreArr[nIdx] = tentativeG + Math.abs(nc - ec) + Math.abs(nr - er);
                            if (!inOpenArr[nIdx]) {
                                open.push(nIdx);
                                inOpenArr[nIdx] = 1;
                            }
                        }
                    }
                }
            }
            return null;
        }

        function computePathCost(path) {
            if (path.length < 2) return path.length;
            let cost = path.length;
            let corners = 0;
            for (let i = 1; i < path.length - 1; i++) {
                let dx1 = path[i].c - path[i - 1].c;
                let dy1 = path[i].r - path[i - 1].r;
                let dx2 = path[i + 1].c - path[i].c;
                let dy2 = path[i + 1].r - path[i].r;
                if (dx1 !== dx2 || dy1 !== dy2) corners++;
            }
            return cost + corners * 0.01;
        }

        function updateRouting(forceCompute = true, isDragging = false) {
            let pairs = [];
            for (let i = 0; i < currentCount; i++) {
                let pb = blocks.filter(b => b.pairId === i);
                if (pb.length === 2) {
                    pairs.push({ start: pb[0], end: pb[1] });
                }
            }

            if (!forceCompute && lastComputedPaths) {
                drawPaths(pairs, lastComputedPaths);
                return;
            }

            let minCost = Infinity;
            let bestPaths = null;
            let bestPerm = null;
            let maxRouted = -1;
            let bestPathsFallback = null;

            let permsToTry = [...allPerms];
            if (lastBestPerm) {
                let lbpStr = lastBestPerm.join(',');
                permsToTry = permsToTry.filter(p => p.join(',') !== lbpStr);
                permsToTry.unshift(lastBestPerm);
            }

            let startTime = performance.now();

            for (let perm of permsToTry) {
                let currentPaths = [];
                let success = true;
                let totalCost = 0;

                for (let i = 0; i < currentCount; i++) {
                    let pairIndex = perm[i];
                    let p = pairs[pairIndex];
                    if (!p) continue;

                    let gridData = new Uint8Array(SIZE);

                    for (let b of blocks) {
                        if (b === p.start || b === p.end) continue;

                        // Mark the block as hard obstacle (1), and graduated soft obstacle margins
                        for (let dr = -3; dr <= 6; dr++) {
                            for (let dc = -3; dc <= 6; dc++) {
                                let r = b.r + dr;
                                let c = b.c + dc;
                                if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                                    let idx = r * COLS + c;
                                    if (dr >= 0 && dr <= 3 && dc >= 0 && dc <= 3) {
                                        gridData[idx] = 1; // Hard obstacle
                                    } else if (gridData[idx] !== 1) {
                                        let distR = dr < 0 ? -dr : (dr > 3 ? dr - 3 : 0);
                                        let distC = dc < 0 ? -dc : (dc > 3 ? dc - 3 : 0);
                                        let dist = Math.max(distR, distC);
                                        let level = dist === 1 ? 2 : (dist === 2 ? 3 : 4);
                                        if (gridData[idx] === 0 || gridData[idx] > level) {
                                            gridData[idx] = level;
                                        }
                                    }
                                }
                            }
                        }
                    }

                    for (let j = 0; j < i; j++) {
                        let prevIdx = perm[j];
                        let prevPath = currentPaths[prevIdx];
                        if (prevPath) {
                            for (let node of prevPath) {
                                for (let dr = -2; dr <= 2; dr++) {
                                    for (let dc = -2; dc <= 2; dc++) {
                                        let r = node.r + dr;
                                        let c = node.c + dc;
                                        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                                            let idx = r * COLS + c;
                                            let dist = Math.max(Math.abs(dr), Math.abs(dc));
                                            if (dist === 0) {
                                                gridData[idx] = 1; // Hard obstacle (no crossing allowed)
                                            } else if (gridData[idx] !== 1) {
                                                let level = dist === 1 ? 2 : 3;
                                                if (gridData[idx] === 0 || gridData[idx] > level) {
                                                    gridData[idx] = level;
                                                }
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }

                    let path = getPath(p.start.c, p.start.r, p.end.c, p.end.r, gridData);
                    if (!path) {
                        success = false;
                        break;
                    }
                    currentPaths[pairIndex] = path;
                    totalCost += computePathCost(path);
                }

                if (success) {
                    if (totalCost < minCost) {
                        minCost = totalCost;
                        bestPaths = currentPaths;
                        bestPerm = perm;
                    }
                } else {
                    let routedCount = currentPaths.filter(x => x).length;
                    if (routedCount > maxRouted) {
                        maxRouted = routedCount;
                        bestPathsFallback = currentPaths;
                    }
                }

                if (isDragging) {
                    let elapsed = performance.now() - startTime;
                    if (elapsed > 8) {
                        if (bestPaths) break;
                        if (elapsed > 15) break;
                    }
                }
            }

            if (bestPaths) {
                lastBestPerm = bestPerm;
                lastComputedPaths = bestPaths;
                drawPaths(pairs, bestPaths);
            } else if (bestPathsFallback) {
                lastComputedPaths = bestPathsFallback;
                drawPaths(pairs, bestPathsFallback);
            }
        }

        function drawPaths(pairs, paths) {
            for (let i = 0; i < currentCount; i++) {
                let path = paths[i];
                let pathEl = pathEls[i];

                if (!path) {
                    if (pathEl) pathEl.setAttribute('d', '');
                    continue;
                }

                let pStart = pairs[i].start;
                let pEnd = pairs[i].end;

                let points = path.map(p => ({
                    x: p.c * CELL + CELL / 2,
                    y: p.r * CELL + CELL / 2
                }));

                if (pStart === draggingBlock) {
                    points[0] = { x: pStart.px + CELL * 2, y: pStart.py + CELL * 2 };
                } else {
                    points[0] = { x: pStart.c * CELL + CELL * 2, y: pStart.r * CELL + CELL * 2 };
                }

                if (pEnd === draggingBlock) {
                    points[points.length - 1] = { x: pEnd.px + CELL * 2, y: pEnd.py + CELL * 2 };
                } else {
                    points[points.length - 1] = { x: pEnd.c * CELL + CELL * 2, y: pEnd.r * CELL + CELL * 2 };
                }

                let d = `M ${points[0].x} ${points[0].y}`;
                for (let j = 1; j < points.length; j++) {
                    d += ` L ${points[j].x} ${points[j].y}`;
                }

                if (pathEl) pathEl.setAttribute('d', d);
            }
        }

        window.addEventListener('load', () => {
            initBlocks(3);
        });

    </script>
</body>

</html>
