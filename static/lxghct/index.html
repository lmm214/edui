<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>「路线规划大挑战」出题解题器</title>
    <style>
        html {
            touch-action: none;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-image: linear-gradient(to top, #fff1eb 0%, #ace0f9 100%);
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: stretch;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            height: 100vh;
            height: 100dvh;
            color: #333;
            user-select: none;
            gap: 20px;
            overflow: hidden;
            touch-action: none;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-start;
            justify-content: center;
            flex-shrink: 0;
        }

        .controls span {
            font-weight: bold;
            font-size: 16px;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .group-btn {
            padding: 8px 5px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            color: #2c3e50;
            width: 80px;
            line-height: 1.4;
        }

        .group-btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .group-btn.active {
            background: rgba(52, 152, 219, 0.5);
            border-color: rgba(52, 152, 219, 0.6);
            color: #fff;
        }

        .container {
            position: relative;
            flex: 1;
            height: 100%;
            max-width: 1000px;
            background: #fff;
            overflow: hidden;
            box-sizing: border-box;
        }

        :root {
            --cell-size: 40px;
        }

        .grid-bg {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(to right, #f1f2f6 1px, transparent 1px),
                linear-gradient(to bottom, #f1f2f6 1px, transparent 1px);
            background-size: var(--cell-size) var(--cell-size);
            pointer-events: none;
        }

        #svg-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        #blocks-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        .block {
            position: absolute;
            width: calc(var(--cell-size) * 4);
            height: calc(var(--cell-size) * 4);
            margin: 0;
            cursor: grab;
            pointer-events: auto;
            transition: transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: calc(var(--cell-size) * 1.6);
            box-sizing: border-box;
            touch-action: none;
        }

        .block:active {
            cursor: grabbing;
            transform: scale(1.05);
            z-index: 100;
        }

        .path {
            fill: none;
            stroke-width: 4;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                padding: 10px;
                gap: 10px;
                align-items: stretch;
                justify-content: flex-start;
            }

            .container {
                flex: 1;
                min-height: 0;
                max-width: none;
            }

            .controls {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: space-between;
                align-items: center;
                gap: 8px;
            }

            .controls span {
                width: 100%;
                margin-bottom: 0;
                font-size: 14px;
            }

            .group-btn {
                flex: 1;
                min-width: calc(33% - 10px);
                width: auto;
                padding: 8px 10px;
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="container" id="container">
        <div class="grid-bg"></div>
        <svg id="svg-layer"></svg>
        <div id="blocks-layer"></div>
    </div>

    <div class="controls">
        <button class="group-btn active" onclick="setGroups(this, 3)">3组<br>数字</button>
        <button class="group-btn" onclick="setGroups(this, 4)">4组<br>数字</button>
        <button class="group-btn" onclick="setGroups(this, 5)">5组<br>数字</button>

        <button class="group-btn" id="btn-toggle" onclick="toggleGridLines()">隐藏网格<br>和连线</button>
    </div>
