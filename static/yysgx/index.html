<!DOCTYPE html>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有余数除法的各部分关系</title>
    <style>
        :root {
            --primary: #FF5600;
            --bg: #F4F3EC;
            --text: #0C0302;
            --accent: #FF8941;
            --white: #ffffff;
            --gray-200: #e5e7eb;
            --gray-500: #6b7280;
            --gray-800: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .sentence {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gray-800);
            margin-bottom: 1.5rem;
        }

        .formula-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 1rem;
            font-family: monospace;
            font-weight: bold;
            color: var(--primary);
        }

        .formula-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .formula-val {
            font-size: 3rem;
            padding: 0 0.75rem;
            cursor: pointer;
            border-radius: 0.5rem;
            transition: background 0.2s, border 0.2s;
            border: 1px dashed transparent;
        }

        .formula-val:hover {
            background: rgba(255, 86, 0, 0.1);
            border-color: var(--primary);
        }

        .formula-label {
            font-size: 1rem;
            font-family: sans-serif;
            color: var(--gray-500);
            margin-top: 0.25rem;
        }

        .operator {
            font-size: 2.5rem;
            padding-bottom: 1.5rem;
        }

        .demo-area {
            flex: 1;
            border: 2px solid var(--gray-200);
            background: var(--white);
            border-radius: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 2rem;
        }

        .stage {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            width: 100%;
        }

        .big-group {
            border: 4px solid var(--primary);
            border-radius: 3rem;
            padding: 1rem;
            background: rgba(255, 86, 0, 0.03);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            transition: all 0.3s ease;
        }

        .apple-group {
            border: 4px solid var(--accent);
            border-radius: 2rem;
            padding: 1rem;
            background: rgba(255, 86, 0, 0.08);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 86, 0, 0.15);
            min-width: 140px;
        }

        .apple-group::after {
            content: '一盘';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }

        .remainder-group {
            border: 2px dashed #ccc;
            border-radius: 1.5rem;
            padding: 0.75rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            background: #f9f9f9;
            min-width: 80px;
        }

        /* 交互状态类 */
        .val-hidden {
            background: #eee !important;
            color: transparent !important;
            text-shadow: 0 0 5px rgba(0,0,0,0.2);
            position: relative;
        }

        .val-hidden::after {
            content: '?';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: #666 !important;
            text-shadow: none;
            font-size: 2rem;
        }

        .group-hidden {
            border-color: transparent !important;
            background: transparent !important;
            box-shadow: none !important;
        }

        .group-hidden::after {
            opacity: 0 !important;
        }

        .apple-dimmed {
            opacity: 0.2 !important;
        }

        .apple-hidden {
            opacity: 0 !important;
            pointer-events: none;
        }


        @media (max-width: 768px) {
            .sentence { font-size: 1.2rem; }
            .formula-val { font-size: 2rem; }
            .operator { font-size: 1.5rem; }
            .apple { width: 40px; height: 40px; }
            .big-group { grid-template-columns: 1fr; }
        }
    </style>
    <main>
        <header>
            <div class="sentence">
                有 <span id="top-dividend" class="highlight">13</span> 个苹果，每 <span id="top-divisor" class="highlight">3</span> 个装一盘，可以装 <span id="top-quotient" class="highlight">4</span> 盘，还剩 <span id="top-remainder" class="highlight">1</span> 个。
            </div>
            
            <div class="formula-container">
                <div class="formula-item">
                    <span id="f-dividend" class="formula-val" onclick="toggleVisibility('dividend')">13</span>
                    <span class="formula-label">被除数</span>
                </div>
                <span class="operator">÷</span>
                <div class="formula-item">
                    <span id="f-divisor" class="formula-val" onclick="toggleVisibility('divisor')">3</span>
                    <span class="formula-label">除数</span>
                </div>
                <span class="operator">=</span>
                <div class="formula-item">
                    <span id="f-quotient" class="formula-val" onclick="toggleVisibility('quotient')">4</span>
                    <span class="formula-label">商</span>
                </div>
                <span class="operator">⋯⋯</span>
                <div class="formula-item">
                    <span id="f-remainder" class="formula-val" onclick="toggleVisibility('remainder')">1</span>
                    <span class="formula-label">余数</span>
                </div>
            </div>
        </header>

        <div class="demo-area">
            <div id="stage" class="stage"></div>
        </div>


    </main>

    <script>
        const config = {
            dividend: 13,
            divisor: 3,
            quotient: 4,
            remainder: 1
        };

        let visibility = {
            dividend: true,
            divisor: true,
            quotient: true,
            remainder: true
        };

        function render() {
            const stage = document.getElementById('stage');
            stage.innerHTML = '';

            // 创建商的部分（盘子）
            const bigGroup = document.createElement('div');
            bigGroup.className = 'big-group';
            
            for (let q = 0; q < config.quotient; q++) {
                const group = document.createElement('div');
                group.className = 'apple-group';
                if (!visibility.quotient) group.classList.add('group-hidden');

                for (let d = 0; d < config.divisor; d++) {
                    const apple = document.createElement('div');
                    apple.className = 'apple';
                    if (!visibility.dividend) apple.classList.add('apple-dimmed');
                    if (!visibility.divisor) apple.classList.add('apple-hidden');
                    group.appendChild(apple);
                }
                bigGroup.appendChild(group);
            }
            stage.appendChild(bigGroup);

            // 创建余数部分
            if (config.remainder > 0) {
                const remGroup = document.createElement('div');
                remGroup.className = 'remainder-group';
                
                for (let r = 0; r < config.remainder; r++) {
                    const apple = document.createElement('div');
                    apple.className = 'apple';
                    if (!visibility.dividend) apple.classList.add('apple-dimmed');
                    if (!visibility.remainder) apple.classList.add('apple-hidden');
                    remGroup.appendChild(apple);
                }
                stage.appendChild(remGroup);
            }

            // 更新文字高亮
            updateTextHighlight();
        }

        function updateTextHighlight() {
            const parts = ['dividend', 'divisor', 'quotient', 'remainder'];
            parts.forEach(part => {
                const fEl = document.getElementById(`f-${part}`);
                const tEl = document.getElementById(`top-${part}`);
                
                if (!visibility[part]) {
                    fEl.classList.add('val-hidden');
                    tEl.style.color = '#ccc';
                } else {
                    fEl.classList.remove('val-hidden');
                    tEl.style.color = 'var(--primary)';
                }
            });
        }

        function toggleVisibility(part) {
            // 逻辑：点击一个隐藏，其他全部显示（单点聚焦）
            const currentState = visibility[part];
            
            // 重置所有
            for (let key in visibility) visibility[key] = true;
            
            // 如果刚才点击的是显示的，则现在隐藏它
            if (currentState) {
                visibility[part] = false;
            }

            render();
        }



        // 初始化渲染
        window.onload = render;
    </script>
</html>
