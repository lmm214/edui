<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中国算盘 · 互动拨珠</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      background: #F4F3ED;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    #wrap {
      padding: 0 10vw;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    svg#abacus {
      width: min(calc(100vw - 40px), calc((100vh - 40px) * 840 / 500));
      height: auto;
      display: block;
      filter: drop-shadow(0 10px 36px rgba(0, 0, 0, 0.15));
      cursor: default;
      user-select: none;
      outline: none;
    }

    svg * {
      outline: none;
    }

    .bead {
      cursor: pointer;
    }

    .bead:focus {
      outline: none;
    }
  </style>
</head>

<body>
  <div id="wrap">
    <svg id="abacus" viewBox="0 0 840 500" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="gFrame" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#c8956a" />
          <stop offset="40%" stop-color="#a0623a" />
          <stop offset="100%" stop-color="#6b3a1e" />
        </linearGradient>
        <linearGradient id="gFrameH" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#c8956a" />
          <stop offset="50%" stop-color="#a0623a" />
          <stop offset="100%" stop-color="#c8956a" />
        </linearGradient>
        <linearGradient id="gBeam" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#b87040" />
          <stop offset="100%" stop-color="#7a4520" />
        </linearGradient>
        <radialGradient id="gBead" cx="35%" cy="28%" r="65%">
          <stop offset="0%" stop-color="#7a7a84" />
          <stop offset="45%" stop-color="#4a4a54" />
          <stop offset="100%" stop-color="#252528" />
        </radialGradient>
        <radialGradient id="gBeadHL" cx="35%" cy="25%" r="50%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.35)" />
          <stop offset="100%" stop-color="rgba(255,255,255,0)" />
        </radialGradient>
        <linearGradient id="gRod" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#7a4520" />
          <stop offset="30%" stop-color="#c87840" />
          <stop offset="70%" stop-color="#c87840" />
          <stop offset="100%" stop-color="#7a4520" />
        </linearGradient>
        <linearGradient id="gPanel" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f5efe8" />
          <stop offset="100%" stop-color="#ede4d8" />
        </linearGradient>
        <!-- gMark removed -->
        <filter id="fShadow" x="-10%" y="-10%" width="120%" height="120%">
          <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.4)" />
        </filter>
      </defs>

      <!-- top label zone (y=0..68): click here to set 个位 -->
      <g id="labels" font-family="'Noto Serif SC',serif" text-anchor="middle" fill="rgba(255,220,150,0.82)"
        visibility="hidden"></g>

      <!-- ── Frame (starts at y=70) ── -->
      <rect x="8" y="76" width="824" height="362" rx="14" fill="rgba(0,0,0,0.35)" />

      <rect x="20" y="88" width="800" height="334" rx="4" fill="url(#gPanel)" />

      <!-- Beam -->
      <rect x="20" y="188" width="800" height="20" fill="url(#gBeam)" />
      <rect x="20" y="188" width="800" height="3" fill="rgba(220,150,80,0.5)" rx="1" />
      <rect x="20" y="205" width="800" height="3" fill="rgba(0,0,0,0.2)" rx="1" />

      <!-- Frame detail lines -->
      <rect x="20" y="88" width="800" height="3" fill="rgba(220,160,90,0.3)" rx="1" />
      <rect x="20" y="419" width="800" height="3" fill="rgba(0,0,0,0.15)" rx="1" />

      <!-- Content (rods + beads) -->
      <g id="content"></g>

      <!-- Frame borders on top -->
      <rect x="0" y="68" width="840" height="20" rx="13" fill="url(#gFrameH)" />
      <rect x="0" y="422" width="840" height="20" rx="13" fill="url(#gFrameH)" />
      <rect x="0" y="68" width="20" height="374" rx="13" fill="url(#gFrame)" />
      <rect x="820" y="68" width="20" height="374" rx="13" fill="url(#gFrame)" />
      <rect x="0" y="68" width="30" height="30" rx="13" fill="url(#gFrame)" />

      <!-- ── Digit display below ── -->

    </svg>
