<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      background: #F4F3ED;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    #wrap {
      padding: 0 10vw;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    svg#abacus {
      width: min(calc(100vw - 40px), calc((100vh - 40px) * 840 / 500));
      height: auto;
      display: block;
      filter: drop-shadow(0 10px 36px rgba(0, 0, 0, 0.15));
      cursor: default;
      user-select: none;
      outline: none;
    }

    svg * {
      outline: none;
    }

    .bead {
      cursor: pointer;
    }

    .bead:focus {
      outline: none;
    }
  </style>
</head>
