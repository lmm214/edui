<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜救通信终端 - 确定位置</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #000;
            color: #e0e0e0;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: row;
            position: relative;
            z-index: 1;
        }

        #mapCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
            opacity: 0.25;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(46, 213, 115, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(46, 213, 115, 0.6);
        }

        /* 雷达区域 (自适应一屏且四周留空) */
        .radar-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            position: relative;
            padding: 40px;
            min-width: 0;
            min-height: 0;
        }

        .radar-wrapper {
            position: relative;
            width: min(85vh, 100%);
            aspect-ratio: 1 / 1;
            background-image:
                linear-gradient(rgba(26, 77, 46, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(26, 77, 46, 0.2) 1px, transparent 1px);
            background-size: 4% 4%;
            background-position: center;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), inset 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .radar-screen {
            position: absolute;
            width: 85.71%;
            /* 600/700 ratio from previous design */
            height: 85.71%;
            top: 7.14%;
            left: 7.14%;
            border-radius: 50%;
            border: 2px solid #1a4d2e;
            box-shadow: 0 0 30px rgba(46, 213, 115, 0.1), inset 0 0 60px rgba(46, 213, 115, 0.1);
            overflow: hidden;
            background: rgba(5, 18, 8, 0.6);
        }

        .radar-sweep {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: conic-gradient(from 0deg, transparent 60%, rgba(46, 213, 115, 0.1) 80%, rgba(46, 213, 115, 0.5) 100%);
            animation: sweep 4s linear infinite;
            transform-origin: center;
            z-index: 2;
        }

        @keyframes sweep {
            100% {
                transform: rotate(360deg);
            }
        }

        .radar-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            filter: drop-shadow(0 0 4px rgba(46, 213, 115, 0.3));
        }

        .layer {
            transition: opacity 0.4s ease;
        }

        #targetPulse {
            animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes ping {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* 船载对话终端面板 */
        .chat-panel {
            width: 420px;
            min-width: 350px;
            background: transparent;
            border-left: 1px solid rgba(26, 77, 46, 0.5);
            display: flex;
            flex-direction: column;
            z-index: 20;
        }

        .chat-header {
            padding: 18px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(26, 77, 46, 0.5);
            text-align: center;
        }

        .chat-header h2 {
            margin: 0;
            font-size: 18px;
            color: #2ed573;
            letter-spacing: 1px;
        }

        .chat-history {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .message.rescue {
            flex-direction: row;
        }

        .message.fishing {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .rescue .avatar {
            background: #005c4b;
            border: 2px solid #00b894;
        }

        .fishing .avatar {
            background: #c23616;
            border: 2px solid #e84118;
        }

        .bubble {
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 17px;
            line-height: 1.6;
            max-width: 80%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .rescue .bubble {
            background: rgba(0, 184, 148, 0.45);
            border: 1px solid #00b894;
            color: #e0f7fa;
            border-top-left-radius: 4px;
        }

        .fishing .bubble {
            background: rgba(232, 65, 24, 0.45);
            border: 1px solid #e84118;
            color: #fff;
            border-top-right-radius: 4px;
        }

        .system-msg {
            align-self: center;
            background: rgba(46, 213, 115, 0.45);
            border: 1px solid #2ed573;
            color: #2ed573;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            margin-top: 10px;
            animation: fadeIn 0.8s;
            line-height: 1.6;
            max-width: 90%;
        }

        /* 底部操作台 */
        .chat-controls {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(26, 77, 46, 0.5);
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .control-step {
            background: rgba(0, 200, 100, 0.05);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2ed573;
            animation: fadeIn 0.5s;
        }

        .ctrl-title {
            color: #2ed573;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 12px;
            display: block;
        }

        .ctrl-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        select,
        input[type="range"] {
            background: #0d161b;
            border: 1px solid #2ed573;
            color: #fff;
            padding: 6px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            font-size: 18px;
        }

        input[type="range"] {
            flex: 1;
            min-width: 100px;
            height: 6px;
            padding: 0;
            -webkit-appearance: none;
            background: #1a4d2e;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #2ed573;
            border-radius: 50%;
            box-shadow: 0 0 10px #2ed573;
        }

        .val-display {
            color: #fff;
            font-family: monospace;
            font-size: 15px;
            width: 45px;
            text-align: center;
        }

        button {
            background: #2ed573;
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-left: auto;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:hover {
            background: #26b360;
            box-shadow: 0 0 10px rgba(46, 213, 115, 0.4);
        }

        button:disabled {
            background: #555;
            color: #999;
            cursor: not-allowed;
            box-shadow: none;
            border-color: #555;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }

            .radar-container {
                padding: 15px;
            }

            .radar-wrapper {
                width: min(100%, 45vh);
            }

            .chat-panel {
                width: 100%;
                flex: 1;
                border-left: none;
                border-top: 2px solid #1a4d2e;
                min-height: 40vh;
            }
        }
    </style>
</head>

<body>
    <canvas id="mapCanvas" width="2000" height="1000"></canvas>
    <div class="container">
        <!-- 雷达可视区 -->
        <div class="radar-container">
            <div class="radar-wrapper">
                <div class="radar-screen">
                    <div class="radar-sweep"></div>
                </div>
                <svg id="radarSvg" class="radar-svg" viewBox="0 0 700 700">
                    <!-- 背景网格与环形 -->
                    <g class="radar-grid" stroke="#1a4d2e" stroke-width="1.5" fill="none">
                        <circle cx="350" cy="350" r="75" />
                        <circle cx="350" cy="350" r="150" />
                        <circle cx="350" cy="350" r="225" />
                        <circle cx="350" cy="350" r="300" stroke-width="2" stroke="#2ed573" opacity="0.3" />
                        <line x1="350" y1="30" x2="350" y2="670" />
                        <line x1="30" y1="350" x2="670" y2="350" />
                    </g>

                    <!-- 坐标轴文字 (白色，大字号) -->
                    <g fill="#ffffff" font-size="28" text-anchor="middle">
                        <text x="350" y="20">北</text>
                        <text x="350" y="690">南</text>
                        <text x="15" y="355">西</text>
                        <text x="685" y="355">东</text>
                    </g>

                    <!-- 距离刻度 (白色，大字号) -->
                    <g fill="#ffffff" font-size="16" text-anchor="start">
                        <text x="355" y="270">500m</text>
                        <text x="355" y="195">1000m</text>
                        <text x="355" y="120">1500m</text>
                        <text x="355" y="45">2000m</text>
                    </g>

                    <!-- 比例尺 -->
                    <g id="scaleBar" transform="translate(10, 695)" fill="#ffffff" font-size="20">
                        <text x="37.5" y="-12" text-anchor="middle">500 m</text>
                        <path d="M0,-8 L0,0 L75,0 L75,-8" fill="none" stroke="#ffffff" stroke-width="2" />
                    </g>

                    <!-- 动态高亮层 -->

                    <!-- 步骤1：距离圆环 -->
                    <g id="layer-mode1" class="layer" opacity="0">
                        <circle id="distRing" cx="350" cy="350" r="225" fill="none" stroke="rgba(46, 213, 115, 0.6)"
                            stroke-width="6" />
                        <g id="distRingDotContainer">
                            <circle id="distRingDot" cx="575" cy="350" r="8" fill="#ffeb3b" opacity="0"
                                filter="drop-shadow(0 0 5px rgba(255,235,59,0.8))" />
                        </g>
                        <g id="dist-uncertain-dots" fill="#ffeb3b" opacity="0.6"></g>
                    </g>

                    <!-- 步骤2：大概方向 (象限) -->
                    <g id="layer-mode2" class="layer" opacity="0">
                        <path id="quadrantPath" fill="rgba(46, 213, 115, 0.2)" stroke="rgba(46, 213, 115, 0.5)"
                            stroke-width="2" />
                        <path id="quadrantArc" fill="none" stroke="#ffeb3b" stroke-width="8" />
                        <g id="uncertain-dots" fill="#ffeb3b" opacity="0.6"></g>
                    </g>

                    <!-- 步骤3：最终角度与距离锁定 -->
                    <g id="layer-mode3" class="layer" opacity="0">
                        <path id="angleArc" fill="rgba(255, 235, 59, 0.1)" stroke="#ffeb3b" stroke-width="2" />
                        <text id="angleText" fill="#ffeb3b" font-size="22" font-weight="bold">25°</text>
                        <line id="angleRay" x1="350" y1="350" x2="650" y2="350" stroke="#2ed573" stroke-width="2.5"
                            stroke-dasharray="8,6" />

                        <line id="distLine" x1="350" y1="350" x2="500" y2="450" stroke="#ff4757" stroke-width="3" />
                        <circle id="targetDot" cx="500" cy="450" r="6" fill="#ff4757" />
                        <circle id="targetPulse" cx="500" cy="450" r="6" fill="none" stroke="#ff4757"
                            stroke-width="2" />
                        <text id="targetLabel" x="425" y="400" fill="#ff4757" font-size="20" font-weight="bold"
                            filter="drop-shadow(0 2px 4px rgba(0,0,0,0.8))">1500m</text>
                        <text id="boatLabel" x="518" y="458" fill="#ffffff" font-size="20" font-weight="bold"
                            filter="drop-shadow(0 2px 4px rgba(0,0,0,0.8))">渔船</text>
                    </g>

                    <!-- 中心搜救船 (永远置顶) -->
                    <circle cx="350" cy="350" r="6" fill="#ffffff" stroke="#1a4d2e" stroke-width="2" />
                    <circle cx="350" cy="350" r="12" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5" />
                    <text x="362" y="343" fill="#ffffff" font-size="16" font-weight="bold"
                        filter="drop-shadow(0 2px 2px #000)">搜救船</text>
                </svg>
            </div>
        </div>

        <!-- 右侧船载终端 -->
        <div class="chat-panel">
            <div class="chat-header">
                <h2>📡 船载通信与控制终端</h2>
            </div>

            <div class="chat-history" id="chatHistory">
                <!-- 聊天气泡将由JS动态插入 -->
            </div>

            <div class="chat-controls">
                <!-- 步骤1控制区 -->
                <div class="control-step" id="ctrl-step1" style="display: none;">
                    <span class="ctrl-title">回复搜救队呼叫：</span>
                    <div class="ctrl-row">
                        <button id="btn1" onclick="sendStep1()">确认收到</button>
                    </div>
                </div>

                <!-- 步骤2控制区 -->
                <div class="control-step" id="ctrl-step2" style="display: none;">
                    <span class="ctrl-title">发送大概方向数据：</span>
                    <div class="ctrl-row">
                        <select id="quadrantSelect" onchange="actionPreview(2)">
                            <option value="NE">东北方向</option>
                            <option value="SE" selected>东南方向</option>
                            <option value="SW">西南方向</option>
                            <option value="NW">西北方向</option>
                        </select>
                        <button id="btn2" onclick="sendStep2()">发送方向</button>
                    </div>
                </div>

                <!-- 步骤3控制区 -->
                <div class="control-step" id="ctrl-step3" style="display: none;">
                    <span class="ctrl-title">发送精准角度数据 (查阅罗盘)：</span>
                    <div class="ctrl-row">
                        <select id="baseDir" onchange="updateBiasOptions();" style="width: 55px;">
                            <option value="E" selected>东</option>
                            <option value="S">南</option>
                            <option value="W">西</option>
                            <option value="N">北</option>
                        </select>
                        <span style="color:#2ed573; font-weight:bold;">偏</span>
                        <select id="biasDir" onchange="actionPreview(3);" style="width: 55px;">
                            <option value="S" selected>南</option>
                            <option value="N">北</option>
                        </select>
                        <input type="range" id="angleSlider" min="0" max="45" value="25"
                            oninput="document.getElementById('a-val').innerText=this.value+'°'; actionPreview(3);">
                        <span id="a-val" class="val-display">25°</span>
                    </div>
                    <div class="ctrl-row" style="margin-top: 10px;">
                        <button id="btn3" onclick="sendStep3()">发送角度数据</button>
                    </div>
                </div>

            </div>
        </div>
    </div>
