<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>自制组合正方体画板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        #main-view {
            width: 100%;
            height: 100vh;
            background: #444488;
        }

        #main-view canvas {
            width: 100%;
            height: 100%;
        }

        .view-buttons {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
        }

        .view-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .view-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .top-right-container {
            position: fixed;
            top: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
            z-index: 10;
        }

        .top-buttons {
            display: flex;
            flex-direction: row;
            gap: 15px;
        }

        #saved-layouts {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .saved-card {
            width: 175px;
            /* 两个 80px 按钮加上 15px 间距 */
            height: 100px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: all 0.3s;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .saved-card:hover {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .saved-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.3);
            /* 放大显示，居中聚焦到小正方体上 */
            transform-origin: center;
        }
    </style>
</head>
<div class="container">
    <div id="main-view"></div>

    <div class="top-right-container">
        <div class="top-buttons">
            <button class="view-btn" id="btn-clear">清</button>
            <button class="view-btn" id="btn-save">存</button>
        </div>
        <div id="saved-layouts"></div>
    </div>

    <div class="view-buttons">
        <div class="empty"></div>
        <button class="view-btn" id="top">上</button>
        <div class="empty"></div>
        <button class="view-btn" id="left">左</button>
        <button class="view-btn" id="front">正</button>
        <button class="view-btn" id="right">右</button>
        <div class="empty"></div>
        <button class="view-btn" id="3d">原</button>
        <div class="empty"></div>
    </div>
</div>

<script src="three.js"></script>
<script src="tween.js"></script>
<script src="oc.js"></script>
