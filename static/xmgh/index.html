<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小马过河（自由绘制河床）</title>
  <style>
    :root {
      --water-line: #3b82f6;
      --avg-dash: #f59e0b;
      --horse: #8b5cf6;
      --draw-stroke: #8B4513;
      --danger: #8B4513;
      --success: #10b981;
      --warning: #f59e0b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      background: #f0f4f8;
    }

    .container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      background: #ffffff;
    }

    .top-bar {
      flex-shrink: 0;
      background: linear-gradient(135deg, #1a3a5c 0%, #2a5078 100%);
      color: #fff;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .top-bar .title {
      font-size: 20px;
      font-weight: 600;
      line-height: 1.4;
      flex: 1 1 auto;
    }

    .btn-clear {
      flex-shrink: 0;
      padding: 4px 12px;
      border-radius: 5px;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #555;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn-clear:hover {
      background: #f3f4f6;
      border-color: #9ca3af;
    }

    .stats-row {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      padding: 6px 16px;
      background: #f8fafc;
      border-bottom: 1px solid #e0e0e0;
      flex-wrap: wrap;
    }

    .stat-card {
      flex: 1;
      min-width: 90px;
      background: #fff;
      border-radius: 8px;
      padding: 5px 8px;
      border: 1px solid #e5e7eb;
      text-align: center;
    }

    .stat-card .label {
      font-size: 12px;
      color: #888;
      margin-bottom: 1px;
    }

    .stat-card .value {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .stat-card.avg .value {
      color: var(--warning);
    }

    .stat-card.horse .value {
      color: var(--horse);
    }

    .stat-card.verdict .value {
      font-size: 18px;
    }

    .verdict-safe {
      color: var(--success) !important;
    }

    .verdict-danger {
      color: var(--danger) !important;
    }

    .legend-row {
      flex-shrink: 0;
      display: flex;
      gap: 12px;
      padding: 4px 16px;
      background: #f8fafc;
      border-bottom: 1px solid #e0e0e0;
      flex-wrap: wrap;
      font-size: 12px;
      color: #666;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tip {
      font-size: 12px;
      color: #999;
      margin-left: auto;
      white-space: nowrap;
    }

    .btn-preset {
      flex-shrink: 0;
      padding: 3px 10px;
      border-radius: 5px;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #555;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn-preset:hover {
      background: #eff6ff;
      border-color: #93c5fd;
      color: #2563eb;
    }

    .canvas-wrap {
      flex: 1;
      position: relative;
      background: #fafbfc;
      user-select: none;
      cursor: crosshair;
      min-height: 0;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="top-bar">
      <div class="title">河水的平均深度是 110cm，我的高度是 160cm。这匹马能安全过河吗？</div>
    </div>

    <div class="legend-row">
      <button class="btn-preset" id="btn-even">均匀水深</button>
      <button class="btn-preset" id="btn-pit">中间暗坑</button>
      <button class="btn-preset" id="btn-ramp">对角斜坡</button>
      <span class="tip">拖动自由绘制河床</span>
      <button class="btn-clear" id="btn-clear">清除重画</button>
    </div>

    <div class="canvas-wrap">
      <svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>
